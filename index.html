<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROMPTER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --amber:#f0c040;--amber-dim:#7a5c10;--blue:#3a8cff;--blue-dim:#163466;
  --bg:#050709;--ui-bg:#0b1017;--ui-border:#18232f;
  --ui-txt:#5d7d96;--ui-bright:#a8c4d8;--panel-w:300px;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'IBM Plex Mono',monospace;color:var(--ui-bright);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 90% 90% at 50% 50%,transparent 45%,rgba(0,0,0,.45) 100%);}

/* PROMPTER BOX */
#prompter{position:absolute;z-index:10;}
#box-bg{position:absolute;inset:0;border-radius:4px;pointer-events:none;border:1px solid rgba(240,192,64,.13);}
#box-bg::after{content:'';position:absolute;inset:0;border-radius:4px;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.06) 3px,rgba(0,0,0,.06) 4px);pointer-events:none;}

/* clip: text viewport — flush to top of box, no top gap */
#clip{position:absolute;top:0;left:0;right:0;bottom:34px;overflow:hidden;transition:opacity .12s ease;pointer-events:none;}
#clip::after{content:'';position:absolute;bottom:0;left:0;right:0;height:24px;pointer-events:none;z-index:2;
  background:linear-gradient(to top,rgba(5,7,9,.8) 0%,transparent 100%);}
#clip.fading{opacity:0;}
#scroller{position:absolute;top:0;left:0;right:0;font-family:'Lexend',sans-serif;white-space:pre-wrap;word-break:break-word;z-index:1;pointer-events:none;}

/* corner handles — no min size */
.rh{position:absolute;width:22px;height:22px;z-index:22;}
.rh::before,.rh::after{content:'';position:absolute;background:rgba(240,192,64,.38);transition:background .15s;}
.rh:hover::before,.rh:hover::after{background:rgba(240,192,64,.92);}
.rh::before{width:9px;height:2px;}.rh::after{width:2px;height:9px;}
.rh.tl{top:0;left:0;cursor:nw-resize;}.rh.tl::before{top:5px;left:5px;}.rh.tl::after{top:5px;left:5px;}
.rh.tr{top:0;right:0;cursor:ne-resize;}.rh.tr::before{top:5px;right:5px;}.rh.tr::after{top:5px;right:5px;}
.rh.bl{bottom:0;left:0;cursor:sw-resize;}.rh.bl::before{bottom:5px;left:5px;}.rh.bl::after{bottom:5px;left:5px;}
.rh.br{bottom:0;right:0;cursor:se-resize;}.rh.br::before{bottom:5px;right:5px;}.rh.br::after{bottom:5px;right:5px;}

/* center move handle */
#mover{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;z-index:20;cursor:move;
  border-radius:50%;border:1.5px solid transparent;background:transparent;
  display:flex;align-items:center;justify-content:center;transition:border-color .2s,background .2s;}
#mover:hover{border:1.5px solid rgba(240,192,64,.35);background:rgba(240,192,64,.08);}

/* toolbar: prev / next only */
#toolbar{position:absolute;bottom:0;left:0;right:0;height:34px;display:flex;align-items:center;justify-content:center;gap:4px;z-index:20;}
.tb{background:none;border:none;cursor:pointer;color:rgba(240,192,64,.25);width:28px;height:28px;border-radius:5px;
  display:flex;align-items:center;justify-content:center;transition:color .15s,background .15s;}
.tb:hover{color:var(--amber);background:rgba(240,192,64,.08);}
#pgind{position:absolute;bottom:8px;right:11px;font-size:10px;color:rgba(240,192,64,.22);letter-spacing:.12em;pointer-events:none;z-index:21;}
#pbar{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(240,192,64,.04);z-index:22;overflow:hidden;}
#pfill{height:100%;background:linear-gradient(90deg,var(--amber-dim),var(--amber));transition:width .22s ease;width:0%;}

/* settings btn */
#sbtn{position:fixed;top:12px;right:12px;z-index:300;width:30px;height:30px;background:rgba(11,16,23,.92);
  border:1px solid var(--ui-border);border-radius:7px;color:var(--ui-txt);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(8px);font-size:14px;font-family:inherit;}
#sbtn:hover{border-color:var(--amber-dim);color:var(--amber);}
#sbtn.open{right:calc(var(--panel-w) + 12px);}

/* settings panel */
#panel{position:fixed;top:0;right:0;width:var(--panel-w);height:100%;background:var(--ui-bg);
  border-left:1px solid var(--ui-border);z-index:200;transform:translateX(100%);
  transition:transform .26s cubic-bezier(.4,0,.2,1);overflow-y:auto;overflow-x:hidden;}
#panel.open{transform:translateX(0);}
.ph{padding:14px 16px 10px;border-bottom:1px solid var(--ui-border);font-size:9px;letter-spacing:.25em;color:var(--amber-dim);text-transform:uppercase;}
.ps{padding:11px 16px;border-bottom:1px solid var(--ui-border);}
.pst{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);margin-bottom:9px;}
.pr{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.pl{font-size:11px;color:var(--ui-txt);flex:0 0 80px;}

input[type=range]{-webkit-appearance:none;flex:1;height:2px;background:var(--ui-border);border-radius:2px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:var(--amber);border-radius:50%;cursor:pointer;}
input[type=range]::-moz-range-thumb{width:10px;height:10px;background:var(--amber);border-radius:50%;cursor:pointer;border:none;}
input[type=number]{background:rgba(4,6,10,.9);border:1px solid var(--ui-border);border-radius:4px;color:var(--ui-bright);
  font-family:'IBM Plex Mono',monospace;font-size:11px;padding:3px 5px;width:54px;text-align:right;outline:none;transition:border-color .2s;}
input[type=number]:focus{border-color:var(--blue);}
input[type=color]{width:36px;height:24px;border:1px solid var(--ui-border);border-radius:4px;background:none;cursor:pointer;padding:0;}
textarea{width:100%;min-height:110px;background:rgba(4,6,10,.9);border:1px solid var(--ui-border);border-radius:4px;
  color:var(--ui-bright);font-family:'Lexend',sans-serif;font-size:11px;padding:8px 10px;resize:vertical;line-height:1.55;outline:none;transition:border-color .2s;}
textarea:focus{border-color:var(--blue);}
.btn{flex:1;background:rgba(4,6,10,.9);border:1px solid var(--ui-border);border-radius:5px;color:var(--ui-txt);
  font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;padding:6px 8px;cursor:pointer;transition:all .2s;text-align:center;text-transform:uppercase;}
.btn:hover{border-color:var(--amber-dim);color:var(--amber);}
.btn.hi{border-color:var(--blue-dim);color:var(--blue);}
.btn.hi:hover{border-color:var(--blue);background:rgba(58,140,255,.08);}
.hk{background:rgba(4,6,10,.9);border:1px solid var(--ui-border);border-radius:4px;color:var(--ui-bright);
  font-family:'IBM Plex Mono',monospace;font-size:10px;padding:4px 8px;cursor:pointer;min-width:64px;text-align:center;transition:all .2s;}
.hk:hover{border-color:var(--amber-dim);}
.hk.rec{border-color:var(--blue);color:var(--blue);animation:blink .7s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.15;}}
#m{position:fixed;visibility:hidden;pointer-events:none;white-space:pre-wrap;word-break:break-word;font-family:'Lexend',sans-serif;top:-9999px;left:0;}
</style>
</head>
<body>

<div id="prompter">
  <div id="box-bg"></div>
  <div id="clip"><div id="scroller"></div></div>
  <div class="rh tl" data-c="tl"></div>
  <div class="rh tr" data-c="tr"></div>
  <div class="rh bl" data-c="bl"></div>
  <div class="rh br" data-c="br"></div>
  <div id="mover"></div>
  <div id="toolbar">
    <button class="tb" id="tb-prev" title="Prev Page">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M7.5 2.5L4 6l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="tb" id="tb-next" title="Next Page">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M4.5 2.5L8 6l-3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
  <div id="pgind">01 / 01</div>
  <div id="pbar"><div id="pfill"></div></div>
</div>

<div id="m"></div>
<button id="sbtn">&#9881;</button>

<div id="panel">
  <div class="ph">&#9843; PROMPTER CONFIG</div>

  <div class="ps">
    <div class="pst">Script</div>
    <textarea id="ta" placeholder="Paste your script here..."></textarea>
    <div class="pr" style="margin-top:8px"><button class="btn hi" id="btn-apply">APPLY</button></div>
  </div>

  <div class="ps">
    <div class="pst">Typography</div>
    <div class="pr">
      <span class="pl">Font Size</span>
      <input type="range" id="sl-fs" min="10" max="120" step="1">
      <input type="number" id="n-fs" min="10" max="120" step="1">
    </div>
    <div class="pr">
      <span class="pl">Side Padding</span>
      <input type="range" id="sl-pad" min="0" max="120" step="2">
      <input type="number" id="n-pad" min="0" max="120" step="2">
    </div>
    <div class="pr">
      <span class="pl">Lines / Page</span>
      <input type="number" id="n-lpp" min="1" max="40" style="width:54px">
      <span id="lpp-hint" style="font-size:10px;color:var(--ui-txt);flex:1;text-align:right;"></span>
    </div>
  </div>

  <div class="ps">
    <div class="pst">Position</div>
    <div class="pr">
      <span class="pl">Top Gap</span>
      <input type="range" id="sl-top" min="0" max="800" step="1">
      <input type="number" id="n-top" min="-2000" max="2000" step="1">
    </div>
    <div class="pr">
      <span class="pl">Box Width</span>
      <input type="range" id="sl-w" min="80" max="3840" step="10">
      <input type="number" id="n-w" min="80" max="9999" step="10">
    </div>
    <div class="pr">
      <span class="pl">Box Height</span>
      <input type="range" id="sl-h" min="40" max="2160" step="10">
      <input type="number" id="n-h" min="40" max="9999" step="10">
    </div>
  </div>

  <div class="ps">
    <div class="pst">Appearance</div>
    <div class="pr"><span class="pl">Text Color</span><input type="color" id="c-text" value="#f0c040"></div>
    <div class="pr">
      <span class="pl">BG Opacity</span>
      <input type="range" id="sl-opa" min="0" max="1" step="0.05">
      <input type="number" id="n-opa" min="0" max="1" step="0.05">
    </div>
  </div>

  <div class="ps">
    <div class="pst">Hotkeys &mdash; click to assign</div>
    <div class="pr"><span class="pl">Next Page</span><button class="hk" data-a="nextPage"></button></div>
    <div class="pr"><span class="pl">Prev Page</span><button class="hk" data-a="prevPage"></button></div>
    <div class="pr"><span class="pl">Font +</span><button class="hk" data-a="fontUp"></button></div>
    <div class="pr"><span class="pl">Font &minus;</span><button class="hk" data-a="fontDown"></button></div>
  </div>

  <div class="ps">
    <div class="pst">Preset</div>
    <div class="pr">
      <button class="btn" id="btn-save">SAVE .JSON</button>
      <button class="btn hi" id="btn-load">LOAD .JSON</button>
    </div>
    <input type="file" id="file-in" accept=".json" style="display:none">
  </div>
</div>

<script>
const LOREM = `Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.

Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.

Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.

Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.

Sed ut perspiciatis unde omnis iste natus error sit voluptatem accusantium doloremque laudantium totam rem aperiam.

Nemo enim ipsam voluptatem quia voluptas sit aspernatur aut odit aut fugit sed quia consequuntur magni dolores.

At vero eos et accusamus et iusto odio dignissimos ducimus qui blanditiis praesentium voluptatum deleniti atque corrupti.`;

const LH = 1.65;

// State — top gap = box.y (distance from screen top to first line)
const S = {
  text:      LOREM,
  page:      0,
  pages:     1,
  _lpp:      3,
  _pageH:    0,
  box:       { x: 0, y: 0, w: 0, h: 0 },  // set on init
  fontSize:  40,
  padding:   32,
  lpp:       3,      // 3 lines per page default
  textColor: '#f0c040',
  bgOpacity: 0.88,
  hotkeys: {
    nextPage: 'KeyC',
    prevPage: 'KeyD',
    fontUp:   'KeyK',
    fontDown: 'KeyM'
  }
};

// DOM
const prompter = document.getElementById('prompter');
const clip     = document.getElementById('clip');
const scroller = document.getElementById('scroller');
const boxBg    = document.getElementById('box-bg');
const mover    = document.getElementById('mover');
const pgind    = document.getElementById('pgind');
const pfill    = document.getElementById('pfill');
const tbPrev   = document.getElementById('tb-prev');
const tbNext   = document.getElementById('tb-next');
const sbtn     = document.getElementById('sbtn');
const panel    = document.getElementById('panel');
const ta       = document.getElementById('ta');
const slFs     = document.getElementById('sl-fs');
const nFs      = document.getElementById('n-fs');
const slPad    = document.getElementById('sl-pad');
const nPad     = document.getElementById('n-pad');
const nLpp     = document.getElementById('n-lpp');
const lppHint  = document.getElementById('lpp-hint');
const slTop    = document.getElementById('sl-top');
const nTop     = document.getElementById('n-top');
const slW      = document.getElementById('sl-w');
const nW       = document.getElementById('n-w');
const slH      = document.getElementById('sl-h');
const nH       = document.getElementById('n-h');
const cText    = document.getElementById('c-text');
const slOpa    = document.getElementById('sl-opa');
const nOpa     = document.getElementById('n-opa');
const measureEl= document.getElementById('m');
const fileIn   = document.getElementById('file-in');

// ── helpers ──────────────────────────────────────────────────
function fmtKey(code) {
  if (!code) return '—';
  const map = {
    Space:'SPACE', ArrowRight:'→', ArrowLeft:'←', ArrowUp:'↑', ArrowDown:'↓',
    Equal:'=', Minus:'−', Enter:'↵', Escape:'ESC', Backspace:'⌫',
    Delete:'DEL', Tab:'TAB', BracketLeft:'[', BracketRight:']',
    Semicolon:';', Quote:"'", Comma:',', Period:'.', Slash:'/'
  };
  if (map[code]) return map[code];
  if (code.startsWith('Key'))   return code.slice(3);
  if (code.startsWith('Digit')) return code.slice(5);
  return code;
}
function p2(n) { return String(n + 1).padStart(2, '0'); }

// ── pagination ───────────────────────────────────────────────
function computePages() {
  const lineH = S.fontSize * LH;
  const lpp   = Math.max(1, S.lpp);
  const pageH = lpp * lineH;

  // measure total text height
  measureEl.style.fontSize   = S.fontSize + 'px';
  measureEl.style.lineHeight = LH;
  measureEl.style.width      = Math.max(10, S.box.w - S.padding * 2) + 'px';
  measureEl.textContent      = S.text;

  const totalH = measureEl.scrollHeight;
  S._lpp   = lpp;
  S._pageH = pageH;
  S.pages  = Math.max(1, Math.ceil(totalH / pageH));
  S.page   = Math.min(S.page, S.pages - 1);
}

// ── apply current page ───────────────────────────────────────
function applyPage() {
  scroller.style.transform = 'translateY(-' + (S.page * S._pageH) + 'px)';
  pfill.style.width = (S.pages > 1 ? (S.page / (S.pages - 1)) * 100 : 100) + '%';
  pgind.textContent = p2(S.page) + ' / ' + p2(S.pages - 1);
}

// ── change page with fade ────────────────────────────────────
function changePage(n) {
  const t = Math.max(0, Math.min(S.pages - 1, n));
  if (t === S.page) return;
  clip.classList.add('fading');
  setTimeout(function() {
    S.page = t;
    applyPage();
    clip.classList.remove('fading');
  }, 110);
}
function nextPage() { changePage(S.page + 1); }
function prevPage() { changePage(S.page - 1); }

// ── render ───────────────────────────────────────────────────
function renderBox() {
  prompter.style.left   = S.box.x + 'px';
  prompter.style.top    = S.box.y + 'px';   // box.y IS the top gap
  prompter.style.width  = S.box.w + 'px';
  prompter.style.height = S.box.h + 'px';
}

function renderText() {
  scroller.style.fontSize   = S.fontSize + 'px';
  scroller.style.lineHeight = LH;
  scroller.style.color      = S.textColor;
  // side padding only — top is flush (0)
  scroller.style.padding    = '0 ' + S.padding + 'px';
  scroller.textContent      = S.text;
}

function renderBg() {
  boxBg.style.background = 'rgba(4,6,10,' + S.bgOpacity + ')';
}

function fullRender() {
  renderBox();
  renderText();
  renderBg();
  computePages();
  applyPage();
  syncUI();
}

function syncUI() {
  ta.value      = S.text;
  slFs.value    = nFs.value   = S.fontSize;
  slPad.value   = nPad.value  = S.padding;
  nLpp.value    = S.lpp;
  lppHint.textContent = S.pages + ' page' + (S.pages !== 1 ? 's' : '');
  slTop.value   = nTop.value  = S.box.y;
  slW.value     = nW.value    = S.box.w;
  slH.value     = nH.value    = S.box.h;
  cText.value   = S.textColor;
  slOpa.value   = nOpa.value  = S.bgOpacity;
  document.querySelectorAll('.hk').forEach(function(b) {
    b.textContent = fmtKey(S.hotkeys[b.dataset.a]);
  });
}

// ── drag (move) ──────────────────────────────────────────────
var dragging = false, ds = {};
mover.addEventListener('mousedown', function(e) {
  e.preventDefault();
  dragging = true;
  ds = { mx: e.clientX, my: e.clientY, bx: S.box.x, by: S.box.y };
});

// ── resize (corners) ─────────────────────────────────────────
var resizing = false, rc = null, rs = {};
document.querySelectorAll('.rh').forEach(function(el) {
  el.addEventListener('mousedown', function(e) {
    e.preventDefault(); e.stopPropagation();
    resizing = true; rc = el.dataset.c;
    rs = { mx: e.clientX, my: e.clientY, bx: S.box.x, by: S.box.y, bw: S.box.w, bh: S.box.h };
  });
});

document.addEventListener('mousemove', function(e) {
  if (dragging) {
    S.box.x = ds.bx + (e.clientX - ds.mx);
    S.box.y = ds.by + (e.clientY - ds.my);  // moving box changes top gap
    renderBox();
    // sync top gap controls live
    slTop.value = nTop.value = S.box.y;
  }
  if (resizing) {
    var dx = e.clientX - rs.mx, dy = e.clientY - rs.my;
    if (rc === 'br') {
      S.box.w = Math.max(4, rs.bw + dx);
      S.box.h = Math.max(4, rs.bh + dy);
    } else if (rc === 'bl') {
      var nw = Math.max(4, rs.bw - dx);
      S.box.x = rs.bx + rs.bw - nw; S.box.w = nw;
      S.box.h = Math.max(4, rs.bh + dy);
    } else if (rc === 'tr') {
      S.box.w = Math.max(4, rs.bw + dx);
      var nh = Math.max(4, rs.bh - dy);
      S.box.y = rs.by + rs.bh - nh; S.box.h = nh;
    } else if (rc === 'tl') {
      var nw2 = Math.max(4, rs.bw - dx), nh2 = Math.max(4, rs.bh - dy);
      S.box.x = rs.bx + rs.bw - nw2; S.box.y = rs.by + rs.bh - nh2;
      S.box.w = nw2; S.box.h = nh2;
    }
    renderBox();
    computePages(); applyPage();
    slTop.value = nTop.value = S.box.y;
    slW.value   = nW.value   = S.box.w;
    slH.value   = nH.value   = S.box.h;
  }
});

document.addEventListener('mouseup', function() { dragging = false; resizing = false; });

// ── hotkeys ───────────────────────────────────────────────────
var recording = null, recBtn = null;
document.querySelectorAll('.hk').forEach(function(btn) {
  btn.addEventListener('click', function() {
    if (recBtn === btn) {
      btn.classList.remove('rec');
      btn.textContent = fmtKey(S.hotkeys[btn.dataset.a]);
      recording = null; recBtn = null; return;
    }
    if (recBtn) { recBtn.classList.remove('rec'); recBtn.textContent = fmtKey(S.hotkeys[recBtn.dataset.a]); }
    recording = btn.dataset.a; recBtn = btn;
    btn.classList.add('rec'); btn.textContent = '...';
  });
});

document.addEventListener('keydown', function(e) {
  if (recording) {
    e.preventDefault();
    S.hotkeys[recording] = e.code;
    recBtn.textContent = fmtKey(e.code);
    recBtn.classList.remove('rec');
    recording = null; recBtn = null; return;
  }
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  var k = e.code;
  if      (k === S.hotkeys.nextPage) { e.preventDefault(); nextPage(); }
  else if (k === S.hotkeys.prevPage) { e.preventDefault(); prevPage(); }
  else if (k === S.hotkeys.fontUp)   { e.preventDefault(); changeFontSize(1); }
  else if (k === S.hotkeys.fontDown) { e.preventDefault(); changeFontSize(-1); }
});

function changeFontSize(d) {
  S.fontSize = Math.max(6, Math.min(200, S.fontSize + d));
  slFs.value = nFs.value = S.fontSize;
  renderText(); computePages(); applyPage();
  lppHint.textContent = S.pages + ' page' + (S.pages !== 1 ? 's' : '');
}

// ── settings panel ────────────────────────────────────────────
sbtn.addEventListener('click', function() {
  panel.classList.toggle('open');
  sbtn.classList.toggle('open');
  sbtn.textContent = panel.classList.contains('open') ? '\u2715' : '\u2699';
});

function cleanText(t) {
  // collapse ALL blank/whitespace-only lines, trim each line, rejoin
  return t.split('\n')
    .map(function(l) { return l.trim(); })
    .filter(function(l) { return l.length > 0; })
    .join('\n');
}

document.getElementById('btn-apply').addEventListener('click', function() {
  S.text = cleanText(ta.value);
  ta.value = S.text;   // reflect cleaned text back into textarea
  S.page = 0;
  renderText(); computePages(); applyPage();
  lppHint.textContent = S.pages + ' page' + (S.pages !== 1 ? 's' : '');
});

function bindSN(sl, num, get, set, cb) {
  sl.addEventListener('input',  function() { set(parseFloat(sl.value));  num.value = get(); if (cb) cb(); });
  num.addEventListener('change',function() { set(parseFloat(num.value) || get()); sl.value = get(); if (cb) cb(); });
}

bindSN(slFs,  nFs,  function(){ return S.fontSize; },  function(v){ S.fontSize = Math.max(6,Math.min(200,v)); },
  function() { renderText(); computePages(); applyPage(); lppHint.textContent = S.pages + ' page' + (S.pages!==1?'s':''); });

bindSN(slPad, nPad, function(){ return S.padding; },   function(v){ S.padding = Math.max(0,v); },
  function() { renderText(); computePages(); applyPage(); });

bindSN(slOpa, nOpa, function(){ return S.bgOpacity; }, function(v){ S.bgOpacity = Math.max(0,Math.min(1,v)); },
  function() { renderBg(); });

// top gap = box.y
bindSN(slTop, nTop, function(){ return S.box.y; }, function(v){ S.box.y = v; },
  function() { renderBox(); });

// box width
bindSN(slW, nW, function(){ return S.box.w; }, function(v){ S.box.w = Math.max(4,v); },
  function() { renderBox(); computePages(); applyPage(); });

// box height
bindSN(slH, nH, function(){ return S.box.h; }, function(v){ S.box.h = Math.max(4,v); },
  function() { renderBox(); });

nLpp.addEventListener('change', function() {
  S.lpp = Math.max(1, parseInt(nLpp.value) || 3);
  nLpp.value = S.lpp;
  computePages(); applyPage();
  lppHint.textContent = S.pages + ' page' + (S.pages !== 1 ? 's' : '');
});

cText.addEventListener('input', function() {
  S.textColor = cText.value;
  scroller.style.color = S.textColor;
});

tbPrev.addEventListener('click', prevPage);
tbNext.addEventListener('click', nextPage);

// ── save / load ───────────────────────────────────────────────
document.getElementById('btn-save').addEventListener('click', function() {
  var cfg = {
    text: S.text, box: Object.assign({}, S.box),
    fontSize: S.fontSize, padding: S.padding, lpp: S.lpp,
    textColor: S.textColor, bgOpacity: S.bgOpacity,
    hotkeys: Object.assign({}, S.hotkeys)
  };
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(cfg, null, 2)], { type: 'application/json' }));
  a.download = 'prompter.json'; a.click();
});

document.getElementById('btn-load').addEventListener('click', function() { fileIn.click(); });
fileIn.addEventListener('change', function(e) {
  var f = e.target.files[0]; if (!f) return;
  var r = new FileReader();
  r.onload = function(ev) {
    try {
      var c = JSON.parse(ev.target.result);
      if (c.text      !== undefined) S.text      = cleanText(c.text);
      if (c.box)                     S.box       = Object.assign({}, S.box, c.box);
      if (c.fontSize)                S.fontSize  = c.fontSize;
      if (c.padding   !== undefined) S.padding   = c.padding;
      if (c.lpp)                     S.lpp       = c.lpp;
      if (c.textColor)               S.textColor = c.textColor;
      if (c.bgOpacity !== undefined) S.bgOpacity = c.bgOpacity;
      if (c.hotkeys)                 S.hotkeys   = Object.assign({}, S.hotkeys, c.hotkeys);
      S.page = 0;
      fullRender();
    } catch(err) { alert('Invalid JSON file.'); }
  };
  r.readAsText(f); fileIn.value = '';
});


// ── global paste: Ctrl+V anywhere loads text directly ────────
document.addEventListener('paste', function(e) {
  // if user is typing in a textarea/input, let it behave normally
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  var text = (e.clipboardData || window.clipboardData).getData('text/plain');
  if (!text || !text.trim()) return;
  e.preventDefault();
  S.text = cleanText(text);
  ta.value = S.text;
  S.page = 0;
  renderText(); computePages(); applyPage();
  lppHint.textContent = S.pages + ' page' + (S.pages !== 1 ? 's' : '');
});

// ── init ─────────────────────────────────────────────────────
document.fonts.ready.then(function() {
  var vw = window.innerWidth, vh = window.innerHeight;
  // Default box: full viewport width, tall enough for 3 lines + toolbar
  var lineH = S.fontSize * LH;
  var boxH  = Math.round(lineH * S.lpp + 34 + 8);  // 3 lines + toolbar + small buffer
  S.box = { x: 0, y: 0, w: vw, h: boxH };          // y=0: first line flush with screen top
  fullRender();
});
</script>
</body>
</html>
