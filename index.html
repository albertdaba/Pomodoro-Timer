<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PrompterCam</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap');

- { margin: 0; padding: 0; box-sizing: border-box; }

:root {
–bg: #0a0a0a;
–surface: #111111;
–border: #222222;
–accent: #00ff88;
–accent-dim: #00ff8855;
–text: #f0f0f0;
–muted: #555;
–danger: #ff3b5c;
}

html, body {
height: 100%;
background: var(–bg);
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
overflow: hidden;
user-select: none;
}

/* ── SETUP SCREEN ── */
#setup-screen {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
height: 100vh;
padding: 2rem;
gap: 2rem;
}

.logo {
font-family: ‘Space Mono’, monospace;
font-size: 1.1rem;
letter-spacing: 0.25em;
color: var(–accent);
text-transform: uppercase;
}

.logo span { color: var(–muted); }

.upload-zone {
width: 100%;
max-width: 340px;
border: 1.5px dashed var(–border);
border-radius: 16px;
padding: 2.5rem 2rem;
display: flex;
flex-direction: column;
align-items: center;
gap: 0.75rem;
cursor: pointer;
transition: border-color 0.2s, background 0.2s;
position: relative;
}

.upload-zone:hover, .upload-zone.drag-over {
border-color: var(–accent);
background: #00ff8808;
}

.upload-zone input {
position: absolute;
inset: 0;
opacity: 0;
cursor: pointer;
width: 100%;
height: 100%;
}

.upload-icon {
width: 48px;
height: 48px;
border-radius: 12px;
background: #1a1a1a;
display: flex;
align-items: center;
justify-content: center;
font-size: 1.4rem;
}

.upload-label {
font-size: 0.9rem;
color: var(–muted);
text-align: center;
line-height: 1.5;
}

.upload-label strong { color: var(–text); display: block; margin-bottom: 0.2rem; }

.file-name {
font-family: ‘Space Mono’, monospace;
font-size: 0.72rem;
color: var(–accent);
background: #00ff8815;
padding: 0.3rem 0.7rem;
border-radius: 6px;
display: none;
}

.controls-row {
display: flex;
flex-direction: column;
gap: 1rem;
width: 100%;
max-width: 340px;
}

.slider-group {
display: flex;
align-items: center;
gap: 0.75rem;
}

.slider-label {
font-family: ‘Space Mono’, monospace;
font-size: 0.65rem;
color: var(–muted);
text-transform: uppercase;
letter-spacing: 0.1em;
width: 60px;
flex-shrink: 0;
}

input[type=range] {
-webkit-appearance: none;
flex: 1;
height: 3px;
background: var(–border);
border-radius: 2px;
outline: none;
}

input[type=range]::-webkit-slider-thumb {
-webkit-appearance: none;
width: 16px;
height: 16px;
border-radius: 50%;
background: var(–accent);
cursor: pointer;
box-shadow: 0 0 8px var(–accent-dim);
}

.slider-val {
font-family: ‘Space Mono’, monospace;
font-size: 0.7rem;
color: var(–accent);
width: 28px;
text-align: right;
}

.start-btn {
width: 100%;
max-width: 340px;
padding: 1rem;
border: none;
border-radius: 14px;
background: var(–accent);
color: #000;
font-family: ‘Space Mono’, monospace;
font-size: 0.85rem;
font-weight: 700;
letter-spacing: 0.12em;
text-transform: uppercase;
cursor: pointer;
transition: opacity 0.2s, transform 0.1s;
opacity: 0.35;
pointer-events: none;
}

.start-btn.ready {
opacity: 1;
pointer-events: all;
}

.start-btn:active { transform: scale(0.97); }

/* ── PROMPTER SCREEN ── */
#prompter-screen {
display: none;
flex-direction: column;
height: 100vh;
height: 100dvh;
position: relative;
overflow: hidden;
}

/* TOP 25% — scroll text */
#text-band {
height: 25vh;
overflow: hidden;
position: relative;
background: rgba(0,0,0,0.85);
z-index: 10;
flex-shrink: 0;
}

/* gradient fade top/bottom on text */
#text-band::before,
#text-band::after {
content: ‘’;
position: absolute;
left: 0; right: 0;
height: 28px;
z-index: 2;
pointer-events: none;
}
#text-band::before { top: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent); }
#text-band::after  { bottom: 0; background: linear-gradient(to top,   rgba(0,0,0,0.85), transparent); }

#scroll-inner {
position: absolute;
width: 100%;
padding: 2rem 1.5rem;
will-change: transform;
transform: translateY(25vh);  /* starts below visible area */
}

#scroll-text {
font-family: ‘DM Sans’, sans-serif;
font-size: clamp(1.05rem, 4.5vw, 1.35rem);
font-weight: 600;
line-height: 1.7;
color: #ffffff;
text-shadow: 0 0 20px rgba(0,255,136,0.3);
text-align: center;
}

/* reading cursor line */
#cursor-line {
position: absolute;
left: 0; right: 0;
top: 50%;
transform: translateY(-50%);
height: 2px;
background: var(–accent);
box-shadow: 0 0 12px var(–accent);
z-index: 3;
opacity: 0.5;
}

/* BOTTOM 75% — camera */
#camera-band {
flex: 1;
position: relative;
overflow: hidden;
background: #000;
}

#video-el {
width: 100%;
height: 100%;
object-fit: cover;
transform: scaleX(-1); /* mirror for selfie */
display: block;
}

/* divider */
#divider {
height: 2px;
background: linear-gradient(90deg, transparent, var(–accent), transparent);
box-shadow: 0 0 10px var(–accent-dim);
flex-shrink: 0;
z-index: 10;
}

/* HUD overlay on camera */
#hud {
position: absolute;
bottom: 0; left: 0; right: 0;
padding: 1.2rem 1.5rem;
display: flex;
align-items: flex-end;
justify-content: space-between;
background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 100%);
z-index: 11;
}

#rec-indicator {
display: flex;
align-items: center;
gap: 0.5rem;
font-family: ‘Space Mono’, monospace;
font-size: 0.7rem;
color: white;
opacity: 0;
transition: opacity 0.3s;
}

#rec-indicator.active { opacity: 1; }

.rec-dot {
width: 8px;
height: 8px;
border-radius: 50%;
background: var(–danger);
animation: blink 1s infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

#timer {
font-family: ‘Space Mono’, monospace;
font-size: 0.7rem;
color: white;
}

/* record button */
#rec-btn {
position: absolute;
bottom: 1.4rem;
left: 50%;
transform: translateX(-50%);
width: 62px;
height: 62px;
border-radius: 50%;
border: 3px solid white;
background: transparent;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
z-index: 12;
transition: transform 0.15s;
}

#rec-btn:active { transform: translateX(-50%) scale(0.93); }

#rec-btn-inner {
width: 38px;
height: 38px;
border-radius: 50%;
background: var(–danger);
transition: border-radius 0.2s, width 0.2s, height 0.2s, background 0.2s;
}

#rec-btn.recording #rec-btn-inner {
border-radius: 6px;
width: 24px;
height: 24px;
background: var(–danger);
}

/* back + download buttons */
#back-btn {
position: absolute;
top: 0.9rem;
left: 1rem;
background: rgba(0,0,0,0.4);
border: 1px solid var(–border);
color: var(–muted);
border-radius: 8px;
padding: 0.4rem 0.7rem;
font-family: ‘Space Mono’, monospace;
font-size: 0.65rem;
cursor: pointer;
z-index: 20;
backdrop-filter: blur(6px);
}

#speed-display {
position: absolute;
top: 0.9rem;
right: 1rem;
background: rgba(0,0,0,0.4);
border: 1px solid var(–border);
color: var(–muted);
border-radius: 8px;
padding: 0.35rem 0.65rem;
font-family: ‘Space Mono’, monospace;
font-size: 0.65rem;
cursor: pointer;
z-index: 20;
backdrop-filter: blur(6px);
display: flex;
align-items: center;
gap: 0.4rem;
}

.spd-btn {
background: none;
border: none;
color: var(–accent);
font-family: ‘Space Mono’, monospace;
font-size: 0.75rem;
cursor: pointer;
padding: 0 2px;
}

/* save modal */
#save-modal {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,0.85);
z-index: 100;
align-items: center;
justify-content: center;
padding: 2rem;
}
#save-modal.show { display: flex; }

.save-card {
background: #161616;
border: 1px solid var(–border);
border-radius: 20px;
padding: 2rem 1.5rem;
width: 100%;
max-width: 320px;
display: flex;
flex-direction: column;
align-items: center;
gap: 1.2rem;
text-align: center;
}

.save-card h2 {
font-family: ‘Space Mono’, monospace;
font-size: 0.85rem;
color: var(–accent);
letter-spacing: 0.1em;
}

.save-card p {
font-size: 0.82rem;
color: var(–muted);
line-height: 1.6;
}

#save-video-preview {
width: 100%;
border-radius: 10px;
max-height: 180px;
object-fit: cover;
background: #000;
}

.save-btn {
width: 100%;
padding: 0.85rem;
border: none;
border-radius: 12px;
background: var(–accent);
color: #000;
font-family: ‘Space Mono’, monospace;
font-size: 0.8rem;
font-weight: 700;
letter-spacing: 0.08em;
cursor: pointer;
text-decoration: none;
display: block;
text-align: center;
}

.dismiss-btn {
background: none;
border: none;
color: var(–muted);
font-family: ‘Space Mono’, monospace;
font-size: 0.7rem;
cursor: pointer;
padding: 0.3rem;
}

/* canvas overlay for recording (hidden) */
#capture-canvas { display: none; }
</style>

</head>

<script>
// ── State ──────────────────────────────────────────
let scriptText    = '';
let scrollSpeed   = 3;       // px per frame at 60fps
let fontSize      = 20;
let isScrolling   = false;
let scrollPos     = 0;
let scrollRAF     = null;
let stream        = null;
let mediaRecorder = null;
let recordedChunks = [];
let isRecording   = false;
let timerInterval = null;
let elapsed       = 0;
let textTotalH    = 0;

// ── Setup Screen ────────────────────────────────────
const fileInput   = document.getElementById('file-input');
const fileNameEl  = document.getElementById('file-name-display');
const startBtn    = document.getElementById('start-btn');
const speedSlider = document.getElementById('speed-slider');
const sizeSlider  = document.getElementById('size-slider');
const speedVal    = document.getElementById('speed-val');
const sizeVal     = document.getElementById('size-val');
const dropZone    = document.getElementById('drop-zone');

fileInput.addEventListener('change', e => loadFile(e.target.files[0]));

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  loadFile(e.dataTransfer.files[0]);
});

function loadFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    scriptText = ev.target.result.trim();
    fileNameEl.textContent = file.name;
    fileNameEl.style.display = 'block';
    startBtn.classList.add('ready');
  };
  reader.readAsText(file);
}

speedSlider.addEventListener('input', () => {
  scrollSpeed = parseFloat(speedSlider.value);
  speedVal.textContent = scrollSpeed;
});

sizeSlider.addEventListener('input', () => {
  fontSize = parseInt(sizeSlider.value);
  sizeVal.textContent = fontSize;
});

startBtn.addEventListener('click', async () => {
  if (!scriptText) return;
  await launchSession();
});

// ── Launch session ──────────────────────────────────
async function launchSession() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: true
    });
  } catch(err) {
    alert('Camera/mic access is required. Please allow and try again.');
    return;
  }

  document.getElementById('setup-screen').style.display = 'none';
  const ps = document.getElementById('prompter-screen');
  ps.style.display = 'flex';

  // Set up video
  const videoEl = document.getElementById('video-el');
  videoEl.srcObject = stream;

  // Set up text
  const scrollText = document.getElementById('scroll-text');
  scrollText.style.fontSize = fontSize + 'px';
  scrollText.textContent = scriptText;

  // Reset scroll
  scrollPos = 0;
  const band = document.getElementById('text-band');
  const inner = document.getElementById('scroll-inner');
  inner.style.transform = `translateY(${band.clientHeight}px)`;

  await new Promise(r => setTimeout(r, 100));
  textTotalH = inner.offsetHeight;

  startScrolling();
}

// ── Scroll loop ─────────────────────────────────────
function startScrolling() {
  isScrolling = true;
  const band  = document.getElementById('text-band');
  const inner = document.getElementById('scroll-inner');
  const bandH = band.clientHeight;
  const pxPerMs = (scrollSpeed * 30) / 1000; // speed tuning

  let last = null;
  function loop(ts) {
    if (!isScrolling) return;
    if (last === null) last = ts;
    const dt = ts - last;
    last = ts;
    scrollPos += pxPerMs * dt;

    const offset = bandH - scrollPos;
    inner.style.transform = `translateY(${offset}px)`;

    if (scrollPos < textTotalH + bandH) {
      scrollRAF = requestAnimationFrame(loop);
    } else {
      isScrolling = false; // reached end
    }
  }
  scrollRAF = requestAnimationFrame(loop);
}

// ── Live speed controls ──────────────────────────────
document.getElementById('slow-btn').addEventListener('click', () => changeSpeed(-0.5));
document.getElementById('fast-btn').addEventListener('click', () => changeSpeed(0.5));

function changeSpeed(delta) {
  scrollSpeed = Math.max(0.5, Math.min(15, scrollSpeed + delta));
  document.getElementById('live-speed').textContent = scrollSpeed.toFixed(1);
}

// ── Back button ──────────────────────────────────────
document.getElementById('back-btn').addEventListener('click', () => {
  stopRecording(false);
  if (scrollRAF) cancelAnimationFrame(scrollRAF);
  isScrolling = false;
  if (stream) stream.getTracks().forEach(t => t.stop());
  document.getElementById('prompter-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
});

// ── Record button ────────────────────────────────────
document.getElementById('rec-btn').addEventListener('click', () => {
  if (!isRecording) startRecording();
  else stopRecording(true);
});

function startRecording() {
  recordedChunks = [];

  // Use the camera stream directly for recording (includes audio)
  // We also need to composite: text band on top
  // Strategy: use a canvas to composite video + text overlay, then record canvas stream

  const canvas  = document.getElementById('capture-canvas');
  const videoEl = document.getElementById('video-el');
  const band    = document.getElementById('text-band');

  // Match video resolution
  const vw = videoEl.videoWidth  || 640;
  const vh = videoEl.videoHeight || 480;
  canvas.width  = vw;
  canvas.height = vh;

  const ctx = canvas.getContext('2d');

  // textBandH as fraction of total height
  const textFrac = 0.25;
  const textPx   = Math.round(vh * textFrac);

  // Get audio track
  const audioTracks = stream.getAudioTracks();
  const canvasStream = canvas.captureStream(30);
  if (audioTracks.length) canvasStream.addTrack(audioTracks[0]);

  // Draw loop
  function drawFrame() {
    if (!isRecording) return;

    // Draw mirrored camera to full canvas
    ctx.save();
    ctx.scale(-1, 1);
    ctx.drawImage(videoEl, -vw, 0, vw, vh);
    ctx.restore();

    // Dark overlay for text band (top 25%)
    ctx.fillStyle = 'rgba(0,0,0,0.82)';
    ctx.fillRect(0, 0, vw, textPx);

    // Draw divider line
    ctx.fillStyle = '#00ff88';
    ctx.fillRect(0, textPx - 2, vw, 2);

    // Draw scrolling text onto canvas
    const inner = document.getElementById('scroll-inner');
    const scrollTextEl = document.getElementById('scroll-text');
    const matrix = new DOMMatrix(getComputedStyle(inner).transform);
    const yOffset = matrix.m42; // current translateY

    const bandH  = band.clientHeight;
    const scaleX = vw / band.clientWidth;
    const scaleY = textPx / bandH;

    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 0, vw, textPx);
    ctx.clip();

    ctx.font = `600 ${Math.round(fontSize * scaleY * 1.1)}px "DM Sans", sans-serif`;
    ctx.fillStyle = '#ffffff';
    ctx.textAlign  = 'center';
    ctx.textBaseline = 'top';

    const lineH  = fontSize * scaleY * 1.7;
    const lines  = wrapText(ctx, scriptText, vw - 40, Math.round(fontSize * scaleY * 1.1));
    const startY = yOffset * scaleY + 16;

    lines.forEach((line, i) => {
      const ly = startY + i * lineH;
      if (ly > -lineH && ly < textPx + lineH) {
        ctx.fillText(line, vw / 2, ly);
      }
    });

    ctx.restore();

    // Fade edges
    const gradT = ctx.createLinearGradient(0, 0, 0, 28);
    gradT.addColorStop(0, 'rgba(0,0,0,0.82)');
    gradT.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gradT;
    ctx.fillRect(0, 0, vw, 28);

    const gradB = ctx.createLinearGradient(0, textPx - 28, 0, textPx);
    gradB.addColorStop(0, 'rgba(0,0,0,0)');
    gradB.addColorStop(1, 'rgba(0,0,0,0.82)');
    ctx.fillStyle = gradB;
    ctx.fillRect(0, textPx - 28, vw, 28);

    requestAnimationFrame(drawFrame);
  }
  drawFrame();

  // Choose codec
  const mimeTypes = ['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm','video/mp4'];
  const mime = mimeTypes.find(m => MediaRecorder.isTypeSupported(m)) || '';
  mediaRecorder = new MediaRecorder(canvasStream, mime ? { mimeType: mime } : {});

  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => saveVideo();
  mediaRecorder.start(100);

  isRecording = true;
  elapsed = 0;
  document.getElementById('rec-indicator').classList.add('active');
  document.getElementById('rec-btn').classList.add('recording');

  timerInterval = setInterval(() => {
    elapsed++;
    const m = String(Math.floor(elapsed / 60)).padStart(2,'0');
    const s = String(elapsed % 60).padStart(2,'0');
    document.getElementById('timer').textContent = m + ':' + s;
  }, 1000);
}

function stopRecording(save) {
  if (!isRecording) return;
  isRecording = false;
  clearInterval(timerInterval);
  document.getElementById('rec-indicator').classList.remove('active');
  document.getElementById('rec-btn').classList.remove('recording');
  document.getElementById('timer').textContent = '00:00';
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    if (!save) mediaRecorder.ondataavailable = null, mediaRecorder.onstop = null;
    mediaRecorder.stop();
  }
}

function saveVideo() {
  if (!recordedChunks.length) return;
  const blob = new Blob(recordedChunks, { type: recordedChunks[0].type || 'video/webm' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `promptercam_${Date.now()}.webm`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);

  const toast = document.getElementById('dl-toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ── Text wrap helper for canvas ──────────────────────
function wrapText(ctx, text, maxWidth, size) {
  const words    = text.split(' ');
  const lines    = [];
  let   current  = '';

  for (const word of words) {
    const test = current ? current + ' ' + word : word;
    if (ctx.measureText(test).width <= maxWidth || !current) {
      current = test;
    } else {
      lines.push(current);
      current = word;
    }
  }
  if (current) lines.push(current);
  return lines;
}
</script>
