 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PrompterCam</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0a0a0a; --accent:#00ff88; --accent-dim:#00ff8844;
  --text:#f0f0f0; --muted:#555; --border:#222; --danger:#ff3b5c;
}
html,body {
  height:100%; width:100%; background:var(--bg); color:var(--text);
  font-family:'DM Sans',sans-serif; overflow:hidden;
  touch-action:none; overscroll-behavior:none;
  -webkit-user-select:none; user-select:none;
}

/* ── SETUP ── */
#setup {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100vh; padding:2rem 1.5rem; gap:1.8rem;
}
.logo { font-family:'Space Mono',monospace; font-size:1.1rem; letter-spacing:.25em; color:var(--accent); }
.logo span { color:var(--muted); }
.upload-zone {
  width:100%; max-width:340px; border:1.5px dashed var(--border); border-radius:16px;
  padding:2rem 1.5rem; display:flex; flex-direction:column; align-items:center; gap:.6rem;
  cursor:pointer; position:relative; transition:border-color .2s,background .2s;
}
.upload-zone:hover { border-color:var(--accent); background:#00ff8808; }
.upload-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.upload-icon { font-size:2rem; }
.upload-label { font-size:.85rem; color:var(--muted); text-align:center; }
.upload-label strong { color:var(--text); display:block; }
#file-name { font-family:'Space Mono',monospace; font-size:.7rem; color:var(--accent); background:#00ff8815; padding:.25rem .6rem; border-radius:6px; display:none; }
.controls { display:flex; flex-direction:column; gap:.9rem; width:100%; max-width:340px; }
.row { display:flex; align-items:center; gap:.75rem; }
.lbl { font-family:'Space Mono',monospace; font-size:.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; width:55px; flex-shrink:0; }
input[type=range] { -webkit-appearance:none; flex:1; height:3px; background:var(--border); border-radius:2px; outline:none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:var(--accent); cursor:pointer; }
.val { font-family:'Space Mono',monospace; font-size:.7rem; color:var(--accent); width:26px; text-align:right; }
#start-btn {
  width:100%; max-width:340px; padding:1rem; border:none; border-radius:14px;
  background:var(--accent); color:#000; font-family:'Space Mono',monospace;
  font-size:.85rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
  cursor:pointer; opacity:.3; pointer-events:none; transition:opacity .2s;
}
#start-btn.ready { opacity:1; pointer-events:all; }

/* ── PROMPTER ── */
#prompter { display:none; flex-direction:column; height:100vh; height:100dvh; overflow:hidden; position:relative; }

/* TOP 25% — text band */
#text-band {
  height:25vh; overflow:hidden; position:relative;
  background:rgba(0,0,0,.92); flex-shrink:0; z-index:10;
}
#text-band::before,#text-band::after {
  content:''; position:absolute; left:0; right:0; height:28px; z-index:2; pointer-events:none;
}
#text-band::before { top:0; background:linear-gradient(to bottom,rgba(0,0,0,.92),transparent); }
#text-band::after  { bottom:0; background:linear-gradient(to top,rgba(0,0,0,.92),transparent); }
#cursor-line {
  position:absolute; left:0; right:0; top:50%; transform:translateY(-50%);
  height:2px; background:var(--accent); box-shadow:0 0 10px var(--accent); opacity:.6; z-index:3;
}
#scroll-inner { position:absolute; width:100%; padding:1.5rem 1.2rem; will-change:transform; }
#scroll-text {
  font-family:'DM Sans',sans-serif; font-weight:600; line-height:1.7;
  color:#fff; text-align:center; text-shadow:0 0 18px rgba(0,255,136,.3);
}

/* divider */
#divider {
  height:2px; flex-shrink:0; z-index:10;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  box-shadow:0 0 8px var(--accent-dim);
}

/* BOTTOM 75% — camera */
#cam-band { flex:1; position:relative; overflow:hidden; background:#000; }
#video-el { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); display:block; }

#back-btn {
  position:absolute; top:.9rem; left:.9rem; z-index:20;
  background:rgba(0,0,0,.55); border:1px solid var(--border);
  color:var(--muted); border-radius:8px; padding:.4rem .7rem;
  font-family:'Space Mono',monospace; font-size:.62rem; cursor:pointer;
}
#spd-box {
  position:absolute; top:.9rem; right:.9rem; z-index:20;
  background:rgba(0,0,0,.55); border:1px solid var(--border);
  border-radius:8px; padding:.35rem .6rem;
  font-family:'Space Mono',monospace; font-size:.62rem;
  display:flex; align-items:center; gap:.4rem;
}
.spd { background:none; border:none; color:var(--accent); font-family:'Space Mono',monospace; font-size:.8rem; cursor:pointer; padding:0 2px; }

#hud {
  position:absolute; bottom:0; left:0; right:0; z-index:15;
  padding:1rem 1.4rem; display:flex; align-items:flex-end; justify-content:space-between;
  background:linear-gradient(to top,rgba(0,0,0,.65),transparent);
}
#rec-ind { display:flex; align-items:center; gap:.5rem; font-family:'Space Mono',monospace; font-size:.68rem; color:#fff; opacity:0; transition:opacity .3s; }
#rec-ind.on { opacity:1; }
.dot { width:8px; height:8px; border-radius:50%; background:var(--danger); animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.15} }
#timer { font-family:'Space Mono',monospace; font-size:.68rem; color:#fff; }

#rec-btn {
  position:absolute; bottom:1.3rem; left:50%; transform:translateX(-50%);
  width:64px; height:64px; border-radius:50%; border:3px solid #fff;
  background:transparent; display:flex; align-items:center; justify-content:center;
  cursor:pointer; z-index:20;
}
#rec-inner { width:40px; height:40px; border-radius:50%; background:var(--danger); transition:border-radius .2s,width .2s,height .2s; }
#rec-btn.rec #rec-inner { border-radius:6px; width:26px; height:26px; }

/* ── SAVE SCREEN ── */
#save-screen {
  display:none;
  position:fixed; inset:0; z-index:99999;
  background:#0a0a0a;
  flex-direction:column; align-items:center; justify-content:center;
  padding:2rem 1.5rem; gap:1.2rem;
  touch-action:pan-y;
}
#save-screen.on { display:flex; }
#save-title { font-family:'Space Mono',monospace; font-size:1rem; color:var(--accent); letter-spacing:.15em; text-align:center; }
#save-status { font-family:'Space Mono',monospace; font-size:.78rem; color:var(--muted); text-align:center; }
#preview {
  width:100%; max-width:420px; border-radius:12px;
  background:#111; max-height:34vh;
  /* controls shown so user can use native share on iOS */
}
#save-instructions {
  font-size:.8rem; color:var(--muted); text-align:center; line-height:1.6; max-width:320px;
  display:none;
}

/* The download button — visible on Android/desktop */
#dl-btn {
  width:100%; max-width:420px; padding:1.2rem;
  background:var(--accent); color:#000;
  font-family:'Space Mono',monospace; font-size:1.05rem; font-weight:700;
  letter-spacing:.1em; text-align:center; text-decoration:none;
  border-radius:14px; border:none; cursor:pointer;
  display:none; /* shown by JS after blob ready */
}

/* iOS open button */
#ios-hint {
  width:100%; max-width:420px; padding:1.2rem;
  background:var(--accent); color:#000;
  font-family:'Space Mono',monospace; font-size:1.05rem; font-weight:700;
  letter-spacing:.08em; text-align:center;
  border-radius:14px; border:none;
  cursor:pointer; display:none;
}

#new-btn {
  width:100%; max-width:420px; padding:.8rem;
  background:none; border:1px solid var(--border); color:var(--muted);
  font-family:'Space Mono',monospace; font-size:.72rem; border-radius:12px; cursor:pointer;
  display:none;
}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="logo">Prompter<span>Cam</span></div>
  <div class="upload-zone">
    <input type="file" id="file-input" accept=".txt,.md">
    <div class="upload-icon">📄</div>
    <div class="upload-label"><strong>Upload Script</strong>Tap to choose a .txt file</div>
    <div id="file-name"></div>
  </div>
  <div class="controls">
    <div class="row">
      <div class="lbl">Speed</div>
      <input type="range" id="speed-sl" min="1" max="10" value="3" step="0.5">
      <div class="val" id="speed-v">3</div>
    </div>
    <div class="row">
      <div class="lbl">Size</div>
      <input type="range" id="size-sl" min="14" max="36" value="20" step="1">
      <div class="val" id="size-v">20</div>
    </div>
  </div>
  <button id="start-btn">Start Session</button>
</div>

<!-- PROMPTER -->
<div id="prompter">
  <div id="text-band">
    <div id="cursor-line"></div>
    <div id="scroll-inner"><div id="scroll-text"></div></div>
  </div>
  <div id="divider"></div>
  <div id="cam-band">
    <video id="video-el" autoplay playsinline muted></video>
    <button id="back-btn">&#8592; Back</button>
    <div id="spd-box">
      <button class="spd" id="sl-btn">&#8722;</button>
      <span id="live-spd">3.0</span>&#215;
      <button class="spd" id="fa-btn">&#43;</button>
    </div>
    <div id="hud">
      <div id="rec-ind"><div class="dot"></div>REC</div>
      <div id="timer">00:00</div>
    </div>
    <button id="rec-btn"><div id="rec-inner"></div></button>
  </div>
</div>

<!-- SAVE SCREEN -->
<div id="save-screen">
  <div id="save-title">&#127916; Recording Done</div>
  <div id="save-status">Processing&hellip;</div>
  <video id="preview" controls playsinline webkit-playsinline style="display:none"></video>
  <div id="save-instructions"></div>
  <a id="dl-btn" href="#">&#11015; Download Video</a>
  <button id="ios-hint" onclick="if(window._blobUrl)window.open(window._blobUrl,'_blank');">&#9654; Open Video to Save</button>
  <button id="new-btn">Discard &amp; record again</button>
</div>

<script>
// Block zoom/scroll except inside save-screen
document.addEventListener('touchmove', function(e) {
  if (!e.target.closest('#save-screen')) e.preventDefault();
}, { passive: false });
document.addEventListener('gesturestart', function(e) { e.preventDefault(); }, { passive: false });

// Detect iOS
var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

var scriptText = '', scrollSpeed = 3, fontSize = 20;
var isScrolling = false, scrollPos = 0, scrollRAF = null;
var camStream = null, mediaRecorder = null, recordedChunks = [];
var isRecording = false, timerInterval = null, elapsed = 0;
var textTotalH = 0, blobUrl = null;

// ── FILE ────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', function(e) {
  var f = e.target.files[0];
  if (!f) return;
  var r = new FileReader();
  r.onload = function(ev) {
    scriptText = ev.target.result.trim();
    document.getElementById('file-name').textContent = f.name;
    document.getElementById('file-name').style.display = 'block';
    document.getElementById('start-btn').classList.add('ready');
  };
  r.readAsText(f);
});

// ── SLIDERS ─────────────────────────────────────────
document.getElementById('speed-sl').addEventListener('input', function() {
  scrollSpeed = parseFloat(this.value);
  document.getElementById('speed-v').textContent = scrollSpeed;
});
document.getElementById('size-sl').addEventListener('input', function() {
  fontSize = parseInt(this.value);
  document.getElementById('size-v').textContent = fontSize;
});

// ── START ────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', function() {
  if (scriptText) launchSession();
});

function launchSession() {
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 1080 }, height: { ideal: 1920 }, aspectRatio: { ideal: 0.5625 } },
    audio: true
  }).then(function(s) {
    camStream = s;
    document.getElementById('setup').style.display = 'none';
    document.getElementById('prompter').style.display = 'flex';
    document.getElementById('video-el').srcObject = camStream;

    var st = document.getElementById('scroll-text');
    st.style.fontSize = fontSize + 'px';
    st.textContent = scriptText;

    scrollPos = 0;
    var band = document.getElementById('text-band');
    var inner = document.getElementById('scroll-inner');
    inner.style.transform = 'translateY(' + band.clientHeight + 'px)';
    setTimeout(function() {
      textTotalH = inner.offsetHeight;
      startScrolling();
    }, 150);
  }).catch(function(err) {
    alert('Camera & mic access required. Error: ' + err.message);
  });
}

// ── SCROLL ───────────────────────────────────────────
function startScrolling() {
  if (scrollRAF) cancelAnimationFrame(scrollRAF);
  isScrolling = true;
  var band = document.getElementById('text-band');
  var inner = document.getElementById('scroll-inner');
  var bandH = band.clientHeight;
  var last = null;
  function loop(ts) {
    if (!isScrolling) return;
    if (!last) last = ts;
    var dt = ts - last; last = ts;
    scrollPos += (scrollSpeed * 30 / 1000) * dt;
    inner.style.transform = 'translateY(' + (bandH - scrollPos) + 'px)';
    if (scrollPos < textTotalH + bandH) scrollRAF = requestAnimationFrame(loop);
    else isScrolling = false;
  }
  scrollRAF = requestAnimationFrame(loop);
}

document.getElementById('sl-btn').addEventListener('click', function() { adjSpeed(-0.5); });
document.getElementById('fa-btn').addEventListener('click', function() { adjSpeed(0.5); });
function adjSpeed(d) {
  scrollSpeed = Math.max(0.5, Math.min(15, scrollSpeed + d));
  document.getElementById('live-spd').textContent = scrollSpeed.toFixed(1);
}

// ── BACK ─────────────────────────────────────────────
document.getElementById('back-btn').addEventListener('click', function() {
  if (isRecording) stopRec(false);
  isScrolling = false;
  if (scrollRAF) cancelAnimationFrame(scrollRAF);
  if (camStream) camStream.getTracks().forEach(function(t) { t.stop(); });
  // Reset save screen state for next session
  recordedChunks = [];
  if (blobUrl) { URL.revokeObjectURL(blobUrl); blobUrl = null; }
  document.getElementById('save-screen').classList.remove('on');
  document.getElementById('prompter').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
});

// ── RECORD ───────────────────────────────────────────
document.getElementById('rec-btn').addEventListener('click', function() {
  if (isRecording) stopRec(true);
  else startRec();
});

function startRec() {
  recordedChunks = [];

  // Record the RAW camera stream directly — works on ALL browsers including iOS Safari
  // This avoids canvas.captureStream() which iOS Safari does NOT support
  var mimes = [
    'video/mp4;codecs=h264,aac',
    'video/mp4',
    'video/webm;codecs=vp9,opus',
    'video/webm;codecs=vp8,opus',
    'video/webm'
  ];
  var mime = '';
  for (var i = 0; i < mimes.length; i++) {
    try {
      if (MediaRecorder.isTypeSupported(mimes[i])) { mime = mimes[i]; break; }
    } catch(e) {}
  }

  try {
    mediaRecorder = mime
      ? new MediaRecorder(camStream, { mimeType: mime })
      : new MediaRecorder(camStream);
  } catch(e) {
    try { mediaRecorder = new MediaRecorder(camStream); }
    catch(e2) { alert('Recording not supported on this browser.'); return; }
  }

  mediaRecorder.ondataavailable = function(e) {
    if (e.data && e.data.size > 0) recordedChunks.push(e.data);
  };

  mediaRecorder.onstop = function() {
    // Wait to ensure all ondataavailable chunks have arrived
    setTimeout(buildAndShowSave, 800);
  };

  mediaRecorder.start(200);

  isRecording = true;
  elapsed = 0;
  document.getElementById('rec-ind').classList.add('on');
  document.getElementById('rec-btn').classList.add('rec');
  timerInterval = setInterval(function() {
    elapsed++;
    var m = String(Math.floor(elapsed / 60)).padStart(2, '0');
    var s = String(elapsed % 60).padStart(2, '0');
    document.getElementById('timer').textContent = m + ':' + s;
  }, 1000);
}

function stopRec(showSave) {
  if (!isRecording) return;
  isRecording = false;
  clearInterval(timerInterval);
  document.getElementById('rec-ind').classList.remove('on');
  document.getElementById('rec-btn').classList.remove('rec');
  document.getElementById('timer').textContent = '00:00';

  if (!showSave) {
    mediaRecorder.onstop = function() {}; // suppress save
  }

  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    try { mediaRecorder.requestData(); } catch(e) {}
    mediaRecorder.stop();
  }

  if (showSave) {
    // Show save screen immediately with "Processing…"
    document.getElementById('save-status').textContent = 'Processing\u2026';
    document.getElementById('save-status').style.display = 'block';
    document.getElementById('preview').style.display = 'none';
    document.getElementById('dl-btn').style.display = 'none';
    document.getElementById('ios-hint').style.display = 'none';
    document.getElementById('new-btn').style.display = 'none';
    document.getElementById('save-instructions').style.display = 'none';
    document.getElementById('save-screen').classList.add('on');
  }
}

function buildAndShowSave() {
  if (!recordedChunks.length) {
    document.getElementById('save-status').textContent = 'Error: nothing was recorded. Try again.';
    document.getElementById('new-btn').style.display = 'block';
    return;
  }

  if (blobUrl) URL.revokeObjectURL(blobUrl);

  var mimeType = (recordedChunks[0] && recordedChunks[0].type) ? recordedChunks[0].type : 'video/mp4';
  var blob = new Blob(recordedChunks, { type: mimeType });
  blobUrl = URL.createObjectURL(blob);
  window._blobUrl = blobUrl;

  // Show video preview
  var preview = document.getElementById('preview');
  preview.src = blobUrl;
  preview.style.display = 'block';

  document.getElementById('save-status').style.display = 'none';

  var ext = mimeType.indexOf('mp4') !== -1 ? 'mp4' : 'webm';
  var dlBtn = document.getElementById('dl-btn');
  dlBtn.setAttribute('href', blobUrl);
  dlBtn.setAttribute('download', 'promptercam_' + Date.now() + '.' + ext);
  dlBtn.style.display = 'block';

  if (isIOS) {
    document.getElementById('save-instructions').innerHTML =
      'Tap <strong style="color:#00ff88">Open Video</strong> below. ' +
      'Safari will open it in a new tab. Then tap the <strong style="color:#00ff88">Share &#8679;</strong> button at the bottom of Safari and choose <strong style="color:#00ff88">Save to Photos</strong>.';
    document.getElementById('save-instructions').style.display = 'block';
    document.getElementById('ios-hint').style.display = 'block';
  }

  document.getElementById('new-btn').style.display = 'block';
  // Ensure save screen is visible
  document.getElementById('save-screen').classList.add('on');
}

// ── DISCARD / NEW ────────────────────────────────────
document.getElementById('new-btn').addEventListener('click', function() {
  document.getElementById('save-screen').classList.remove('on');
  var preview = document.getElementById('preview');
  preview.pause();
  preview.src = '';
  preview.style.display = 'none';
  document.getElementById('dl-btn').style.display = 'none';
  document.getElementById('ios-hint').style.display = 'none';
  document.getElementById('save-instructions').style.display = 'none';
  document.getElementById('new-btn').style.display = 'none';
  document.getElementById('save-status').style.display = 'none';
  if (blobUrl) { URL.revokeObjectURL(blobUrl); blobUrl = null; }
  recordedChunks = [];
  // Reset scroll
  scrollPos = 0;
  var band = document.getElementById('text-band');
  var inner = document.getElementById('scroll-inner');
  inner.style.transform = 'translateY(' + band.clientHeight + 'px)';
  startScrolling();
});
</script>
</body>
</html>
