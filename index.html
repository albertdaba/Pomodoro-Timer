<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROMPTER</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --amber: #FFB300;
    --bg: #080808;
    --panel: #0f0f0f;
    --border: #222;
    --text-ui: #666;
    --text-bright: #bbb;
    --red: #e05050;
    --green: #50d080;
    --font-size: 48px;
    --margin-left: 8vw;
    --margin-right: 8vw;
  }

  html, body {
    height: 100%; background: var(--bg);
    color: var(--text-bright); font-family: 'Courier New', monospace;
    overflow: hidden;
  }

  /* ── EDITOR VIEW ── */
  #editor-view { display: flex; flex-direction: column; height: 100vh; }

  #script-editor {
    flex: 1; background: var(--bg); color: #e0e0e0;
    font-family: Arial, sans-serif; font-size: var(--font-size);
    line-height: 1.55; border: none; outline: none; resize: none;
    padding-top: 0;
    padding-left: var(--margin-left);
    padding-right: var(--margin-right);
    padding-bottom: 5vw;
    overflow-y: auto; word-wrap: break-word;
  }
  #script-editor::placeholder { color: #1e1e1e; }
  #script-editor::-webkit-scrollbar { width: 4px; }
  #script-editor::-webkit-scrollbar-track { background: transparent; }
  #script-editor::-webkit-scrollbar-thumb { background: #222; }

  /* bottom bar */
  .editor-bar {
    display: flex; align-items: center;
    height: 44px; flex-shrink: 0;
    background: var(--panel); border-top: 1px solid var(--border);
    overflow-x: auto;
  }
  .editor-bar::-webkit-scrollbar { height: 0; }
  .bar-item {
    display: flex; align-items: center; gap: 7px;
    padding: 0 14px; height: 100%;
    border-right: 1px solid var(--border); flex-shrink: 0;
  }
  .bar-label {
    font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--text-ui); user-select: none;
  }
  .bar-val-input {
    width: 48px; background: transparent; border: none;
    color: var(--amber); font-family: inherit; font-size: 12px;
    text-align: center; outline: none; padding: 0;
    -moz-appearance: textfield; cursor: text;
  }
  .bar-val-input::-webkit-outer-spin-button,
  .bar-val-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .bar-val-unit { font-size: 9px; color: #333; letter-spacing: 0.1em; }
  .bar-sep {
    width: 1px; height: 18px; background: #2a2a2a; flex-shrink: 0; margin: 0 2px;
  }
  .bar-spacer { flex: 1; min-width: 12px; }
  .bar-btn {
    height: 100%; padding: 0 18px;
    background: transparent; border: none; border-left: 1px solid var(--border);
    color: var(--text-bright); font-family: inherit; font-size: 10px;
    letter-spacing: 0.15em; text-transform: uppercase;
    cursor: pointer; transition: color 0.15s, background 0.15s;
    white-space: nowrap; flex-shrink: 0;
  }
  .bar-btn:hover { color: var(--amber); background: rgba(255,179,0,0.05); }
  .bar-btn.primary {
    background: var(--amber); color: #000; font-weight: 700;
    letter-spacing: 0.25em; border-left-color: var(--amber);
  }
  .bar-btn.primary:hover { background: #ffc933; }

  /* ── HOTKEY MODAL ── */
  #hotkey-modal {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.75); align-items: flex-end; justify-content: center;
  }
  #hotkey-modal.open { display: flex; }
  .hk-panel {
    width: 100%; max-width: 680px;
    background: #0e0e0e; border: 1px solid var(--border);
    border-bottom: none; padding: 0;
    max-height: 82vh; display: flex; flex-direction: column;
  }
  .hk-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .hk-title { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--amber); }
  .hk-close {
    background: none; border: none; color: var(--text-ui); cursor: pointer;
    font-size: 16px; line-height: 1; padding: 0;
  }
  .hk-close:hover { color: var(--text-bright); }
  .hk-section-label {
    grid-column: 1 / -1;
    padding: 8px 20px 4px;
    font-size: 8px; letter-spacing: 0.35em; text-transform: uppercase;
    color: #3a3a3a; border-bottom: 1px solid #141414;
  }
  .hk-body {
    overflow-y: auto; flex: 1;
  }
  .hk-body::-webkit-scrollbar { width: 3px; }
  .hk-body::-webkit-scrollbar-thumb { background: #222; }
  .hk-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .hk-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 20px; border-bottom: 1px solid #141414;
    gap: 12px;
  }
  .hk-action { font-size: 11px; color: var(--text-ui); letter-spacing: 0.05em; }
  .hk-key-btn {
    background: #161616; border: 1px solid #2e2e2e;
    color: var(--amber); font-family: inherit; font-size: 10px;
    letter-spacing: 0.15em; padding: 4px 10px; cursor: pointer;
    min-width: 56px; text-align: center; transition: border-color 0.15s;
    white-space: nowrap; flex-shrink: 0;
  }
  .hk-key-btn:hover { border-color: var(--amber); }
  .hk-key-btn.listening {
    border-color: var(--amber); color: #000;
    background: var(--amber); animation: pulse 0.6s infinite alternate;
  }
  @keyframes pulse { from{opacity:1} to{opacity:0.6} }
  .hk-footer {
    display: flex; align-items: center; justify-content: flex-end;
    padding: 10px 20px; gap: 10px; border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* ── TELEPROMPTER VIEW ── */
  #teleprompter-view {
    display: none; position: fixed; inset: 0;
    background: var(--bg); flex-direction: column; overflow: hidden;
  }
  #teleprompter-view.active { display: flex; }

  #teleprompter-view::before {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 10;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px
    );
  }

  .tp-fade-bottom {
    position: absolute; left: 0; right: 0; height: 120px; z-index: 6; pointer-events: none;
    bottom: 44px; background: linear-gradient(0deg, var(--bg) 0%, transparent 100%);
  }

  #scroll-container { flex: 1; overflow: hidden; position: relative; }
  #scroll-track {
    position: absolute; left: 0; right: 0; top: 0;
    padding-top: 0;
    padding-left: var(--margin-left);
    padding-right: var(--margin-right);
    padding-bottom: 50vh;
    will-change: transform;
  }
  #scroll-text {
    font-family: Arial, sans-serif; font-size: var(--font-size);
    line-height: 1.55; color: var(--amber);
    word-wrap: break-word; white-space: pre-wrap;
    text-shadow: 0 0 50px rgba(255,179,0,0.25); max-width: 100%;
  }

  /* countdown overlay */
  #countdown-overlay {
    position: absolute; inset: 0 0 44px 0; z-index: 30;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0); pointer-events: none; opacity: 0;
  }
  #countdown-overlay.active { opacity: 1; }
  #countdown-num {
    font-family: Arial, sans-serif; font-size: 30vmin; font-weight: 700;
    color: rgba(255,179,0,0.18); line-height: 1;
    transition: transform 0.15s ease-out, opacity 0.15s;
    transform: scale(1);
  }
  #countdown-num.pop { transform: scale(1.08); }

  /* pause overlay */
  .pause-overlay {
    position: absolute; inset: 0 0 44px 0; z-index: 15;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .pause-overlay.visible { opacity: 1; }
  .pause-icon { font-size: 80px; color: rgba(255,179,0,0.35); }

  /* margin guide lines (shown briefly on change) */
  .margin-guide {
    position: absolute; top: 0; bottom: 44px; width: 1px;
    background: rgba(255,179,0,0.18); z-index: 12; pointer-events: none;
    opacity: 0; transition: opacity 0.3s;
  }
  .margin-guide.visible { opacity: 1; }
  #guide-left  { left: var(--margin-left); }
  #guide-right { right: var(--margin-right); }

  /* teleprompter bottom bar */
  .tp-bar {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
    display: flex; align-items: center;
    height: 44px; background: rgba(8,8,8,0.95);
    border-top: 1px solid var(--border);
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  #teleprompter-view:hover .tp-bar,
  #teleprompter-view.hud-visible .tp-bar { opacity: 1; pointer-events: all; }

  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 6px var(--green); flex-shrink: 0;
  }
  .status-dot.paused { background: var(--red); box-shadow: 0 0 6px var(--red); animation: blink 1s infinite; }
  .status-dot.countdown { background: var(--amber); box-shadow: 0 0 6px var(--amber); animation: blink 0.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .progress-wrap { flex: 1; margin: 0 12px; height: 2px; background: rgba(255,255,255,0.07); }
  .progress-fill { height: 100%; background: var(--amber); width: 0%; transition: width 0.25s linear; }
</style>
</head>
<body>

<!-- ══ EDITOR ══ -->
<div id="editor-view">
  <textarea id="script-editor" placeholder="Paste or type your script here…"></textarea>
  <div class="editor-bar">
    <div class="bar-item" style="padding:0 16px;">
      <span class="bar-label" style="color:var(--amber);letter-spacing:.35em;">▶ PROMPTER</span>
    </div>
    <div class="bar-item">
      <span class="bar-label">Size</span>
      <input class="bar-val-input" type="number" id="font-size-input" value="48" min="12" max="200">
      <span class="bar-val-unit">px</span>
    </div>
    <div class="bar-item">
      <span class="bar-label">Speed</span>
      <input class="bar-val-input" type="number" id="speed-input" value="60" min="5" max="500">
      <span class="bar-val-unit">px/s</span>
    </div>
    <!-- Margin controls -->
    <div class="bar-item" title="Left and right margins (vw units)">
      <span class="bar-label">Margin</span>
      <span class="bar-label" style="color:#444;font-size:8px;">L</span>
      <input class="bar-val-input" type="number" id="margin-left-input" value="8" min="0" max="45" style="width:40px;">
      <div class="bar-sep"></div>
      <span class="bar-label" style="color:#444;font-size:8px;">R</span>
      <input class="bar-val-input" type="number" id="margin-right-input" value="8" min="0" max="45" style="width:40px;">
      <span class="bar-val-unit">vw</span>
    </div>
    <div class="bar-item">
      <span style="font-size:10px;color:#444;" id="char-count">0 words</span>
    </div>
    <div class="bar-spacer"></div>
    <button class="bar-btn" onclick="openHotkeyModal()">Hotkeys</button>
    <button class="bar-btn" onclick="saveSettings()">Save JSON</button>
    <label class="bar-btn" style="display:flex;align-items:center;cursor:pointer;">
      Load JSON<input type="file" id="load-file" accept=".json" style="display:none" onchange="loadSettings(event)">
    </label>
    <button class="bar-btn primary" onclick="startTeleprompter()">▶ START</button>
  </div>
</div>

<!-- ══ HOTKEY MODAL ══ -->
<div id="hotkey-modal">
  <div class="hk-panel">
    <div class="hk-header">
      <span class="hk-title">Customize Hotkeys — click a key to rebind</span>
      <button class="hk-close" onclick="closeHotkeyModal()">✕</button>
    </div>
    <div class="hk-body">
      <div class="hk-grid" id="hk-grid"></div>
    </div>
    <div class="hk-footer">
      <button class="bar-btn" style="border:1px solid var(--border);height:34px;" onclick="resetHotkeys()">Reset Defaults</button>
      <button class="bar-btn primary" style="height:34px;" onclick="closeHotkeyModal()">Done</button>
    </div>
  </div>
</div>

<!-- ══ TELEPROMPTER ══ -->
<div id="teleprompter-view">
  <div class="tp-fade-bottom"></div>
  <div class="margin-guide" id="guide-left"></div>
  <div class="margin-guide" id="guide-right"></div>

  <div id="scroll-container">
    <div id="scroll-track"><div id="scroll-text"></div></div>
  </div>

  <div id="countdown-overlay"><div id="countdown-num">3</div></div>

  <div class="pause-overlay" id="pause-overlay">
    <div class="pause-icon">⏸</div>
  </div>

  <div class="tp-bar">
    <div class="bar-item" style="gap:8px;border-right:1px solid #1e1e1e;">
      <div class="status-dot" id="status-dot"></div>
      <span class="bar-label" id="status-label" style="color:var(--text-bright);">READY</span>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="progress-bar"></div></div>
    <div class="bar-item" style="border-left:1px solid #1e1e1e;border-right:1px solid #1e1e1e;">
      <span class="bar-label">Speed</span>
      <span id="status-speed" style="color:var(--amber);font-size:12px;min-width:32px;text-align:right;">60</span>
      <span class="bar-val-unit">px/s</span>
    </div>
    <div class="bar-item" style="border-right:1px solid #1e1e1e;gap:6px;">
      <span class="bar-label" style="color:#333;">M</span>
      <span id="status-margin" style="color:#555;font-size:10px;">8·8</span>
    </div>
    <div class="bar-item" style="border-right:none;">
      <span id="status-pct" style="font-size:10px;color:#444;">0%</span>
    </div>
    <div class="bar-spacer"></div>
    <button class="bar-btn" onclick="resetScroll()">⟳ Reset</button>
    <button class="bar-btn" id="hud-play-btn" onclick="togglePlay()">⏸ Pause</button>
    <button class="bar-btn" onclick="exitTeleprompter()">✕ Exit</button>
  </div>
</div>

<script>
// ── DEFAULT HOTKEYS ────────────────────────────────────────
const DEFAULT_HOTKEYS = {
  // Playback
  togglePlay:       'Space',
  reset:            'KeyR',
  exit:             'Escape',
  fullscreen:       'KeyF',
  // Speed
  speedUp:          'ArrowUp',
  speedDown:        'ArrowDown',
  speedUpLarge:     'ArrowRight',
  speedDownLarge:   'ArrowLeft',
  // Manual scroll
  scrollStepDown:   'PageDown',
  scrollStepUp:     'PageUp',
  rewind:           'KeyW',
  // Font size
  fontSizeUp:       'BracketRight',
  fontSizeDown:     'BracketLeft',
  // Margins
  marginLeftUp:     'KeyU',
  marginLeftDown:   'KeyJ',
  marginRightUp:    'KeyI',
  marginRightDown:  'KeyK',
};

// Groups for modal rendering
const HK_GROUPS = [
  {
    label: 'Playback',
    actions: ['togglePlay', 'reset', 'exit', 'fullscreen']
  },
  {
    label: 'Speed',
    actions: ['speedUp', 'speedDown', 'speedUpLarge', 'speedDownLarge']
  },
  {
    label: 'Scroll',
    actions: ['scrollStepDown', 'scrollStepUp', 'rewind']
  },
  {
    label: 'Font Size',
    actions: ['fontSizeUp', 'fontSizeDown']
  },
  {
    label: 'Margins',
    actions: ['marginLeftUp', 'marginLeftDown', 'marginRightUp', 'marginRightDown']
  },
];

const ACTION_LABELS = {
  togglePlay:       'Play / Pause',
  speedUp:          'Speed +5 px/s',
  speedDown:        'Speed −5 px/s',
  speedUpLarge:     'Speed +25 px/s',
  speedDownLarge:   'Speed −25 px/s',
  scrollStepDown:   'Scroll Step Down',
  scrollStepUp:     'Scroll Step Up',
  rewind:           'Rewind (hold)',
  reset:            'Reset to Top',
  exit:             'Exit',
  fullscreen:       'Fullscreen',
  fontSizeUp:       'Font Size +4px',
  fontSizeDown:     'Font Size −4px',
  marginLeftUp:     'Left Margin +1vw',
  marginLeftDown:   'Left Margin −1vw',
  marginRightUp:    'Right Margin +1vw',
  marginRightDown:  'Right Margin −1vw',
};

let hotkeys = { ...DEFAULT_HOTKEYS };

function keyLabel(code) {
  const map = {
    Space:'SPC', Escape:'ESC', ArrowUp:'↑', ArrowDown:'↓',
    ArrowLeft:'←', ArrowRight:'→', Enter:'↵', Tab:'TAB',
    Backspace:'BKSP', Delete:'DEL', Home:'HOME', End:'END',
    PageUp:'PGUP', PageDown:'PGDN', BracketLeft:'[', BracketRight:']',
  };
  if (map[code]) return map[code];
  if (code.startsWith('Key')) return code.slice(3);
  if (code.startsWith('Digit')) return code.slice(5);
  if (code.startsWith('F') && !isNaN(code.slice(1))) return code;
  return code;
}

// ── STATE ─────────────────────────────────────────────────
let isPlaying = false, scrollPos = 0, currentSpeed = 60, fontSize = 48;
let marginLeft = 8, marginRight = 8;
let rafId = null, lastTime = null, trackHeight = 0, containerHeight = 0;
let hudTimer = null, rewindHeld = false, countdownActive = false;
let guideTimer = null;
const SCROLL_STEP = 80; // px per manual scroll keypress

const editorView    = document.getElementById('editor-view');
const teleView      = document.getElementById('teleprompter-view');
const scrollTrack   = document.getElementById('scroll-track');
const scrollText    = document.getElementById('scroll-text');
const scriptEditor  = document.getElementById('script-editor');
const fontSizeInput = document.getElementById('font-size-input');
const speedInput    = document.getElementById('speed-input');
const marginLInput  = document.getElementById('margin-left-input');
const marginRInput  = document.getElementById('margin-right-input');
const pauseOverlay  = document.getElementById('pause-overlay');
const statusDot     = document.getElementById('status-dot');
const statusLabel   = document.getElementById('status-label');
const statusSpeed   = document.getElementById('status-speed');
const statusMargin  = document.getElementById('status-margin');
const statusPct     = document.getElementById('status-pct');
const progressBar   = document.getElementById('progress-bar');
const hudPlayBtn    = document.getElementById('hud-play-btn');
const countdownOverlay = document.getElementById('countdown-overlay');
const countdownNum     = document.getElementById('countdown-num');
const guideLeft        = document.getElementById('guide-left');
const guideRight       = document.getElementById('guide-right');

// ── MARGIN HELPERS ────────────────────────────────────────
function applyMargins() {
  document.documentElement.style.setProperty('--margin-left',  marginLeft  + 'vw');
  document.documentElement.style.setProperty('--margin-right', marginRight + 'vw');
  marginLInput.value = marginLeft;
  marginRInput.value = marginRight;
  statusMargin.textContent = marginLeft + '·' + marginRight;
  if (teleView.classList.contains('active')) {
    // Remeasure after CSS update
    requestAnimationFrame(() => {
      trackHeight = scrollTrack.scrollHeight;
      containerHeight = document.getElementById('scroll-container').clientHeight;
    });
  }
}

function flashGuides() {
  guideLeft.classList.add('visible');
  guideRight.classList.add('visible');
  clearTimeout(guideTimer);
  guideTimer = setTimeout(() => {
    guideLeft.classList.remove('visible');
    guideRight.classList.remove('visible');
  }, 1200);
}

function adjustMarginLeft(delta) {
  marginLeft = Math.max(0, Math.min(45, marginLeft + delta));
  applyMargins();
  flashGuides();
  showHudBriefly();
}

function adjustMarginRight(delta) {
  marginRight = Math.max(0, Math.min(45, marginRight + delta));
  applyMargins();
  flashGuides();
  showHudBriefly();
}

// ── FONT SIZE HELPERS ─────────────────────────────────────
function adjustFontSize(delta) {
  fontSize = Math.max(12, Math.min(200, fontSize + delta));
  document.documentElement.style.setProperty('--font-size', fontSize + 'px');
  fontSizeInput.value = fontSize;
  if (teleView.classList.contains('active')) {
    requestAnimationFrame(() => {
      trackHeight = scrollTrack.scrollHeight;
      containerHeight = document.getElementById('scroll-container').clientHeight;
    });
  }
  showHudBriefly();
}

// ── EDITOR ────────────────────────────────────────────────
scriptEditor.addEventListener('input', () => {
  const t = scriptEditor.value.trim();
  document.getElementById('char-count').textContent = (t ? t.split(/\s+/).length : 0) + ' words';
});

fontSizeInput.addEventListener('input', () => {
  fontSize = Math.max(12, Math.min(200, parseInt(fontSizeInput.value) || 48));
  document.documentElement.style.setProperty('--font-size', fontSize + 'px');
});
fontSizeInput.addEventListener('change', () => { fontSizeInput.value = fontSize; });

speedInput.addEventListener('change', () => {
  currentSpeed = Math.max(5, Math.min(500, parseInt(speedInput.value) || 60));
  speedInput.value = currentSpeed;
});

marginLInput.addEventListener('input', () => {
  marginLeft = Math.max(0, Math.min(45, parseInt(marginLInput.value) || 0));
  applyMargins();
});
marginLInput.addEventListener('change', () => { marginLInput.value = marginLeft; });

marginRInput.addEventListener('input', () => {
  marginRight = Math.max(0, Math.min(45, parseInt(marginRInput.value) || 0));
  applyMargins();
});
marginRInput.addEventListener('change', () => { marginRInput.value = marginRight; });

// ── COUNTDOWN ─────────────────────────────────────────────
function runCountdown(cb) {
  countdownActive = true;
  countdownOverlay.classList.add('active');
  statusDot.className = 'status-dot countdown';
  statusLabel.textContent = 'STARTING';
  let n = 3;

  function tick() {
    countdownNum.textContent = n;
    countdownNum.classList.remove('pop');
    void countdownNum.offsetWidth;
    countdownNum.classList.add('pop');
    if (n === 0) {
      setTimeout(() => {
        countdownOverlay.classList.remove('active');
        countdownActive = false;
        cb();
      }, 400);
      return;
    }
    n--;
    setTimeout(tick, 1000);
  }
  tick();
}

// ── START / EXIT ──────────────────────────────────────────
function startTeleprompter() {
  const text = scriptEditor.value.trim();
  if (!text) { alert('Paste some text first.'); return; }
  fontSize    = Math.max(12, Math.min(200, parseInt(fontSizeInput.value) || 48));
  currentSpeed = Math.max(5, Math.min(500, parseInt(speedInput.value) || 60));
  marginLeft  = Math.max(0, Math.min(45, parseInt(marginLInput.value) || 0));
  marginRight = Math.max(0, Math.min(45, parseInt(marginRInput.value) || 0));
  document.documentElement.style.setProperty('--font-size', fontSize + 'px');
  applyMargins();
  scrollText.textContent = text;
  scrollPos = 0;
  scrollTrack.style.transform = 'translateY(0px)';
  editorView.style.display = 'none';
  teleView.classList.add('active');

  requestAnimationFrame(() => requestAnimationFrame(() => {
    trackHeight = scrollTrack.scrollHeight;
    containerHeight = document.getElementById('scroll-container').clientHeight;
    isPlaying = false;
    updateStatusUI();
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(scrollStep);

    showHudBriefly();
    runCountdown(() => {
      isPlaying = true;
      lastTime = null;
      updateStatusUI();
    });
  }));
}

function exitTeleprompter() {
  isPlaying = false; countdownActive = false;
  countdownOverlay.classList.remove('active');
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  teleView.classList.remove('active');
  editorView.style.display = 'flex';
  if (document.fullscreenElement) document.exitFullscreen();
}

// ── SCROLL LOOP ───────────────────────────────────────────
function scrollStep(ts) {
  const maxScroll = trackHeight - containerHeight;

  if (rewindHeld && !countdownActive) {
    if (lastTime !== null) {
      const dt = (ts - lastTime) / 1000;
      scrollPos = Math.max(0, scrollPos - currentSpeed * 2.5 * dt);
      scrollTrack.style.transform = `translateY(${-scrollPos}px)`;
      updateProgress(maxScroll);
    }
    lastTime = ts;
    rafId = requestAnimationFrame(scrollStep);
    return;
  }

  if (!isPlaying || countdownActive) { lastTime = null; rafId = requestAnimationFrame(scrollStep); return; }
  if (lastTime === null) { lastTime = ts; rafId = requestAnimationFrame(scrollStep); return; }

  const dt = (ts - lastTime) / 1000; lastTime = ts;
  scrollPos += currentSpeed * dt;
  const maxS = Math.max(0, maxScroll);
  if (scrollPos >= maxS) { scrollPos = maxS; isPlaying = false; updateStatusUI(); }
  scrollTrack.style.transform = `translateY(${-scrollPos}px)`;
  updateProgress(maxS);
  rafId = requestAnimationFrame(scrollStep);
}

function updateProgress(maxScroll) {
  const pct = maxScroll > 0 ? Math.min(100, (scrollPos / maxScroll) * 100) : 0;
  progressBar.style.width = pct.toFixed(1) + '%';
  statusPct.textContent = Math.floor(pct) + '%';
}

function nudgeScroll(delta) {
  // Manual step scroll (works while paused or rolling)
  if (countdownActive) return;
  const maxScroll = Math.max(0, trackHeight - containerHeight);
  scrollPos = Math.max(0, Math.min(maxScroll, scrollPos + delta));
  scrollTrack.style.transform = `translateY(${-scrollPos}px)`;
  updateProgress(maxScroll);
  lastTime = null; // reset frame timing to avoid jump on resume
}

// ── CONTROLS ─────────────────────────────────────────────
function togglePlay() {
  if (countdownActive) return;
  isPlaying = !isPlaying;
  if (isPlaying) lastTime = null;
  updateStatusUI();
}
function resetScroll() {
  scrollPos = 0; scrollTrack.style.transform = 'translateY(0px)';
  isPlaying = true; lastTime = null; updateStatusUI();
}
function updateStatusUI() {
  if (countdownActive) return;
  pauseOverlay.classList.toggle('visible', !isPlaying);
  statusDot.className = 'status-dot' + (isPlaying ? '' : ' paused');
  statusLabel.textContent = isPlaying ? 'ROLLING' : 'PAUSED';
  hudPlayBtn.textContent = isPlaying ? '⏸ Pause' : '▶ Play';
  statusSpeed.textContent = currentSpeed;
  speedInput.value = currentSpeed;
}
function adjustSpeed(delta) {
  currentSpeed = Math.max(5, Math.min(500, currentSpeed + delta));
  statusSpeed.textContent = currentSpeed;
  speedInput.value = currentSpeed;
  showHudBriefly();
}

// ── KEYBOARD ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!teleView.classList.contains('active')) return;
  if (listeningFor) return;
  const code = e.code;

  if      (code === hotkeys.togglePlay)       { e.preventDefault(); togglePlay(); }
  else if (code === hotkeys.speedUp)          { e.preventDefault(); adjustSpeed(+5); }
  else if (code === hotkeys.speedDown)        { e.preventDefault(); adjustSpeed(-5); }
  else if (code === hotkeys.speedUpLarge)     { e.preventDefault(); adjustSpeed(+25); }
  else if (code === hotkeys.speedDownLarge)   { e.preventDefault(); adjustSpeed(-25); }
  else if (code === hotkeys.rewind)           { e.preventDefault(); rewindHeld = true; lastTime = null; }
  else if (code === hotkeys.reset)            { e.preventDefault(); resetScroll(); }
  else if (code === hotkeys.exit)             { exitTeleprompter(); }
  else if (code === hotkeys.fullscreen) {
    e.preventDefault();
    if (!document.fullscreenElement) teleView.requestFullscreen().catch(()=>{});
    else document.exitFullscreen();
  }
  else if (code === hotkeys.fontSizeUp)       { e.preventDefault(); adjustFontSize(+4); }
  else if (code === hotkeys.fontSizeDown)     { e.preventDefault(); adjustFontSize(-4); }
  else if (code === hotkeys.marginLeftUp)     { e.preventDefault(); adjustMarginLeft(+1); }
  else if (code === hotkeys.marginLeftDown)   { e.preventDefault(); adjustMarginLeft(-1); }
  else if (code === hotkeys.marginRightUp)    { e.preventDefault(); adjustMarginRight(+1); }
  else if (code === hotkeys.marginRightDown)  { e.preventDefault(); adjustMarginRight(-1); }
  else if (code === hotkeys.scrollStepDown)   { e.preventDefault(); nudgeScroll(+SCROLL_STEP); }
  else if (code === hotkeys.scrollStepUp)     { e.preventDefault(); nudgeScroll(-SCROLL_STEP); }

  showHudBriefly();
});

document.addEventListener('keyup', e => {
  if (e.code === hotkeys.rewind) { rewindHeld = false; lastTime = null; }
});

// ── HUD AUTO-HIDE ─────────────────────────────────────────
function showHudBriefly() {
  teleView.classList.add('hud-visible');
  clearTimeout(hudTimer);
  hudTimer = setTimeout(() => teleView.classList.remove('hud-visible'), 2500);
}
teleView.addEventListener('mousemove', showHudBriefly);

// ── HOTKEY MODAL ─────────────────────────────────────────
let listeningFor = null;

function buildHkGrid() {
  const grid = document.getElementById('hk-grid');
  grid.innerHTML = '';

  HK_GROUPS.forEach(group => {
    // Section header spanning both columns
    const hdr = document.createElement('div');
    hdr.className = 'hk-section-label';
    hdr.textContent = group.label;
    grid.appendChild(hdr);

    group.actions.forEach(action => {
      const row = document.createElement('div');
      row.className = 'hk-row';
      row.innerHTML = `
        <span class="hk-action">${ACTION_LABELS[action]}</span>
        <button class="hk-key-btn" data-action="${action}">${keyLabel(hotkeys[action])}</button>
      `;
      grid.appendChild(row);
    });
  });

  grid.querySelectorAll('.hk-key-btn').forEach(btn => {
    btn.addEventListener('click', () => startListening(btn.dataset.action));
  });
}

function startListening(action) {
  if (listeningFor) cancelListening();
  listeningFor = action;
  const btn = document.querySelector(`.hk-key-btn[data-action="${action}"]`);
  if (btn) { btn.textContent = '…'; btn.classList.add('listening'); }
}

function cancelListening() {
  if (!listeningFor) return;
  const btn = document.querySelector(`.hk-key-btn[data-action="${listeningFor}"]`);
  if (btn) { btn.textContent = keyLabel(hotkeys[listeningFor]); btn.classList.remove('listening'); }
  listeningFor = null;
}

document.addEventListener('keydown', e => {
  if (!listeningFor) return;
  e.preventDefault(); e.stopPropagation();
  const code = e.code;
  if (code === 'Escape') { cancelListening(); return; }
  hotkeys[listeningFor] = code;
  const btn = document.querySelector(`.hk-key-btn[data-action="${listeningFor}"]`);
  if (btn) { btn.textContent = keyLabel(code); btn.classList.remove('listening'); }
  listeningFor = null;
}, true);

function openHotkeyModal() {
  buildHkGrid();
  document.getElementById('hotkey-modal').classList.add('open');
}
function closeHotkeyModal() {
  cancelListening();
  document.getElementById('hotkey-modal').classList.remove('open');
}
function resetHotkeys() {
  hotkeys = { ...DEFAULT_HOTKEYS };
  buildHkGrid();
}
document.getElementById('hotkey-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('hotkey-modal')) closeHotkeyModal();
});

// ── SAVE / LOAD ───────────────────────────────────────────
function saveSettings() {
  const data = {
    fontSize: parseInt(fontSizeInput.value) || 48,
    speed: parseInt(speedInput.value) || 60,
    marginLeft: parseInt(marginLInput.value) || 8,
    marginRight: parseInt(marginRInput.value) || 8,
    hotkeys: { ...hotkeys },
    script: scriptEditor.value
  };
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' })),
    download: 'prompter-settings.json'
  });
  a.click(); URL.revokeObjectURL(a.href);
}

function loadSettings(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.fontSize)   { fontSize = d.fontSize; fontSizeInput.value = fontSize; document.documentElement.style.setProperty('--font-size', fontSize + 'px'); }
      if (d.speed)      { currentSpeed = d.speed; speedInput.value = currentSpeed; }
      if (d.marginLeft  != null) { marginLeft  = d.marginLeft;  }
      if (d.marginRight != null) { marginRight = d.marginRight; }
      applyMargins();
      if (d.hotkeys && typeof d.hotkeys === 'object') { hotkeys = { ...DEFAULT_HOTKEYS, ...d.hotkeys }; }
      if (typeof d.script === 'string') { scriptEditor.value = d.script; scriptEditor.dispatchEvent(new Event('input')); }
    } catch { alert('Invalid JSON file.'); }
  };
  r.readAsText(file); e.target.value = '';
}

// ── RESIZE ────────────────────────────────────────────────
window.addEventListener('resize', () => {
  if (teleView.classList.contains('active')) {
    trackHeight = scrollTrack.scrollHeight;
    containerHeight = document.getElementById('scroll-container').clientHeight;
  }
});
</script>
