<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111118">
<title>Spritebox</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
html{overflow:hidden;position:fixed;width:100%;height:100%;touch-action:none;overscroll-behavior:none}
body{overflow:hidden;position:fixed;width:100%;height:100%;touch-action:none;overscroll-behavior:none;background:#111118;color:#c8c8dd;font-family:'SF Mono','Menlo','Consolas','Courier New',monospace;font-size:13px;display:flex;flex-direction:column;height:100dvh}

/* ── TOP BAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:#18182a;border-bottom:1px solid #28284a;flex-shrink:0;min-height:48px;z-index:100}
.topbar-group{display:flex;gap:6px}
.topbar h1{font-size:14px;font-weight:800;color:#7b7bbb;letter-spacing:2px;text-transform:uppercase}
.btn{min-width:44px;min-height:44px;display:inline-flex;align-items:center;justify-content:center;gap:5px;background:#222240;border:1px solid #333360;border-radius:8px;color:#a0a0cc;cursor:pointer;padding:6px 10px;font-size:12px;font-family:inherit;transition:background .12s,border-color .12s}
.btn:active{background:#333366}
.btn.on{background:#3d3d70;border-color:#6666aa;color:#d8d8ff}
.btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn.sm{min-width:44px;min-height:44px;padding:4px 10px;font-size:11px;border-radius:6px}

/* ── DRAWERS ── */
.drawer{overflow:hidden;max-height:0;transition:max-height .2s ease;background:#1a1a30;border-bottom:1px solid #28284a;flex-shrink:0;z-index:90}
.drawer.open{max-height:260px}
.drawer-inner{display:flex;flex-wrap:wrap;gap:6px;padding:10px}
.drawer-row{width:100%;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.drawer-label{width:100%;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#5555aa;margin-bottom:2px;margin-top:6px}
.drawer-label:first-child{margin-top:0}
.num-input{width:48px;background:#222240;border:1px solid #333360;border-radius:5px;color:#c8c8dd;padding:5px;font-size:12px;font-family:inherit;text-align:center;-webkit-user-select:text;user-select:text}

/* ── CANVAS AREA ── */
.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;min-height:0}
#spriteCanvas{image-rendering:pixelated;touch-action:none}
.onion-layer{position:absolute;pointer-events:none;image-rendering:pixelated}
#onionPrev{opacity:.25}
#onionNext{opacity:.15}

/* ── TAB BAR ── */
.tabbar{display:flex;align-items:center;gap:5px;padding:5px 10px;background:#18182a;border-top:1px solid #28284a;border-bottom:1px solid #28284a;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;min-height:46px;scrollbar-width:none}
.tabbar::-webkit-scrollbar{display:none}
.tab{position:relative;min-width:44px;height:34px;display:flex;align-items:center;justify-content:center;background:#222240;border:1px solid #333360;border-radius:6px;color:#8888aa;font-size:12px;font-weight:600;padding:0 14px;cursor:pointer;flex-shrink:0;transition:background .12s}
.tab.active{background:#3d3d70;border-color:#6666aa;color:#e0e0ff}
.tab-x{position:absolute;top:-7px;right:-7px;width:22px;height:22px;background:#aa3333;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;border:2px solid #111118;line-height:1}
.tab.active .tab-x{display:flex}
.tab-add{background:transparent;border:1px dashed #444466;color:#5555aa;font-size:20px;font-weight:400}

/* ── PALETTE ── */
.palette-area{padding:6px 10px 10px;background:#18182a;border-top:1px solid #28284a;flex-shrink:0}
.pal-info{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.pal-info-swatch{width:24px;height:24px;border-radius:4px;border:1px solid #333360;flex-shrink:0}
.pal-info-swatch.is-trans{background-image:linear-gradient(45deg,#555 25%,transparent 25%),linear-gradient(-45deg,#555 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#555 75%),linear-gradient(-45deg,transparent 75%,#555 75%);background-size:8px 8px;background-position:0 0,0 4px,4px -4px,-4px 0}
.pal-info-label{font-size:11px;color:#6666aa}
.palette-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:3px}
.sw{aspect-ratio:1;border-radius:4px;border:2px solid transparent;cursor:pointer;min-height:34px;position:relative;transition:border-color .1s}
.sw.sel{border-color:#fff;box-shadow:0 0 5px rgba(255,255,255,.35)}
.sw.tr{background-image:linear-gradient(45deg,#555 25%,transparent 25%),linear-gradient(-45deg,#555 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#555 75%),linear-gradient(-45deg,transparent 75%,#555 75%);background-size:8px 8px;background-position:0 0,0 4px,4px -4px,-4px 0}
.sw.tr::after{content:‘T’;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;text-shadow:0 1px 2px #000}

/* ── OVERLAYS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;display:none;align-items:center;justify-content:center}
.overlay.show{display:flex}
.panel{background:#1c1c34;border:1px solid #333360;border-radius:12px;padding:16px;width:88%;max-width:320px}
.panel h3{font-size:14px;color:#8888cc;margin-bottom:12px;font-weight:700}
.panel-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;color:#9999bb}
.panel-row input[type=“range”]{flex:1;accent-color:#6666aa}
.panel-row .rv{min-width:24px;text-align:right;font-size:12px;font-variant-numeric:tabular-nums}
.panel-preview{width:100%;height:36px;border-radius:6px;margin:8px 0;border:1px solid #333360}
.panel-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.btn-ok{background:#2a4a2a;border-color:#44aa44;color:#bbffbb}
.btn-danger{background:#4a2a2a;border-color:#aa4444;color:#ffbbbb}

/* ── ANIMATION CONTROLS ── */
.anim-bar{display:none;flex-direction:column;align-items:center;gap:10px;padding:14px 10px;background:#18182a;border-top:1px solid #28284a;flex-shrink:0}
.anim-bar.show{display:flex}
.fps-row{display:flex;align-items:center;gap:10px;width:100%}
.fps-row input[type=“range”]{flex:1;accent-color:#6666aa}
.fps-label{font-size:12px;color:#8888aa;min-width:60px;font-variant-numeric:tabular-nums}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(60,60,110,.92);color:#d8d8ff;padding:7px 16px;border-radius:20px;font-size:12px;z-index:700;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

.hidden{position:absolute;opacity:0;pointer-events:none;width:0;height:0}

/* ── IMPORT SPRITE MODE ── */
.import-active .palette-area,.import-active .tabbar,.import-active .topbar{pointer-events:none;opacity:.3}
.import-img{position:absolute;image-rendering:pixelated;opacity:.85;pointer-events:none;transform-origin:0 0;z-index:10;border:1px dashed rgba(255,255,255,.35)}
.import-bar{position:fixed;bottom:0;left:0;right:0;display:none;align-items:center;justify-content:center;gap:12px;padding:14px 10px;background:linear-gradient(transparent,rgba(17,17,24,.95) 30%);z-index:200}
.import-bar.show{display:flex}
.import-bar .btn{min-width:80px;font-size:13px;font-weight:600}
.import-hint{position:fixed;top:56px;left:50%;transform:translateX(-50%);background:rgba(60,60,110,.92);color:#d8d8ff;padding:7px 14px;border-radius:8px;font-size:11px;z-index:200;display:none;white-space:nowrap;text-align:center;line-height:1.4}
.import-hint.show{display:block}

/* ── TAB CONTEXT MENU ── */
.tab-menu{position:fixed;z-index:400;background:#1c1c34;border:1px solid #333360;border-radius:10px;padding:6px;display:none;flex-direction:column;gap:2px;min-width:140px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.tab-menu.show{display:flex}
.tab-menu .btn{width:100%;justify-content:flex-start;border:none;background:transparent;border-radius:6px;font-size:13px;min-height:40px}
.tab-menu .btn:active{background:#333366}

/* ── CARVE MODE ── */
.carve-overlay{position:fixed;inset:0;background:#0d0d18;z-index:300;display:none;flex-direction:column}
.carve-overlay.show{display:flex}
.carve-topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:#18182a;border-bottom:1px solid #28284a;flex-shrink:0;min-height:48px;z-index:310}
.carve-topbar h2{font-size:13px;font-weight:700;color:#7b7bbb;letter-spacing:1.5px;text-transform:uppercase}
.carve-dims{display:flex;align-items:center;gap:6px;font-size:12px;color:#8888aa}
.carve-dims .num-input{width:42px;min-height:36px}
.carve-canvas-wrap{flex:1;overflow:hidden;position:relative;min-height:0;touch-action:none;cursor:crosshair}
#carveCanvas{image-rendering:pixelated;position:absolute;left:0;top:0;transform-origin:0 0}
.carve-selection{position:absolute;border:2px solid #ffcc00;background:rgba(255,204,0,.08);pointer-events:none;z-index:5;box-shadow:0 0 0 1px rgba(0,0,0,.6),0 0 12px rgba(255,204,0,.25);transition:opacity .15s}
.carve-selection.pulse{animation:carvePulse .4s ease}
@keyframes carvePulse{0%{background:rgba(255,204,0,.08)}50%{background:rgba(100,255,100,.25);border-color:#66ff66}100%{background:rgba(255,204,0,.08);border-color:#ffcc00}}
.carve-grid-line{position:absolute;background:rgba(255,255,255,.06);pointer-events:none;z-index:2}
.carve-bottombar{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:#18182a;border-top:1px solid #28284a;flex-shrink:0;min-height:52px;gap:8px;z-index:310}
.carve-bottombar .carve-info{font-size:11px;color:#6666aa;flex:1;text-align:center;line-height:1.4}
.carve-thumb-strip{display:flex;gap:4px;padding:6px 10px 2px;background:#14142a;border-top:1px solid #22224a;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;min-height:0;scrollbar-width:none;z-index:310}
.carve-thumb-strip::-webkit-scrollbar{display:none}
.carve-thumb-strip:empty{display:none;padding:0;min-height:0}
.carve-thumb{width:40px;height:40px;border-radius:5px;border:1px solid #333360;background:#111120;flex-shrink:0;image-rendering:pixelated;object-fit:contain;padding:2px}
.carve-thumb.latest{border-color:#ffcc00;box-shadow:0 0 6px rgba(255,204,0,.3)}
.carve-snap-toggle{font-size:11px;display:flex;align-items:center;gap:5px;color:#8888aa;cursor:pointer;padding:4px 8px;border-radius:5px;background:#222240;border:1px solid #333360}
.carve-snap-toggle.on{color:#bbddff;border-color:#5577aa;background:#2a3a50}
.carve-snap-toggle input{display:none}
.carve-crosshair-h,.carve-crosshair-v{position:absolute;pointer-events:none;z-index:3}
.carve-crosshair-h{height:1px;left:0;right:0;background:rgba(255,204,0,.15)}
.carve-crosshair-v{width:1px;top:0;bottom:0;background:rgba(255,204,0,.15)}
.carve-coord{position:absolute;top:6px;left:50%;transform:translateX(-50%);background:rgba(30,30,60,.85);color:#aaaadd;font-size:10px;padding:3px 8px;border-radius:4px;z-index:6;pointer-events:none;font-variant-numeric:tabular-nums;letter-spacing:.5px;white-space:nowrap}
</style>

</head>
<body>

<div class="topbar">
  <div class="topbar-group">
    <button class="btn" id="btnTools" aria-label="Tools"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4z"/></svg></button>
    <button class="btn" id="btnSettings" aria-label="Settings"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></button>
  </div>
  <h1>Spritebox</h1>
  <div class="topbar-group">
    <button class="btn" id="btnSave" aria-label="Save"><svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg></button>
    <button class="btn" id="btnLoad" aria-label="Load"><svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg></button>
  </div>
</div>

<!-- Tools drawer -->

<div class="drawer" id="toolsDrawer"><div class="drawer-inner">
  <button class="btn tool-btn" data-tool="line"><svg viewBox="0 0 24 24" width="14" height="14"><line x1="5" y1="19" x2="19" y2="5"/></svg>Line</button>
  <button class="btn tool-btn" data-tool="rect"><svg viewBox="0 0 24 24" width="14" height="14"><rect x="4" y="4" width="16" height="16" rx="1"/></svg>Rect</button>
  <button class="btn tool-btn" data-tool="fill"><svg viewBox="0 0 24 24" width="14" height="14"><path d="M12 2v6m0 0l-3-3m3 3l3-3M2 12h6m0 0L5 9m3 3L5 15M22 12h-6m0 0l3-3m-3 3l3 3M12 22v-6m0 0l3 3m-3-3l-3 3"/></svg>Fill</button>
  <button class="btn tool-btn" data-tool="eraser"><svg viewBox="0 0 24 24" width="14" height="14"><path d="M20 20H7L3 16l9-9 8 8-4 4z"/></svg>Eraser</button>
</div></div>

<!-- Settings drawer -->

<div class="drawer" id="settingsDrawer"><div class="drawer-inner">
  <div class="drawer-label">View</div>
  <div class="drawer-row">
    <button class="btn sm" id="tZoom">Zoom/Pan</button>
    <button class="btn sm" id="tDrawZ">Draw+Zoom</button>
    <button class="btn sm" id="tOnion">Onion</button>
  </div>
  <div class="drawer-label">Gestures</div>
  <div class="drawer-row">
    <button class="btn sm on" id="tPinch">Pinch Zoom</button>
    <button class="btn sm on" id="tGestUndo">2F Undo</button>
  </div>
  <div class="drawer-label">Sprite Size</div>
  <div class="drawer-row">
    <span style="font-size:12px;color:#8888aa">W</span><input class="num-input" id="inW" type="number" min="1" max="100" value="16">
    <span style="font-size:12px;color:#8888aa">H</span><input class="num-input" id="inH" type="number" min="1" max="100" value="24">
    <button class="btn sm" id="btnResize">Apply</button>
  </div>
  <div class="drawer-label">Palette File</div>
  <div class="drawer-row">
    <button class="btn sm" id="btnPalImp">Import</button>
    <button class="btn sm" id="btnPalExp">Export</button>
  </div>
</div></div>

<!-- Canvas -->

<div class="canvas-wrap" id="canvasWrap">
  <canvas id="onionPrev" class="onion-layer"></canvas>
  <canvas id="onionNext" class="onion-layer"></canvas>
  <canvas id="spriteCanvas"></canvas>
</div>

<!-- Tabs -->

<div class="tabbar" id="tabbar"></div>

<!-- Palette -->

<div class="palette-area" id="paletteArea">
  <div class="pal-info"><div class="pal-info-swatch" id="palPreview"></div><span class="pal-info-label" id="palLabel">Transparent</span></div>
  <div class="palette-grid" id="palGrid"></div>
</div>

<!-- Animation bar -->

<div class="anim-bar" id="animBar">
  <div class="fps-row">
    <span class="fps-label">FPS: <span id="fpsVal">8</span></span>
    <input type="range" id="fpsSlider" min="1" max="30" value="8">
  </div>
  <button class="btn" id="btnPlay">▶ Play</button>
</div>

<!-- Color picker overlay -->

<div class="overlay" id="pickerOverlay">
  <div class="panel">
    <h3>SNES Color</h3>
    <div class="panel-row">R <input type="range" id="pR" min="0" max="31" value="0"> <span class="rv" id="pRv">0</span></div>
    <div class="panel-row">G <input type="range" id="pG" min="0" max="31" value="0"> <span class="rv" id="pGv">0</span></div>
    <div class="panel-row">B <input type="range" id="pB" min="0" max="31" value="0"> <span class="rv" id="pBv">0</span></div>
    <div class="panel-preview" id="pPrev"></div>
    <div class="panel-actions">
      <button class="btn" id="pCancel">Cancel</button>
      <button class="btn btn-ok" id="pOk">OK</button>
    </div>
  </div>
</div>

<!-- Save overlay -->

<div class="overlay" id="saveOverlay">
  <div class="panel">
    <h3>Save / Export</h3>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">
      <button class="btn" id="btnExpPNG" style="width:100%;justify-content:center">Export PNG Sprite Sheet</button>
      <button class="btn" id="btnSaveJSON" style="width:100%;justify-content:center">Save JSON</button>
      <button class="btn" id="btnImportSprite" style="width:100%;justify-content:center;border-color:#6666aa">Import Sprite Image</button>
      <button class="btn" id="btnCarveSheet" style="width:100%;justify-content:center;border-color:#ffcc00;color:#ffdd88;background:#2a2a10">✂ Carve from Sheet</button>
      <button class="btn" id="btnCloseSave" style="width:100%;justify-content:center;opacity:.7">Close</button>
    </div>
  </div>
</div>

<!-- Import sprite bar -->

<div class="import-bar" id="importBar">
  <button class="btn btn-danger" id="importCancel">✕ Cancel</button>
  <button class="btn btn-ok" id="importConfirm">✓ Stamp</button>
</div>
<div class="import-hint" id="importHint">Pinch to resize · Drag to position<br>Tap ✓ to stamp into grid</div>

<!-- Confirm dialog -->

<div class="overlay" id="confirmOverlay">
  <div class="panel" style="text-align:center">
    <p id="confirmMsg" style="margin-bottom:16px;font-size:14px"></p>
    <div class="panel-actions" style="justify-content:center">
      <button class="btn" id="confirmNo">Cancel</button>
      <button class="btn btn-danger" id="confirmYes">Delete</button>
    </div>
  </div>
</div>

<!-- Tab context menu -->

<div class="tab-menu" id="tabMenu">
  <button class="btn" id="tmDup">Duplicate</button>
  <button class="btn" id="tmLeft">Move Left</button>
  <button class="btn" id="tmRight">Move Right</button>
</div>

<input type="file" class="hidden" id="fJSON" accept=".json">
<input type="file" class="hidden" id="fPal" accept=".json">
<input type="file" class="hidden" id="fImg" accept="image/*">
<input type="file" class="hidden" id="fCarveImg" accept="image/*">

<!-- Carve Mode Overlay -->

<div class="carve-overlay" id="carveOverlay">
  <div class="carve-topbar">
    <button class="btn" id="carveClose" aria-label="Close">✕</button>
    <h2>✂ Carve</h2>
    <div class="carve-dims">
      <span>W</span><input class="num-input" id="carveW" type="number" min="1" max="128" value="16">
      <span>×</span>
      <span>H</span><input class="num-input" id="carveH" type="number" min="1" max="128" value="24">
    </div>
  </div>
  <div class="carve-coord" id="carveCoord" style="display:none">0, 0</div>
  <div class="carve-canvas-wrap" id="carveWrap">
    <canvas id="carveCanvas"></canvas>
    <div class="carve-selection" id="carveSel"></div>
    <div class="carve-crosshair-h" id="carveCH" style="display:none"></div>
    <div class="carve-crosshair-v" id="carveCV" style="display:none"></div>
  </div>
  <div class="carve-thumb-strip" id="carveStrip"></div>
  <div class="carve-bottombar">
    <label class="carve-snap-toggle on" id="carveSnapLabel"><input type="checkbox" id="carveSnap" checked>⊞ Grid</label>
    <span class="carve-info">Drag to position · Long press to carve</span>
    <button class="btn sm btn-ok" id="carveTap" style="font-size:13px;min-width:54px">✂ Carve</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
//  STATE
// ============================================================
const S = {
  w: 16, h: 24,
  tabs: [],          // {px:[][], undo:[], redo:[]}
  at: 0,             // active tab
  pal: [],           // 32, index 0 = null (transparent)
  ac: 1,             // active color index
  tool: null,        // null|'line'|'rect'|'fill'|'eraser'
  zoomPan: false,
  drawZoomed: false,
  onion: false,
  gestPinch: true,
  gestUndo: true,
  animMode: false,
  animPlay: false,
  animFps: 8,
  animFrame: 0,
  animTimer: null,
  zoom: 1, panX: 0, panY: 0,
  // transient
  lineStart: null,
  preview: null,
  pickerSlot: -1,
  confirmCb: null,
  menuTab: -1,
};

// ============================================================
//  SNES 15-BIT COLOR
// ============================================================
const snes = (r,g,b) => `rgb(${r*8},${g*8},${b*8})`;

function initPalette() {
  S.pal = [
    null, snes(0,0,0), snes(31,31,31), snes(16,16,16), snes(8,8,8), snes(24,24,24),
    snes(31,0,0), snes(20,0,0), snes(31,16,0), snes(31,31,0), snes(16,31,0),
    snes(0,31,0), snes(0,16,0), snes(0,31,16), snes(0,31,31), snes(0,16,31),
    snes(0,0,31), snes(0,0,16), snes(16,0,31), snes(31,0,31), snes(31,0,16),
    snes(24,16,8), snes(16,8,0), snes(31,24,16), snes(24,16,12), snes(16,10,6),
    snes(12,20,28), snes(20,28,20), snes(28,28,16), snes(28,20,24), snes(20,12,24), snes(8,16,8),
  ];
}

// ============================================================
//  PIXEL / TAB HELPERS
// ============================================================
const mkPx = (w,h) => Array.from({length:h}, ()=> new Array(w).fill(0));
const clonePx = px => px.map(r=>[...r]);
const mkTab = px => ({px: px||mkPx(S.w,S.h), undo:[], redo:[]});

function saveUndo(){
  const t=S.tabs[S.at]; t.undo.push(clonePx(t.px));
  if(t.undo.length>10) t.undo.shift(); t.redo=[];
}
function undo(){
  const t=S.tabs[S.at]; if(!t.undo.length) return;
  t.redo.push(clonePx(t.px)); if(t.redo.length>10) t.redo.shift();
  t.px=t.undo.pop(); render();
}
function redo(){
  const t=S.tabs[S.at]; if(!t.redo.length) return;
  t.undo.push(clonePx(t.px)); if(t.undo.length>10) t.undo.shift();
  t.px=t.redo.pop(); render();
}

// ============================================================
//  CANVAS RENDERING
// ============================================================
const cvs = document.getElementById('spriteCanvas');
const cx = cvs.getContext('2d');
const wrap = document.getElementById('canvasWrap');
const oPrev = document.getElementById('onionPrev');
const oNext = document.getElementById('onionNext');
const oPrevCx = oPrev.getContext('2d');
const oNextCx = oNext.getContext('2d');

let checkerImg = null;

function mkChecker(sz){
  const c=document.createElement('canvas'); c.width=sz*2; c.height=sz*2;
  const x=c.getContext('2d');
  x.fillStyle='#26263a'; x.fillRect(0,0,sz*2,sz*2);
  x.fillStyle='#1e1e30'; x.fillRect(0,0,sz,sz); x.fillRect(sz,sz,sz,sz);
  checkerImg=c;
}

function cellSz(){
  const r=wrap.getBoundingClientRect();
  const pad=4;
  const cw=Math.floor((r.width-pad)/S.w);
  const ch=Math.floor((r.height-pad)/S.h);
  return Math.max(1,Math.min(cw,ch));
}

function resizeCvs(){
  const c=cellSz(), w=S.w*c, h=S.h*c;
  [cvs,oPrev,oNext].forEach(el=>{el.width=w;el.height=h;el.style.width=w+'px';el.style.height=h+'px'});
  mkChecker(Math.max(2,Math.floor(c/2)));
  applyZoom();
}

function applyZoom(){
  const t=`translate(${S.panX}px,${S.panY}px) scale(${S.zoom})`;
  [cvs,oPrev,oNext].forEach(el=>{el.style.transform=t});
}

function drawGrid(context,w,h,c){
  context.clearRect(0,0,w*c,h*c);
  // checker bg
  if(checkerImg) context.fillStyle=context.createPattern(checkerImg,'repeat');
  else context.fillStyle='#1e1e30';
  context.fillRect(0,0,w*c,h*c);
}

function drawPixels(context,px,c){
  const w=S.w,h=S.h;
  drawGrid(context,w,h,c);
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){
    const ci=px[y]?.[x]??0;
    if(ci===0) continue;
    const col=S.pal[ci]; if(!col) continue;
    context.fillStyle=col;
    context.fillRect(x*c,y*c,c,c);
  }
  // grid lines
  context.strokeStyle='rgba(200,200,255,.06)';
  context.lineWidth=1;
  context.beginPath();
  for(let x=0;x<=w;x++){context.moveTo(x*c+.5,0);context.lineTo(x*c+.5,h*c)}
  for(let y=0;y<=h;y++){context.moveTo(0,y*c+.5);context.lineTo(w*c,y*c+.5)}
  context.stroke();
}

function renderOnion(){
  oPrevCx.clearRect(0,0,oPrev.width,oPrev.height);
  oNextCx.clearRect(0,0,oNext.width,oNext.height);
  if(!S.onion||S.animMode){oPrev.style.display='none';oNext.style.display='none';return}
  const c=cellSz();
  const pi=S.at-1,ni=S.at+1;
  if(pi>=0){oPrev.style.display='block';drawOnionFrame(oPrevCx,S.tabs[pi].px,c)} else oPrev.style.display='none';
  if(ni<S.tabs.length){oNext.style.display='block';drawOnionFrame(oNextCx,S.tabs[ni].px,c)} else oNext.style.display='none';
}

function drawOnionFrame(context,px,c){
  context.clearRect(0,0,S.w*c,S.h*c);
  for(let y=0;y<S.h;y++) for(let x=0;x<S.w;x++){
    const ci=px[y]?.[x]??0; if(ci===0) continue;
    const col=S.pal[ci]; if(!col) continue;
    context.fillStyle=col;
    context.fillRect(x*c,y*c,c,c);
  }
}

function render(){
  drawPixels(cx,S.tabs[S.at].px,cellSz());
  renderOnion();
}

function renderWithPreview(pts){
  const c=cellSz();
  drawPixels(cx,S.tabs[S.at].px,c);
  if(!pts) return;
  for(const[x,y] of pts){
    if(x<0||x>=S.w||y<0||y>=S.h) continue;
    const ci=S.ac;
    if(ci===0){
      if(checkerImg) cx.fillStyle=cx.createPattern(checkerImg,'repeat');
      else cx.fillStyle='#1e1e30';
    } else {
      cx.fillStyle=S.pal[ci]||'#f0f';
    }
    cx.fillRect(x*c,y*c,c,c);
  }
}

    d.addEventListener('touchend',e=>{
      if(lp){clearTimeout(lp);lp=null}
      if(!moved){S.ac=i;renderPal()}

const tabbar=document.getElementById('tabbar');

function renderTabs(){

  S.tabs.forEach((_,i)=>{

    xb.addEventListener('pointerdown',e=>{
      e.stopPropagation();
      if(S.tabs.length<=1){toast('Need at least 1 frame');return}

      });
    });

    t.addEventListener('pointerdown',e=>{

    t.addEventListener('touchstart',e=>{

      lp=setTimeout(()=>{lp=null;showTabMenu(i,e.touches[0])},500);
    },{passive:true});

function showTabMenu(i,touch){

function hideTabMenu(){tabMenu.classList.remove('show');S.menuTab=-1}

document.getElementById('tmDup').onclick=()=>{

document.getElementById('tmLeft').onclick=()=>{

  [S.tabs[i-1],S.tabs[i]]=[S.tabs[i],S.tabs[i-1]];

document.addEventListener('pointerdown',e=>{

});

// ============================================================
//  DRAWING
// ============================================================
function cellFromTouch(t){
  const r=cvs.getBoundingClientRect();
  const c=cellSz()*S.zoom;
  return {x:Math.floor((t.clientX-r.left)/c), y:Math.floor((t.clientY-r.top)/c)};
}
const inB=(x,y)=>x>=0&&x<S.w&&y>=0&&y<S.h;

// Bresenham
function linePts(x0,y0,x1,y1){
  const pts=[];const dx=Math.abs(x1-x0),dy=Math.abs(y1-y0),sx=x0<x1?1:-1,sy=y0<y1?1:-1;let e=dx-dy;
  while(true){pts.push([x0,y0]);if(x0===x1&&y0===y1)break;const e2=2*e;if(e2>-dy){e-=dy;x0+=sx}if(e2<dx){e+=dx;y0+=sy}}
  return pts;
}
function rectPts(x0,y0,x1,y1){
  const pts=[];const mx=Math.min(x0,x1),Mx=Math.max(x0,x1),my=Math.min(y0,y1),My=Math.max(y0,y1);
  for(let x=mx;x<=Mx;x++){pts.push([x,my]);if(my!==My)pts.push([x,My])}
  for(let y=my+1;y<My;y++){pts.push([mx,y]);if(mx!==Mx)pts.push([Mx,y])}
  return pts;
}
function floodFill(sx,sy,nc){
  const px=S.tabs[S.at].px,tc=px[sy][sx];if(tc===nc)return;
  const stk=[[sx,sy]],vis=new Set();
  while(stk.length){const[cx,cy]=stk.pop();const k=cy*S.w+cx;
    if(vis.has(k)||!inB(cx,cy)||px[cy][cx]!==tc)continue;
    vis.add(k);px[cy][cx]=nc;
    stk.push([cx-1,cy],[cx+1,cy],[cx,cy-1],[cx,cy+1]);
  }
}

// ============================================================
//  TOUCH / GESTURE HANDLING
// ============================================================
const canDraw=()=>!S.animMode&&!(S.zoomPan&&!S.drawZoomed);

let ts={fingers:0,starts:[],lastDist:0,lastCY:0,gestured:false,drawn:[],undid:false};

cvs.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(impState) return; // import mode handles its own touches
  const tt=e.touches;
  ts.fingers=tt.length;ts.gestured=false;

  // 1-finger: pan or draw
  if(tt.length===1){
    if(S.zoomPan&&!S.drawZoomed){
      ts.starts=[{x:tt[0].clientX,y:tt[0].clientY}];
      return;
    }
    if(!canDraw()) return;
    const{x,y}=cellFromTouch(tt[0]);
    ts.drawn=[];ts.undid=false;
    if(S.tool==='line'||S.tool==='rect'){
      S.lineStart={x,y};S.preview=[[x,y]];renderWithPreview(S.preview);
    }else if(S.tool==='fill'){
      if(inB(x,y)){saveUndo();floodFill(x,y,S.ac);render()}
    }else if(S.tool==='eraser'){
      saveUndo();ts.undid=true;if(inB(x,y))S.tabs[S.at].px[y][x]=0;render();
    }else{
      saveUndo();ts.undid=true;
      if(inB(x,y)){S.tabs[S.at].px[y][x]=S.ac;ts.drawn.push(x+','+y)}
      render();
    }
  }

  if(tt.length>=2){
    ts.starts=Array.from(tt).map(t=>({x:t.clientX,y:t.clientY}));
    if(tt.length===2){
      const dx=tt[0].clientX-tt[1].clientX,dy=tt[0].clientY-tt[1].clientY;
      ts.lastDist=Math.hypot(dx,dy);
      ts.lastCY=(tt[0].clientY+tt[1].clientY)/2;
    }
  }
},{passive:false});

cvs.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(impState) return;
  const tt=e.touches;

  // 2-finger gestures
  if(tt.length===2){
    const dx=tt[0].clientX-tt[1].clientX,dy=tt[0].clientY-tt[1].clientY;
    const dist=Math.hypot(dx,dy);
    const cy=(tt[0].clientY+tt[1].clientY)/2;

    if(!ts.gestured){
      if(S.gestPinch&&Math.abs(dist-ts.lastDist)>12){ts.gestured=true}
      const dcy=cy-ts.lastCY;
      if(S.gestUndo&&Math.abs(dcy)>45){
        ts.gestured=true;
        if(dcy<0) undo(); else redo();
        ts.lastCY=cy;
        return;
      }
    }
    if(ts.gestured&&S.gestPinch){
      const sf=dist/ts.lastDist;
      S.zoom=Math.max(.5,Math.min(8,S.zoom*sf));
      ts.lastDist=dist;
      applyZoom();
    }
    return;
  }

  // 1-finger pan
  if(tt.length===1&&S.zoomPan&&!S.drawZoomed){
    if(ts.starts.length){
      S.panX+=tt[0].clientX-ts.starts[0].x;
      S.panY+=tt[0].clientY-ts.starts[0].y;
      ts.starts[0]={x:tt[0].clientX,y:tt[0].clientY};
      applyZoom();
    }
    return;
  }

  // 1-finger draw
  if(tt.length===1&&canDraw()){
    const{x,y}=cellFromTouch(tt[0]);
    if(S.tool==='line'&&S.lineStart){
      S.preview=linePts(S.lineStart.x,S.lineStart.y,x,y);renderWithPreview(S.preview);
    }else if(S.tool==='rect'&&S.lineStart){
      S.preview=rectPts(S.lineStart.x,S.lineStart.y,x,y);renderWithPreview(S.preview);
    }else if(S.tool==='eraser'){
      if(inB(x,y))S.tabs[S.at].px[y][x]=0;render();
    }else if(!S.tool){
      const k=x+','+y;
      if(!ts.drawn.includes(k)&&inB(x,y)){
        ts.drawn.push(k);S.tabs[S.at].px[y][x]=S.ac;render();
      }
    }
  }
},{passive:false});

cvs.addEventListener('touchend',e=>{
  e.preventDefault();
  if(impState) return;
  // finalize line/rect
  if(ts.fingers===1&&(S.tool==='line'||S.tool==='rect')&&S.lineStart&&S.preview){
    saveUndo();
    // apply undo BEFORE setting pixels, but we already saved, so set pixels on current
    // Wait - saveUndo saves current state, then we modify. That's correct.
    // But we need to undo the saveUndo and redo it fresh since pixels haven't changed yet for line/rect.
    // Actually saveUndo pushes current state to undo stack. Then we modify pixels. If user undoes, they get back the pre-modification state. This is correct.
    for(const[px,py] of S.preview){
      if(inB(px,py)) S.tabs[S.at].px[py][px]=S.ac;
    }
    S.lineStart=null;S.preview=null;render();
  }
  if(e.touches.length===0){
    ts.fingers=0;ts.starts=[];ts.gestured=false;ts.drawn=[];ts.undid=false;
  }
},{passive:false});

// 3-finger gesture on body
let tf3y=0;
document.body.addEventListener('touchstart',e=>{
  if(e.touches.length===3){
    tf3y=(e.touches[0].clientY+e.touches[1].clientY+e.touches[2].clientY)/3;
  }
},{passive:true});
document.body.addEventListener('touchmove',e=>{
  if(e.touches.length===3){
    const cy=(e.touches[0].clientY+e.touches[1].clientY+e.touches[2].clientY)/3;
    const d=cy-tf3y;
    if(Math.abs(d)>70){
      if(d>0&&!S.animMode) enterAnim();
      else if(d<0&&S.animMode) exitAnim();
      tf3y=cy;
    }
  }
},{passive:true});

const animBar=document.getElementById('animBar');
const paletteArea=document.getElementById('paletteArea');
const fpsSlider=document.getElementById('fpsSlider');
const fpsVal=document.getElementById('fpsVal');
const btnPlay=document.getElementById('btnPlay');

function enterAnim(){
  if(S.tabs.length<2){toast('Need 2+ frames');return}
  S.animMode=true;
  paletteArea.style.display='none';tabbar.style.display='none';
  document.getElementById('toolsDrawer').classList.remove('open');
  document.getElementById('settingsDrawer').classList.remove('open');
  animBar.classList.add('show');
  S.zoom=1;S.panX=0;S.panY=0;applyZoom();resizeCvs();
  S.animFrame=0;renderAnimFrame();renderOnion();
  toast('Animation mode · 3-finger ↑ to exit');
}
function exitAnim(){
  S.animMode=false;stopAnim();
  animBar.classList.remove('show');paletteArea.style.display='';tabbar.style.display='';
  S.zoom=1;S.panX=0;S.panY=0;applyZoom();
  requestAnimationFrame(()=>{resizeCvs();render()});
}
function renderAnimFrame(){
  drawPixels(cx,S.tabs[S.animFrame%S.tabs.length].px,cellSz());
}
function startAnim(){
  S.animPlay=true;btnPlay.textContent='■ Stop';S.animFrame=0;
  (function tick(){if(!S.animPlay)return;renderAnimFrame();S.animFrame=(S.animFrame+1)%S.tabs.length;S.animTimer=setTimeout(tick,1000/S.animFps)})();
}
function stopAnim(){
  S.animPlay=false;btnPlay.textContent='▶ Play';
  if(S.animTimer){clearTimeout(S.animTimer);S.animTimer=null}
}
btnPlay.onclick=()=>{S.animPlay?stopAnim():startAnim()};
fpsSlider.oninput=()=>{S.animFps=+fpsSlider.value;fpsVal.textContent=S.animFps};

// double-tap zoom toggle in anim mode
let lastTap=0;
cvs.addEventListener('click',()=>{
  if(!S.animMode) return;
  const now=Date.now();
  if(now-lastTap<300){
    if(S.zoom===1){
      const r=wrap.getBoundingClientRect();
      S.zoom=Math.min(r.width/cvs.width,r.height/cvs.height);
    }else S.zoom=1;
    S.panX=0;S.panY=0;applyZoom();
  }
  lastTap=now;
});

// Resize canvas after drawer CSS transitions finish
let resizeTimer=null;

  // Drawer transition is 200ms; resize after it settles
  if(resizeTimer) clearTimeout(resizeTimer);

const importBar = document.getElementById('importBar');
const importHint = document.getElementById('importHint');
let impState = null; // null when not importing

function parseRgb(s) {
  if (!s) return null;
  const m = s.match(/rgb\((\d+),(\d+),(\d+)\)/);
  return m ? [+m[1], +m[2], +m[3]] : null;
}

function closestPalIdx(r, g, b, a) {
  // transparent if alpha low
  if (a < 80) return 0;
  let best = 1, bestD = Infinity;
  for (let i = 1; i < S.pal.length; i++) {
    const c = parseRgb(S.pal[i]);
    if (!c) continue;
    const dr = r - c[0], dg = g - c[1], db = b - c[2];
    const d = dr * dr + dg * dg + db * db;
    if (d < bestD) { bestD = d; best = i; }
  }
  return best;
}

document.getElementById('btnImportSprite').onclick = () => {
  document.getElementById('saveOverlay').classList.remove('show');
  document.getElementById('fImg').click();

document.getElementById('fImg').onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => enterImportMode(img);
    img.src = ev.target.result;
  };
  reader.readAsDataURL(f);
  e.target.value = '';
};

function enterImportMode(img) {
  // reset zoom/pan so coordinate math is clean
  S.zoom = 1; S.panX = 0; S.panY = 0; applyZoom();

  // create the floating image element inside canvas wrap
  const el = document.createElement('img');
  el.src = img.src;
  el.className = 'import-img';
  wrap.appendChild(el);

  // calculate initial size: fit image to cover the grid canvas area
  const cvsRect = cvs.getBoundingClientRect();
  const imgAspect = img.naturalWidth / img.naturalHeight;
  const cvsAspect = cvsRect.width / cvsRect.height;

  let initW, initH;
  if (imgAspect > cvsAspect) {
    // image wider: fit to canvas height
    initH = cvsRect.height;
    initW = initH * imgAspect;
  } else {
    // image taller: fit to canvas width
    initW = cvsRect.width;
    initH = initW / imgAspect;
  }

  // position relative to canvas wrap
  const wrapRect = wrap.getBoundingClientRect();
  const offsetX = cvsRect.left - wrapRect.left + (cvsRect.width - initW) / 2;
  const offsetY = cvsRect.top - wrapRect.top + (cvsRect.height - initH) / 2;

  impState = {
    el,
    img,
    x: offsetX,
    y: offsetY,
    w: initW,
    h: initH,
    // touch tracking
    startX: 0, startY: 0,
    startW: 0, startH: 0,
    startIX: 0, startIY: 0,
    lastDist: 0,
    dragging: false,
    pinching: false,
  };

  updateImportImg();
  importBar.classList.add('show');
  importHint.classList.add('show');
  document.body.classList.add('import-active');

  // hide hint after a few seconds
  setTimeout(() => importHint.classList.remove('show'), 3500);
}

function updateImportImg() {
  if (!impState) return;
  const s = impState;
  s.el.style.left = s.x + 'px';
  s.el.style.top = s.y + 'px';
  s.el.style.width = s.w + 'px';
  s.el.style.height = s.h + 'px';
}

function exitImportMode() {
  if (!impState) return;
  impState.el.remove();
  impState = null;
  importBar.classList.remove('show');
  importHint.classList.remove('show');
  document.body.classList.remove('import-active');
}

// Touch handling for import mode on canvas wrap
wrap.addEventListener('touchstart', e => {
  if (!impState) return;
  e.preventDefault();
  const tt = e.touches;
  if (tt.length === 1) {
    impState.dragging = true;
    impState.pinching = false;
    impState.startX = tt[0].clientX;
    impState.startY = tt[0].clientY;
    impState.startIX = impState.x;
    impState.startIY = impState.y;
  }
  if (tt.length === 2) {
    impState.dragging = false;
    impState.pinching = true;
    const dx = tt[0].clientX - tt[1].clientX;
    const dy = tt[0].clientY - tt[1].clientY;
    impState.lastDist = Math.hypot(dx, dy);
    impState.startW = impState.w;
    impState.startH = impState.h;
    // center of pinch for anchoring
    impState.pinchCX = (tt[0].clientX + tt[1].clientX) / 2;
    impState.pinchCY = (tt[0].clientY + tt[1].clientY) / 2;
    impState.startIX = impState.x;
    impState.startIY = impState.y;
  }
}, { passive: false });

wrap.addEventListener('touchmove', e => {
  if (!impState) return;
  e.preventDefault();
  const tt = e.touches;

  if (tt.length === 2 && impState.pinching) {
    const dx = tt[0].clientX - tt[1].clientX;
    const dy = tt[0].clientY - tt[1].clientY;
    const dist = Math.hypot(dx, dy);
    const scale = dist / impState.lastDist;

    const newW = impState.startW * scale;
    const newH = impState.startH * scale;

    // anchor around pinch center: adjust position so pinch center stays fixed
    const wrapRect = wrap.getBoundingClientRect();
    const pcx = impState.pinchCX - wrapRect.left;
    const pcy = impState.pinchCY - wrapRect.top;

    // ratio of pinch center within the old image rect
    const rx = (pcx - impState.startIX) / impState.startW;
    const ry = (pcy - impState.startIY) / impState.startH;

    impState.w = Math.max(10, newW);
    impState.h = Math.max(10, newH);
    impState.x = pcx - rx * impState.w;
    impState.y = pcy - ry * impState.h;

    updateImportImg();
    return;
  }

  if (tt.length === 1 && impState.dragging) {
    const dx = tt[0].clientX - impState.startX;
    const dy = tt[0].clientY - impState.startY;
    impState.x = impState.startIX + dx;
    impState.y = impState.startIY + dy;
    updateImportImg();
  }
}, { passive: false });

wrap.addEventListener('touchend', e => {
  if (!impState) return;
  if (e.touches.length === 0) {
    impState.dragging = false;
    impState.pinching = false;
  }
  if (e.touches.length === 1) {
    // went from 2 to 1: restart as drag
    impState.pinching = false;
    impState.dragging = true;
    impState.startX = e.touches[0].clientX;
    impState.startY = e.touches[0].clientY;
    impState.startIX = impState.x;
    impState.startIY = impState.y;
  }
}, { passive: true });

// mouse fallback for desktop testing
wrap.addEventListener('mousedown', e => {
  if (!impState) return;
  impState.dragging = true;
  impState.startX = e.clientX;
  impState.startY = e.clientY;
  impState.startIX = impState.x;
  impState.startIY = impState.y;
});
window.addEventListener('mousemove', e => {
  if (!impState || !impState.dragging) return;
  impState.x = impState.startIX + (e.clientX - impState.startX);
  impState.y = impState.startIY + (e.clientY - impState.startY);
  updateImportImg();
});
window.addEventListener('mouseup', () => {
  if (impState) impState.dragging = false;
});
// mouse wheel for desktop pinch emulation
wrap.addEventListener('wheel', e => {
  if (!impState) return;
  e.preventDefault();
  const scale = e.deltaY < 0 ? 1.08 : 0.92;
  const wrapRect = wrap.getBoundingClientRect();
  const mx = e.clientX - wrapRect.left;
  const my = e.clientY - wrapRect.top;
  const rx = (mx - impState.x) / impState.w;
  const ry = (my - impState.y) / impState.h;
  impState.w = Math.max(10, impState.w * scale);
  impState.h = Math.max(10, impState.h * scale);
  impState.x = mx - rx * impState.w;
  impState.y = my - ry * impState.h;
  updateImportImg();
}, { passive: false });

// Confirm: sample image pixels into grid
document.getElementById('importConfirm').onclick = () => {
  if (!impState) return;
  stampImport();
  exitImportMode();
  toast('Sprite stamped');
};

document.getElementById('importCancel').onclick = () => {
  exitImportMode();
};

function stampImport() {
  if (!impState) return;

  saveUndo();

  // Draw import image at its current size to a temp canvas for pixel sampling
  const tmpCvs = document.createElement('canvas');
  const tw = Math.round(impState.w);
  const th = Math.round(impState.h);
  tmpCvs.width = tw;
  tmpCvs.height = th;
  const tmpCx = tmpCvs.getContext('2d');
  tmpCx.drawImage(impState.img, 0, 0, tw, th);

  // Get all pixel data at once for performance
  const imgData = tmpCx.getImageData(0, 0, tw, th).data;

  // For each grid cell, find what part of the import image covers it
  const cvsRect = cvs.getBoundingClientRect();
  const wrapRect = wrap.getBoundingClientRect();
  const c = cellSz();

  // canvas position within wrap (accounting for centering)
  const cvsOffX = cvsRect.left - wrapRect.left;
  const cvsOffY = cvsRect.top - wrapRect.top;

  // import image position within wrap
  const imgOffX = impState.x;
  const imgOffY = impState.y;

  const tab = S.tabs[S.at];

  for (let gy = 0; gy < S.h; gy++) {
    for (let gx = 0; gx < S.w; gx++) {
      // center of this grid cell in wrap-relative coords
      const cellCX = cvsOffX + (gx + 0.5) * c;
      const cellCY = cvsOffY + (gy + 0.5) * c;

      // map to import image pixel coords
      const imgPxX = Math.round(((cellCX - imgOffX) / impState.w) * tw);
      const imgPxY = Math.round(((cellCY - imgOffY) / impState.h) * th);

      // check bounds
      if (imgPxX < 0 || imgPxX >= tw || imgPxY < 0 || imgPxY >= th) continue;

      // sample pixel from pre-fetched data
      const idx = (imgPxY * tw + imgPxX) * 4;
      const palIdx = closestPalIdx(imgData[idx], imgData[idx+1], imgData[idx+2], imgData[idx+3]);
      tab.px[gy][gx] = palIdx;
    }
  }
  render();
}

//  CARVE FROM SHEET MODE
// ============================================================
const carveOverlay = document.getElementById('carveOverlay');
const carveWrap = document.getElementById('carveWrap');
const carveCvs = document.getElementById('carveCanvas');
const carveCx = carveCvs.getContext('2d');
const carveSel = document.getElementById('carveSel');
const carveCH = document.getElementById('carveCH');
const carveCV = document.getElementById('carveCV');
const carveCoord = document.getElementById('carveCoord');
const carveStrip = document.getElementById('carveStrip');

let carve = null; // null when not in carve mode

document.getElementById('btnCarveSheet').onclick = () => {
  document.getElementById('saveOverlay').classList.remove('show');
  document.getElementById('fCarveImg').click();
};

document.getElementById('fCarveImg').onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => enterCarveMode(img);
    img.src = ev.target.result;
  };
  reader.readAsDataURL(f);
  e.target.value = '';
};

function enterCarveMode(img) {
  // Sync carve dimensions with current sprite size
  document.getElementById('carveW').value = S.w;
  document.getElementById('carveH').value = S.h;

  const wrapRect = carveWrap.getBoundingClientRect();

  // Calculate zoom to fit image nicely (80% of available space)
  const fitZoom = Math.min(
    (wrapRect.width * 0.9) / img.naturalWidth,
    (wrapRect.height * 0.9) / img.naturalHeight,
    6 // max initial zoom for tiny sheets
  );

  const dispW = img.naturalWidth * fitZoom;
  const dispH = img.naturalHeight * fitZoom;

  carve = {
    img,
    zoom: fitZoom,
    panX: (wrapRect.width - dispW) / 2,
    panY: (wrapRect.height - dispH) / 2,
    // selection in IMAGE pixel coordinates
    selX: 0,
    selY: 0,
    // touch state
    dragging: false,
    pinching: false,
    longPressTimer: null,
    startX: 0, startY: 0,
    startPanX: 0, startPanY: 0,
    lastDist: 0,
    pinchStartZoom: 1,
    pinchCX: 0, pinchCY: 0,
    snap: true,
    moved: false,
    carved: [], // thumbnail data urls
  };

  // Draw the sprite sheet onto canvas
  carveCvs.width = img.naturalWidth;
  carveCvs.height = img.naturalHeight;
  renderCarveCanvas();

  carveOverlay.classList.add('show');
  // Defer layout measurement
  requestAnimationFrame(() => {
    if (!carve) return;
    const wrapRect = carveWrap.getBoundingClientRect();
    const fitZoom = Math.min(
      (wrapRect.width * 0.9) / img.naturalWidth,
      (wrapRect.height * 0.9) / img.naturalHeight,
      6
    );
    const dispW = img.naturalWidth * fitZoom;
    const dispH = img.naturalHeight * fitZoom;
    carve.zoom = fitZoom;
    carve.panX = (wrapRect.width - dispW) / 2;
    carve.panY = (wrapRect.height - dispH) / 2;
    updateCarveTransform();
    updateCarveSelection();
  });
}

function renderCarveCanvas() {
  if (!carve) return;
  const img = carve.img;
  carveCx.clearRect(0, 0, carveCvs.width, carveCvs.height);
  carveCx.drawImage(img, 0, 0);

  // Draw grid overlay when snap is on
  if (carve.snap) {
    const cw = getCarveW(), ch = getCarveH();
    carveCx.strokeStyle = 'rgba(255,255,255,0.12)';
    carveCx.lineWidth = 0.5;
    carveCx.beginPath();
    for (let x = 0; x <= img.naturalWidth; x += cw) {
      carveCx.moveTo(x, 0);
      carveCx.lineTo(x, img.naturalHeight);
    }
    for (let y = 0; y <= img.naturalHeight; y += ch) {
      carveCx.moveTo(0, y);
      carveCx.lineTo(img.naturalWidth, y);
    }
    carveCx.stroke();
  }
}

function exitCarveMode() {
  carveOverlay.classList.remove('show');
  if (carve && carve.longPressTimer) clearTimeout(carve.longPressTimer);
  carve = null;
  carveStrip.innerHTML = '';
}

document.getElementById('carveClose').onclick = exitCarveMode;

function getCarveW() { return Math.max(1, Math.min(128, +document.getElementById('carveW').value || 16)); }
function getCarveH() { return Math.max(1, Math.min(128, +document.getElementById('carveH').value || 24)); }

// When carve dimensions change, also update the main sprite size
document.getElementById('carveW').onchange = () => { renderCarveCanvas(); updateCarveSelection(); };
document.getElementById('carveH').onchange = () => { renderCarveCanvas(); updateCarveSelection(); };

// Snap toggle
const carveSnapCb = document.getElementById('carveSnap');
const carveSnapLabel = document.getElementById('carveSnapLabel');
carveSnapCb.onchange = () => {
  if (carve) carve.snap = carveSnapCb.checked;
  carveSnapLabel.classList.toggle('on', carveSnapCb.checked);
  renderCarveCanvas();
  updateCarveSelection();
};

function updateCarveTransform() {
  if (!carve) return;
  carveCvs.style.transform = `translate(${carve.panX}px, ${carve.panY}px) scale(${carve.zoom})`;
}

function updateCarveSelection() {
  if (!carve) return;
  const cw = getCarveW(), ch = getCarveH();

  // Compute display position (snap if enabled, clamp to image)
  let sx = carve.selX, sy = carve.selY;
  if (carve.snap) {
    sx = Math.round(sx / cw) * cw;
    sy = Math.round(sy / ch) * ch;
  }
  sx = Math.max(0, Math.min(carve.img.naturalWidth - cw, sx));
  sy = Math.max(0, Math.min(carve.img.naturalHeight - ch, sy));
  // NOTE: do NOT write sx/sy back to carve.selX/selY — keep raw coords intact

  // Position the selection rectangle in screen space
  const screenX = carve.panX + sx * carve.zoom;
  const screenY = carve.panY + sy * carve.zoom;
  const screenW = cw * carve.zoom;
  const screenH = ch * carve.zoom;

  carveSel.style.left = screenX + 'px';
  carveSel.style.top = screenY + 'px';
  carveSel.style.width = screenW + 'px';
  carveSel.style.height = screenH + 'px';

  // Crosshairs
  carveCH.style.top = (screenY + screenH / 2) + 'px';
  carveCH.style.display = 'block';
  carveCV.style.left = (screenX + screenW / 2) + 'px';
  carveCV.style.display = 'block';

  // Coordinate display
  carveCoord.style.display = 'block';
  carveCoord.textContent = `${Math.round(sx)}, ${Math.round(sy)}  ·  ${cw}×${ch}`;
}

function screenToImageCoords(clientX, clientY) {
  const wrapRect = carveWrap.getBoundingClientRect();
  const localX = clientX - wrapRect.left;
  const localY = clientY - wrapRect.top;
  const imgX = (localX - carve.panX) / carve.zoom;
  const imgY = (localY - carve.panY) / carve.zoom;
  return { imgX, imgY };
}

function carveSprite() {
  if (!carve) return;
  const cw = getCarveW(), ch = getCarveH();

  // Ensure sprite size matches carve dimensions
  if (S.w !== cw || S.h !== ch) {
    S.w = cw; S.h = ch;
    document.getElementById('inW').value = cw;
    document.getElementById('inH').value = ch;
    // Resize all existing tabs
    S.tabs.forEach(tab => {
      const np = mkPx(cw, ch);
      const oh = tab.px.length, ow = oh ? tab.px[0].length : 0;
      for (let y = 0; y < Math.min(ch, oh); y++)
        for (let x = 0; x < Math.min(cw, ow); x++)
          np[y][x] = tab.px[y][x];
      tab.px = np; tab.undo = []; tab.redo = [];
    });
  }

  // Compute final coordinates exactly like updateCarveSelection does
  let sx = carve.selX, sy = carve.selY;
  if (carve.snap) {
    sx = Math.round(sx / cw) * cw;
    sy = Math.round(sy / ch) * ch;
  }
  sx = Math.max(0, Math.min(carve.img.naturalWidth - cw, sx));
  sy = Math.max(0, Math.min(carve.img.naturalHeight - ch, sy));
  sx = Math.round(sx);
  sy = Math.round(sy);

  // Get pixel data from the source image at native resolution
  const tmpCvs = document.createElement('canvas');
  tmpCvs.width = carve.img.naturalWidth;
  tmpCvs.height = carve.img.naturalHeight;
  const tmpCx = tmpCvs.getContext('2d');
  tmpCx.drawImage(carve.img, 0, 0);
  const imgData = tmpCx.getImageData(sx, sy, cw, ch).data;

  // Build pixel array
  const newPx = mkPx(cw, ch);
  for (let y = 0; y < ch; y++) {
    for (let x = 0; x < cw; x++) {
      const idx = (y * cw + x) * 4;
      const palIdx = closestPalIdx(imgData[idx], imgData[idx+1], imgData[idx+2], imgData[idx+3]);
      newPx[y][x] = palIdx;
    }
  }

  // Check if the first tab is completely empty (all zeros), if so replace it
  const firstTabEmpty = S.tabs.length === 1 && S.tabs[0].px.every(row => row.every(v => v === 0));
  if (firstTabEmpty) {
    S.tabs[0] = mkTab(newPx);
    S.at = 0;
  } else {
    S.tabs.push(mkTab(newPx));
    S.at = S.tabs.length - 1;
  }

  // Pulse animation on selection
  carveSel.classList.remove('pulse');
  void carveSel.offsetWidth; // force reflow
  carveSel.classList.add('pulse');

  // Add thumbnail to strip
  const thumbCvs = document.createElement('canvas');
  thumbCvs.width = cw; thumbCvs.height = ch;
  const thumbCx = thumbCvs.getContext('2d');
  thumbCx.drawImage(carve.img, sx, sy, cw, ch, 0, 0, cw, ch);
  const thumbImg = document.createElement('img');
  thumbImg.src = thumbCvs.toDataURL();
  thumbImg.className = 'carve-thumb latest';
  // Remove latest class from previous
  carveStrip.querySelectorAll('.latest').forEach(el => el.classList.remove('latest'));
  carveStrip.appendChild(thumbImg);
  // Scroll to end
  carveStrip.scrollLeft = carveStrip.scrollWidth;

  // Update main editor
  renderTabs(); resizeCvs(); render();
  toast('Carved! Frame ' + S.tabs.length);
}

// Manual carve button
document.getElementById('carveTap').onclick = () => carveSprite();

// ── CARVE TOUCH HANDLING ──
carveWrap.addEventListener('touchstart', e => {
  if (!carve) return;
  e.preventDefault();
  const tt = e.touches;

  if (tt.length === 1) {
    carve.dragging = true;
    carve.pinching = false;
    carve.moved = false;
    carve.startX = tt[0].clientX;
    carve.startY = tt[0].clientY;
    carve.startPanX = carve.panX;
    carve.startPanY = carve.panY;

    // Start long press timer
    carve.longPressTimer = setTimeout(() => {
      if (!carve.moved) {
        // Long press: carve at current position
        carveSprite();
        navigator.vibrate && navigator.vibrate(30);
      }
      carve.longPressTimer = null;
    }, 500);

    // Move selection to where finger is
    const { imgX, imgY } = screenToImageCoords(tt[0].clientX, tt[0].clientY);
    const cw = getCarveW(), ch = getCarveH();
    carve.selX = imgX - cw / 2;
    carve.selY = imgY - ch / 2;
    updateCarveSelection();
  }

  if (tt.length === 2) {
    carve.dragging = false;
    carve.pinching = true;
    if (carve.longPressTimer) { clearTimeout(carve.longPressTimer); carve.longPressTimer = null; }
    const dx = tt[0].clientX - tt[1].clientX;
    const dy = tt[0].clientY - tt[1].clientY;
    carve.lastDist = Math.hypot(dx, dy);
    carve.pinchStartZoom = carve.zoom;
    carve.pinchCX = (tt[0].clientX + tt[1].clientX) / 2;
    carve.pinchCY = (tt[0].clientY + tt[1].clientY) / 2;
    carve.startPanX = carve.panX;
    carve.startPanY = carve.panY;
  }
}, { passive: false });

carveWrap.addEventListener('touchmove', e => {
  if (!carve) return;
  e.preventDefault();
  const tt = e.touches;

  if (tt.length === 2 && carve.pinching) {
    const dx = tt[0].clientX - tt[1].clientX;
    const dy = tt[0].clientY - tt[1].clientY;
    const dist = Math.hypot(dx, dy);
    const scale = dist / carve.lastDist;
    const newZoom = Math.max(0.5, Math.min(20, carve.pinchStartZoom * scale));

    // Zoom toward pinch center
    const wrapRect = carveWrap.getBoundingClientRect();
    const pcx = carve.pinchCX - wrapRect.left;
    const pcy = carve.pinchCY - wrapRect.top;

    const imgX = (pcx - carve.startPanX) / carve.pinchStartZoom;
    const imgY = (pcy - carve.startPanY) / carve.pinchStartZoom;

    carve.zoom = newZoom;
    carve.panX = pcx - imgX * newZoom;
    carve.panY = pcy - imgY * newZoom;

    updateCarveTransform();
    updateCarveSelection();
    return;
  }

  if (tt.length === 1 && carve.dragging) {
    const dx = tt[0].clientX - carve.startX;
    const dy = tt[0].clientY - carve.startY;

    if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
      carve.moved = true;
      if (carve.longPressTimer) { clearTimeout(carve.longPressTimer); carve.longPressTimer = null; }
    }

    // Move selection by updating image coords
    const { imgX, imgY } = screenToImageCoords(tt[0].clientX, tt[0].clientY);
    const cw = getCarveW(), ch = getCarveH();
    carve.selX = imgX - cw / 2;
    carve.selY = imgY - ch / 2;
    updateCarveSelection();
  }
}, { passive: false });

carveWrap.addEventListener('touchend', e => {
  if (!carve) return;
  if (carve.longPressTimer) { clearTimeout(carve.longPressTimer); carve.longPressTimer = null; }
  if (e.touches.length === 0) {
    carve.dragging = false;
    carve.pinching = false;
  }
  if (e.touches.length === 1) {
    carve.pinching = false;
    carve.dragging = true;
    carve.startX = e.touches[0].clientX;
    carve.startY = e.touches[0].clientY;
    carve.startPanX = carve.panX;
    carve.startPanY = carve.panY;
  }
}, { passive: true });

// ── CARVE MOUSE HANDLING ──
carveWrap.addEventListener('mousedown', e => {
  if (!carve) return;
  carve.dragging = true;
  carve.moved = false;
  carve.startX = e.clientX;
  carve.startY = e.clientY;
  carve.startPanX = carve.panX;
  carve.startPanY = carve.panY;

  // Position selection
  const { imgX, imgY } = screenToImageCoords(e.clientX, e.clientY);
  const cw = getCarveW(), ch = getCarveH();
  carve.selX = imgX - cw / 2;
  carve.selY = imgY - ch / 2;
  updateCarveSelection();

  // Long press timer
  carve.longPressTimer = setTimeout(() => {
    if (!carve.moved) carveSprite();
    carve.longPressTimer = null;
  }, 500);
});

window.addEventListener('mousemove', e => {
  if (!carve || !carve.dragging) return;
  const dx = e.clientX - carve.startX;
  const dy = e.clientY - carve.startY;
  if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
    carve.moved = true;
    if (carve.longPressTimer) { clearTimeout(carve.longPressTimer); carve.longPressTimer = null; }
  }
  // Move selection
  const { imgX, imgY } = screenToImageCoords(e.clientX, e.clientY);
  const cw = getCarveW(), ch = getCarveH();
  carve.selX = imgX - cw / 2;
  carve.selY = imgY - ch / 2;
  updateCarveSelection();
});

window.addEventListener('mouseup', () => {
  if (!carve) return;
  carve.dragging = false;
  if (carve.longPressTimer) { clearTimeout(carve.longPressTimer); carve.longPressTimer = null; }
});

// Mouse wheel zoom
carveWrap.addEventListener('wheel', e => {
  if (!carve) return;
  e.preventDefault();
  const wrapRect = carveWrap.getBoundingClientRect();
  const mx = e.clientX - wrapRect.left;
  const my = e.clientY - wrapRect.top;

  const imgX = (mx - carve.panX) / carve.zoom;
  const imgY = (my - carve.panY) / carve.zoom;

  const scale = e.deltaY < 0 ? 1.12 : 0.89;
  carve.zoom = Math.max(0.5, Math.min(20, carve.zoom * scale));

  carve.panX = mx - imgX * carve.zoom;
  carve.panY = my - imgY * carve.zoom;

  updateCarveTransform();
  updateCarveSelection();
}, { passive: false });

// ============================================================
//  PREVENT OVERSCROLL
// ============================================================
document.addEventListener('touchmove',e=>{
  // allow scrolling inside tabbar and drawers
  if(e.target.closest('.tabbar')||e.target.closest('.drawer')||e.target.closest('.overlay')||e.target.closest('.anim-bar')||e.target.closest('.tab-menu')||e.target.closest('.import-bar')||e.target.closest('.carve-overlay')) return;
  e.preventDefault();
},{passive:false});
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('gesturechange',e=>e.preventDefault());

// ============================================================
//  INIT
// ============================================================
window.addEventListener('resize',()=>{resizeCvs();render()});

initPalette();
S.tabs.push(mkTab());
renderTabs();
renderPal();
// Must measure canvas AFTER tabs+palette are rendered so wrap has correct available height
requestAnimationFrame(()=>{resizeCvs();render()});
</script>
