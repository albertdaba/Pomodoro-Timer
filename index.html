<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROMPTER</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --amber: #FFB300;
    --bg: #080808;
    --panel: #0f0f0f;
    --border: #222;
    --text-ui: #666;
    --text-bright: #bbb;
    --red: #e05050;
    --green: #50d080;
    --font-size: 48px;
  }

  html, body {
    height: 100%; background: var(--bg);
    color: var(--text-bright); font-family: 'Courier New', monospace;
    overflow: hidden;
  }

  /* ── EDITOR VIEW ── */
  #editor-view { display: flex; flex-direction: column; height: 100vh; }

  #script-editor {
    flex: 1; background: var(--bg); color: #e0e0e0;
    font-family: Arial, sans-serif; font-size: var(--font-size);
    line-height: 1.55; border: none; outline: none; resize: none;
    padding: 0 8vw 5vw; overflow-y: auto; word-wrap: break-word;
  }
  #script-editor::placeholder { color: #1e1e1e; }
  #script-editor::-webkit-scrollbar { width: 4px; }
  #script-editor::-webkit-scrollbar-track { background: transparent; }
  #script-editor::-webkit-scrollbar-thumb { background: #222; }

  /* bottom bar */
  .editor-bar {
    display: flex; align-items: center;
    height: 44px; flex-shrink: 0;
    background: var(--panel); border-top: 1px solid var(--border);
  }
  .bar-item {
    display: flex; align-items: center; gap: 7px;
    padding: 0 14px; height: 100%;
    border-right: 1px solid var(--border); flex-shrink: 0;
  }
  .bar-label {
    font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--text-ui); user-select: none;
  }
  .bar-val-input {
    width: 48px; background: transparent; border: none;
    color: var(--amber); font-family: inherit; font-size: 12px;
    text-align: center; outline: none; padding: 0;
    -moz-appearance: textfield; cursor: text;
  }
  .bar-val-input::-webkit-outer-spin-button,
  .bar-val-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .bar-val-unit { font-size: 9px; color: #333; letter-spacing: 0.1em; }
  .bar-spacer { flex: 1; }
  .bar-btn {
    height: 100%; padding: 0 18px;
    background: transparent; border: none; border-left: 1px solid var(--border);
    color: var(--text-bright); font-family: inherit; font-size: 10px;
    letter-spacing: 0.15em; text-transform: uppercase;
    cursor: pointer; transition: color 0.15s, background 0.15s;
    white-space: nowrap; flex-shrink: 0;
  }
  .bar-btn:hover { color: var(--amber); background: rgba(255,179,0,0.05); }
  .bar-btn.primary {
    background: var(--amber); color: #000; font-weight: 700;
    letter-spacing: 0.25em; border-left-color: var(--amber);
  }
  .bar-btn.primary:hover { background: #ffc933; }

  /* popup toggle button */
  .popup-toggle {
    height: 100%; padding: 0 14px;
    background: transparent; border: none; border-left: 1px solid var(--border);
    color: var(--text-ui); font-family: inherit; font-size: 10px;
    letter-spacing: 0.15em; text-transform: uppercase;
    cursor: pointer; transition: color 0.15s, background 0.15s;
    white-space: nowrap; flex-shrink: 0;
    display: flex; align-items: center; gap: 7px;
  }
  .popup-toggle:hover { color: var(--amber); background: rgba(255,179,0,0.05); }
  .popup-toggle.active {
    color: var(--amber); background: rgba(255,179,0,0.07);
    border-left-color: rgba(255,179,0,0.3);
  }
  .popup-toggle-pip {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--border); flex-shrink: 0;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .popup-toggle.active .popup-toggle-pip {
    background: var(--amber); box-shadow: 0 0 6px var(--amber);
  }

  /* popup controller panel — shown in editor when popup is live */
  #popup-controller {
    display: none;
    position: fixed; bottom: 44px; right: 0; left: 0;
    z-index: 50;
    background: rgba(8,8,8,0.97);
    border-top: 1px solid rgba(255,179,0,0.25);
    padding: 0;
  }
  #popup-controller.open { display: flex; }
  .pc-bar {
    display: flex; align-items: center; width: 100%; height: 44px;
  }
  .pc-label {
    padding: 0 16px; font-size: 9px; letter-spacing: 0.35em;
    text-transform: uppercase; color: var(--amber); border-right: 1px solid var(--border);
    height: 100%; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .pc-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--amber); box-shadow: 0 0 6px var(--amber);
    animation: blink2 1s infinite;
  }
  @keyframes blink2 { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .pc-progress-wrap { flex: 1; margin: 0 14px; height: 2px; background: rgba(255,255,255,0.07); }
  .pc-progress-fill { height: 100%; background: var(--amber); width: 0%; transition: width 0.25s linear; }
  .pc-speed {
    padding: 0 14px; font-size: 12px; color: var(--amber);
    border-left: 1px solid var(--border); height: 100%;
    display: flex; align-items: center; gap: 5px; flex-shrink: 0;
  }
  .pc-speed-lbl { font-size: 9px; color: var(--text-ui); letter-spacing: 0.2em; }
  .pc-speed-val { min-width: 28px; text-align: right; }
  .pc-speed-unit { font-size: 9px; color: #333; }
  .pc-btn {
    height: 100%; padding: 0 14px;
    background: transparent; border: none; border-left: 1px solid var(--border);
    color: var(--text-bright); font-family: 'Courier New', monospace; font-size: 10px;
    letter-spacing: 0.12em; text-transform: uppercase;
    cursor: pointer; transition: color 0.15s, background 0.15s;
    white-space: nowrap; flex-shrink: 0;
  }
  .pc-btn:hover { color: var(--amber); background: rgba(255,179,0,0.05); }
  .pc-btn.pc-kill {
    color: var(--red); border-left-color: rgba(224,80,80,0.2);
  }
  .pc-btn.pc-kill:hover { background: rgba(224,80,80,0.07); color: #ff7070; }

  /* ── HOTKEY MODAL ── */
  #hotkey-modal {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.75); align-items: flex-end; justify-content: center;
  }
  #hotkey-modal.open { display: flex; }
  .hk-panel {
    width: 100%; max-width: 620px;
    background: #0e0e0e; border: 1px solid var(--border);
    border-bottom: none; padding: 0;
  }
  .hk-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
  }
  .hk-title { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--amber); }
  .hk-close {
    background: none; border: none; color: var(--text-ui); cursor: pointer;
    font-size: 16px; line-height: 1; padding: 0;
  }
  .hk-close:hover { color: var(--text-bright); }
  .hk-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .hk-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px; border-bottom: 1px solid #181818;
    gap: 12px;
  }
  .hk-action { font-size: 11px; color: var(--text-ui); letter-spacing: 0.05em; }
  .hk-key-btn {
    background: #161616; border: 1px solid #2e2e2e;
    color: var(--amber); font-family: inherit; font-size: 10px;
    letter-spacing: 0.15em; padding: 4px 10px; cursor: pointer;
    min-width: 56px; text-align: center; transition: border-color 0.15s;
    white-space: nowrap;
  }
  .hk-key-btn:hover { border-color: var(--amber); }
  .hk-key-btn.listening {
    border-color: var(--amber); color: #000;
    background: var(--amber); animation: pulse 0.6s infinite alternate;
  }
  @keyframes pulse { from{opacity:1} to{opacity:0.6} }
  .hk-footer {
    display: flex; align-items: center; justify-content: flex-end;
    padding: 10px 20px; gap: 10px; border-top: 1px solid var(--border);
  }

  /* ── TELEPROMPTER VIEW ── */
  #teleprompter-view {
    display: none; position: fixed; inset: 0;
    background: var(--bg); flex-direction: column; overflow: hidden;
  }
  #teleprompter-view.active { display: flex; }

  #teleprompter-view::before {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 10;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px
    );
  }

  .tp-fade-bottom {
    position: absolute; left: 0; right: 0; height: 120px; z-index: 6; pointer-events: none;
    bottom: 44px; background: linear-gradient(0deg, var(--bg) 0%, transparent 100%);
  }

  #scroll-container { flex: 1; overflow: hidden; position: relative; }
  #scroll-track {
    position: absolute; left: 0; right: 0; top: 0;
    padding: 0 8vw 50vh; will-change: transform;
  }
  #scroll-text {
    font-family: Arial, sans-serif; font-size: var(--font-size);
    line-height: 1.55; color: var(--amber);
    word-wrap: break-word; white-space: pre-wrap;
    text-shadow: 0 0 50px rgba(255,179,0,0.25); max-width: 100%;
  }

  /* countdown overlay */
  #countdown-overlay {
    position: absolute; inset: 0 0 44px 0; z-index: 30;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0); pointer-events: none; opacity: 0;
  }
  #countdown-overlay.active { opacity: 1; }
  #countdown-num {
    font-family: Arial, sans-serif; font-size: 30vmin; font-weight: 700;
    color: rgba(255,179,0,0.18); line-height: 1;
    transition: transform 0.15s ease-out, opacity 0.15s;
    transform: scale(1);
  }
  #countdown-num.pop { transform: scale(1.08); }

  /* pause overlay */
  .pause-overlay {
    position: absolute; inset: 0 0 44px 0; z-index: 15;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .pause-overlay.visible { opacity: 1; }
  .pause-icon { font-size: 80px; color: rgba(255,179,0,0.35); }

  /* teleprompter bottom bar */
  .tp-bar {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
    display: flex; align-items: center;
    height: 44px; background: rgba(8,8,8,0.95);
    border-top: 1px solid var(--border);
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  #teleprompter-view:hover .tp-bar,
  #teleprompter-view.hud-visible .tp-bar { opacity: 1; pointer-events: all; }

  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 6px var(--green); flex-shrink: 0;
  }
  .status-dot.paused { background: var(--red); box-shadow: 0 0 6px var(--red); animation: blink 1s infinite; }
  .status-dot.countdown { background: var(--amber); box-shadow: 0 0 6px var(--amber); animation: blink 0.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .progress-wrap { flex: 1; margin: 0 12px; height: 2px; background: rgba(255,255,255,0.07); }
  .progress-fill { height: 100%; background: var(--amber); width: 0%; transition: width 0.25s linear; }
</style>
</head>
<body>

<!-- ══ EDITOR ══ -->
<div id="editor-view">
  <textarea id="script-editor" placeholder="Paste or type your script here…"></textarea>
  <div class="editor-bar">
    <div class="bar-item" style="padding:0 16px;">
      <span class="bar-label" style="color:var(--amber);letter-spacing:.35em;">▶ PROMPTER</span>
    </div>
    <div class="bar-item">
      <span class="bar-label">Size</span>
      <input class="bar-val-input" type="number" id="font-size-input" value="48" min="12" max="200">
      <span class="bar-val-unit">px</span>
    </div>
    <div class="bar-item">
      <span class="bar-label">Speed</span>
      <input class="bar-val-input" type="number" id="speed-input" value="60" min="5" max="500">
      <span class="bar-val-unit">px/s</span>
    </div>
    <div class="bar-item">
      <span style="font-size:10px;color:#444;" id="char-count">0 words</span>
    </div>
    <div class="bar-spacer"></div>
    <button class="bar-btn" onclick="openHotkeyModal()">Hotkeys</button>
    <button class="bar-btn" onclick="saveSettings()">Save JSON</button>
    <label class="bar-btn" style="display:flex;align-items:center;cursor:pointer;">
      Load JSON<input type="file" id="load-file" accept=".json" style="display:none" onchange="loadSettings(event)">
    </label>
    <!-- POPUP TOGGLE -->
    <button class="popup-toggle" id="popup-toggle-btn" onclick="togglePopupMode()" title="Open teleprompter in a separate popup window">
      <span class="popup-toggle-pip" id="popup-pip"></span>
      <span>⧉ Popup</span>
    </button>
    <button class="bar-btn primary" onclick="startTeleprompter()">▶ START</button>
  </div>
</div>

<!-- ══ POPUP CONTROLLER (shown in editor while popup is live) ══ -->
<div id="popup-controller">
  <div class="pc-bar">
    <div class="pc-label">
      <div class="pc-dot"></div>
      <span>POPUP LIVE</span>
    </div>
    <div class="pc-progress-wrap">
      <div class="pc-progress-fill" id="pc-progress"></div>
    </div>
    <div class="pc-speed">
      <span class="pc-speed-lbl">SPEED</span>
      <span class="pc-speed-val" id="pc-speed-val">60</span>
      <span class="pc-speed-unit">px/s</span>
    </div>
    <button class="pc-btn" onclick="pcCmd('speedDownLarge')" title="Speed −25">«</button>
    <button class="pc-btn" onclick="pcCmd('speedDown')" title="Speed −5">−</button>
    <button class="pc-btn" id="pc-play-btn" onclick="pcCmd('togglePlay')">⏸ Pause</button>
    <button class="pc-btn" onclick="pcCmd('speedUp')" title="Speed +5">+</button>
    <button class="pc-btn" onclick="pcCmd('speedUpLarge')" title="Speed +25">»</button>
    <button class="pc-btn" onclick="pcCmd('reset')">⟳ Reset</button>
    <button class="pc-btn" onclick="pcCmd('focus')" title="Bring popup to front">⧉ Focus</button>
    <button class="pc-btn pc-kill" onclick="pcCmd('exit')">✕ Close</button>
  </div>
</div>

<!-- ══ HOTKEY MODAL ══ -->
<div id="hotkey-modal">
  <div class="hk-panel">
    <div class="hk-header">
      <span class="hk-title">Customize Hotkeys — click a key to rebind</span>
      <button class="hk-close" onclick="closeHotkeyModal()">✕</button>
    </div>
    <div class="hk-grid" id="hk-grid"></div>
    <div class="hk-footer">
      <button class="bar-btn" style="border:1px solid var(--border);height:34px;" onclick="resetHotkeys()">Reset Defaults</button>
      <button class="bar-btn primary" style="height:34px;" onclick="closeHotkeyModal()">Done</button>
    </div>
  </div>
</div>

<!-- ══ TELEPROMPTER (inline mode) ══ -->
<div id="teleprompter-view">
  <div class="tp-fade-bottom"></div>
  <div id="scroll-container">
    <div id="scroll-track"><div id="scroll-text"></div></div>
  </div>
  <div id="countdown-overlay"><div id="countdown-num">3</div></div>
  <div class="pause-overlay" id="pause-overlay">
    <div class="pause-icon">⏸</div>
  </div>
  <div class="tp-bar">
    <div class="bar-item" style="gap:8px;border-right:1px solid #1e1e1e;">
      <div class="status-dot" id="status-dot"></div>
      <span class="bar-label" id="status-label" style="color:var(--text-bright);">READY</span>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="progress-bar"></div></div>
    <div class="bar-item" style="border-left:1px solid #1e1e1e;border-right:1px solid #1e1e1e;">
      <span class="bar-label">Speed</span>
      <span id="status-speed" style="color:var(--amber);font-size:12px;min-width:32px;text-align:right;">60</span>
      <span class="bar-val-unit">px/s</span>
    </div>
    <div class="bar-item" style="border-right:none;">
      <span id="status-pct" style="font-size:10px;color:#444;">0%</span>
    </div>
    <div class="bar-spacer"></div>
    <button class="bar-btn" onclick="resetScroll()">⟳ Reset</button>
    <button class="bar-btn" id="hud-play-btn" onclick="togglePlay()">⏸ Pause</button>
    <button class="bar-btn" onclick="exitTeleprompter()">✕ Exit</button>
  </div>
</div>

<script>
// ── DEFAULT HOTKEYS ────────────────────────────────────────
const DEFAULT_HOTKEYS = {
  togglePlay:     'Space',
  speedUp:        'ArrowUp',
  speedDown:      'ArrowDown',
  speedUpLarge:   'ArrowRight',
  speedDownLarge: 'ArrowLeft',
  rewind:         'KeyW',
  reset:          'KeyR',
  exit:           'Escape',
  fullscreen:     'KeyF',
};

const ACTION_LABELS = {
  togglePlay:     'Play / Pause',
  speedUp:        'Speed +5 px/s',
  speedDown:      'Speed −5 px/s',
  speedUpLarge:   'Speed +25 px/s',
  speedDownLarge: 'Speed −25 px/s',
  rewind:         'Rewind (hold)',
  reset:          'Reset to Top',
  exit:           'Exit',
  fullscreen:     'Fullscreen',
};

let hotkeys = { ...DEFAULT_HOTKEYS };

function keyLabel(code) {
  const map = {
    Space:'SPC', Escape:'ESC', ArrowUp:'↑', ArrowDown:'↓',
    ArrowLeft:'←', ArrowRight:'→', Enter:'↵', Tab:'TAB',
    Backspace:'BKSP', Delete:'DEL', Home:'HOME', End:'END',
    PageUp:'PGUP', PageDown:'PGDN',
  };
  if (map[code]) return map[code];
  if (code.startsWith('Key')) return code.slice(3);
  if (code.startsWith('Digit')) return code.slice(5);
  if (code.startsWith('F') && !isNaN(code.slice(1))) return code;
  return code;
}

// ── STATE ─────────────────────────────────────────────────
let isPlaying = false, scrollPos = 0, currentSpeed = 60, fontSize = 48;
let rafId = null, lastTime = null, trackHeight = 0, containerHeight = 0;
let hudTimer = null, rewindHeld = false, countdownActive = false;

// ── POPUP STATE ────────────────────────────────────────────
let popupModeEnabled = false;
let popupWin = null;
let pcPollInterval = null;

const editorView    = document.getElementById('editor-view');
const teleView      = document.getElementById('teleprompter-view');
const scrollTrack   = document.getElementById('scroll-track');
const scrollText    = document.getElementById('scroll-text');
const scriptEditor  = document.getElementById('script-editor');
const fontSizeInput = document.getElementById('font-size-input');
const speedInput    = document.getElementById('speed-input');
const pauseOverlay  = document.getElementById('pause-overlay');
const statusDot     = document.getElementById('status-dot');
const statusLabel   = document.getElementById('status-label');
const statusSpeed   = document.getElementById('status-speed');
const statusPct     = document.getElementById('status-pct');
const progressBar   = document.getElementById('progress-bar');
const hudPlayBtn    = document.getElementById('hud-play-btn');
const countdownOverlay = document.getElementById('countdown-overlay');
const countdownNum     = document.getElementById('countdown-num');
const popupController  = document.getElementById('popup-controller');
const pcProgress       = document.getElementById('pc-progress');
const pcSpeedVal       = document.getElementById('pc-speed-val');
const pcPlayBtn        = document.getElementById('pc-play-btn');

// ── POPUP TOGGLE ──────────────────────────────────────────
function togglePopupMode() {
  popupModeEnabled = !popupModeEnabled;
  const btn = document.getElementById('popup-toggle-btn');
  btn.classList.toggle('active', popupModeEnabled);
}

// ── EDITOR ────────────────────────────────────────────────
scriptEditor.addEventListener('input', () => {
  const t = scriptEditor.value.trim();
  document.getElementById('char-count').textContent = (t ? t.split(/\s+/).length : 0) + ' words';
});
fontSizeInput.addEventListener('input', () => {
  fontSize = Math.max(12, Math.min(200, parseInt(fontSizeInput.value) || 48));
  document.documentElement.style.setProperty('--font-size', fontSize + 'px');
});
fontSizeInput.addEventListener('change', () => { fontSizeInput.value = fontSize; });
speedInput.addEventListener('change', () => {
  currentSpeed = Math.max(5, Math.min(500, parseInt(speedInput.value) || 60));
  speedInput.value = currentSpeed;
});

// ── COUNTDOWN ─────────────────────────────────────────────
function runCountdown(cb) {
  countdownActive = true;
  countdownOverlay.classList.add('active');
  statusDot.className = 'status-dot countdown';
  statusLabel.textContent = 'STARTING';
  let n = 3;
  function tick() {
    countdownNum.textContent = n;
    countdownNum.classList.remove('pop');
    void countdownNum.offsetWidth;
    countdownNum.classList.add('pop');
    if (n === 0) {
      setTimeout(() => {
        countdownOverlay.classList.remove('active');
        countdownActive = false;
        cb();
      }, 400);
      return;
    }
    n--;
    setTimeout(tick, 1000);
  }
  tick();
}

// ── START / EXIT ──────────────────────────────────────────
function startTeleprompter() {
  const text = scriptEditor.value.trim();
  if (!text) { alert('Paste some text first.'); return; }
  fontSize = Math.max(12, Math.min(200, parseInt(fontSizeInput.value) || 48));
  currentSpeed = Math.max(5, Math.min(500, parseInt(speedInput.value) || 60));

  if (popupModeEnabled) {
    startPopupTeleprompter(text, fontSize, currentSpeed);
    return;
  }

  // — inline mode (original behaviour) —
  document.documentElement.style.setProperty('--font-size', fontSize + 'px');
  scrollText.textContent = text;
  scrollPos = 0;
  scrollTrack.style.transform = 'translateY(0px)';
  editorView.style.display = 'none';
  teleView.classList.add('active');

  requestAnimationFrame(() => requestAnimationFrame(() => {
    trackHeight = scrollTrack.scrollHeight;
    containerHeight = document.getElementById('scroll-container').clientHeight;
    isPlaying = false;
    updateStatusUI();
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(scrollStep);
    showHudBriefly();
    runCountdown(() => { isPlaying = true; lastTime = null; updateStatusUI(); });
  }));
}

function exitTeleprompter() {
  isPlaying = false; countdownActive = false;
  countdownOverlay.classList.remove('active');
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  teleView.classList.remove('active');
  editorView.style.display = 'flex';
  if (document.fullscreenElement) document.exitFullscreen();
}

// ── SCROLL LOOP ───────────────────────────────────────────
function scrollStep(ts) {
  const maxScroll = trackHeight - containerHeight;
  if (rewindHeld && !countdownActive) {
    if (lastTime !== null) {
      const dt = (ts - lastTime) / 1000;
      scrollPos = Math.max(0, scrollPos - currentSpeed * 2.5 * dt);
      scrollTrack.style.transform = `translateY(${-scrollPos}px)`;
      updateProgress(maxScroll);
    }
    lastTime = ts;
    rafId = requestAnimationFrame(scrollStep);
    return;
  }
  if (!isPlaying || countdownActive) { lastTime = null; rafId = requestAnimationFrame(scrollStep); return; }
  if (lastTime === null) { lastTime = ts; rafId = requestAnimationFrame(scrollStep); return; }
  const dt = (ts - lastTime) / 1000; lastTime = ts;
  scrollPos += currentSpeed * dt;
  if (scrollPos >= maxScroll) { scrollPos = maxScroll; isPlaying = false; updateStatusUI(); }
  scrollTrack.style.transform = `translateY(${-scrollPos}px)`;
  updateProgress(maxScroll);
  rafId = requestAnimationFrame(scrollStep);
}

function updateProgress(maxScroll) {
  const pct = maxScroll > 0 ? Math.min(100, (scrollPos / maxScroll) * 100) : 0;
  progressBar.style.width = pct.toFixed(1) + '%';
  statusPct.textContent = Math.floor(pct) + '%';
}

// ── INLINE CONTROLS ───────────────────────────────────────
function togglePlay() {
  if (countdownActive) return;
  isPlaying = !isPlaying;
  if (isPlaying) lastTime = null;
  updateStatusUI();
}
function resetScroll() {
  scrollPos = 0; scrollTrack.style.transform = 'translateY(0px)';
  isPlaying = true; lastTime = null; updateStatusUI();
}
function updateStatusUI() {
  if (countdownActive) return;
  pauseOverlay.classList.toggle('visible', !isPlaying);
  statusDot.className = 'status-dot' + (isPlaying ? '' : ' paused');
  statusLabel.textContent = isPlaying ? 'ROLLING' : 'PAUSED';
  hudPlayBtn.textContent = isPlaying ? '⏸ Pause' : '▶ Play';
  statusSpeed.textContent = currentSpeed;
  speedInput.value = currentSpeed;
}
function adjustSpeed(delta) {
  currentSpeed = Math.max(5, Math.min(500, currentSpeed + delta));
  statusSpeed.textContent = currentSpeed;
  speedInput.value = currentSpeed;
  showHudBriefly();
}

// ── KEYBOARD (inline mode) ────────────────────────────────
document.addEventListener('keydown', e => {
  if (!teleView.classList.contains('active')) return;
  if (listeningFor) return;
  const code = e.code;
  if (code === hotkeys.togglePlay)          { e.preventDefault(); togglePlay(); }
  else if (code === hotkeys.speedUp)        { e.preventDefault(); adjustSpeed(+5); }
  else if (code === hotkeys.speedDown)      { e.preventDefault(); adjustSpeed(-5); }
  else if (code === hotkeys.speedUpLarge)   { e.preventDefault(); adjustSpeed(+25); }
  else if (code === hotkeys.speedDownLarge) { e.preventDefault(); adjustSpeed(-25); }
  else if (code === hotkeys.rewind)         { e.preventDefault(); rewindHeld = true; lastTime = null; }
  else if (code === hotkeys.reset)          { e.preventDefault(); resetScroll(); }
  else if (code === hotkeys.exit)           { exitTeleprompter(); }
  else if (code === hotkeys.fullscreen) {
    e.preventDefault();
    if (!document.fullscreenElement) teleView.requestFullscreen().catch(()=>{});
    else document.exitFullscreen();
  }
  showHudBriefly();
});
document.addEventListener('keyup', e => {
  if (e.code === hotkeys.rewind) { rewindHeld = false; lastTime = null; }
});

// ── HUD AUTO-HIDE ─────────────────────────────────────────
function showHudBriefly() {
  teleView.classList.add('hud-visible');
  clearTimeout(hudTimer);
  hudTimer = setTimeout(() => teleView.classList.remove('hud-visible'), 2500);
}
teleView.addEventListener('mousemove', showHudBriefly);

// ══════════════════════════════════════════════════════════
// ── POPUP TELEPROMPTER ────────────────────────────────────
// ══════════════════════════════════════════════════════════

function buildPopupHTML(text, fontSize, speed) {
  const escaped = text.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PROMPTER — Popup</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--amber:#FFB300;--bg:#080808;--border:#222;--text-ui:#666;--text-bright:#bbb;--red:#e05050;--green:#50d080;--font-size:${fontSize}px}
html,body{height:100%;background:var(--bg);color:var(--text-bright);font-family:'Courier New',monospace;overflow:hidden;user-select:none}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:10;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px)}
.tp-fade{position:fixed;left:0;right:0;height:140px;z-index:6;pointer-events:none;bottom:44px;background:linear-gradient(0deg,var(--bg) 0%,transparent 100%)}
#sc{position:fixed;inset:0 0 44px 0;overflow:hidden}
#st{position:absolute;left:0;right:0;top:0;padding:0 8vw 50vh;will-change:transform}
#tx{font-family:Arial,sans-serif;font-size:var(--font-size);line-height:1.55;color:var(--amber);word-wrap:break-word;white-space:pre-wrap;text-shadow:0 0 50px rgba(255,179,0,0.25);max-width:100%}
#cdo{position:fixed;inset:0 0 44px 0;z-index:30;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none}
#cdo.active{opacity:1}
#cdn{font-family:Arial,sans-serif;font-size:30vmin;font-weight:700;color:rgba(255,179,0,0.18);line-height:1;transition:transform .15s ease-out;transform:scale(1)}
#cdn.pop{transform:scale(1.08)}
.po{position:fixed;inset:0 0 44px 0;z-index:15;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);opacity:0;pointer-events:none;transition:opacity .2s}
.po.v{opacity:1}
.pi{font-size:80px;color:rgba(255,179,0,0.35)}
.bar{position:fixed;bottom:0;left:0;right:0;z-index:20;display:flex;align-items:center;height:44px;background:rgba(8,8,8,0.97);border-top:1px solid var(--border);opacity:0;transition:opacity .3s;pointer-events:none}
body:hover .bar,.bar.vis{opacity:1;pointer-events:all}
.bi{display:flex;align-items:center;gap:7px;padding:0 12px;height:100%;border-right:1px solid var(--border);flex-shrink:0}
.bl{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--text-ui);user-select:none}
.sd{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.sd.p{background:var(--red);box-shadow:0 0 6px var(--red);animation:bk 1s infinite}
.sd.c{background:var(--amber);box-shadow:0 0 6px var(--amber);animation:bk .5s infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.3}}
.pw{flex:1;margin:0 10px;height:2px;background:rgba(255,255,255,0.07)}
.pf{height:100%;background:var(--amber);width:0%;transition:width .25s linear}
.bb{height:100%;padding:0 14px;background:transparent;border:none;border-left:1px solid var(--border);color:var(--text-bright);font-family:'Courier New',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:color .15s,background .15s;white-space:nowrap}
.bb:hover{color:var(--amber);background:rgba(255,179,0,0.05)}
</style>
</head>
<body>
<div class="tp-fade"></div>
<div id="sc"><div id="st"><div id="tx">${escaped}</div></div></div>
<div id="cdo"><div id="cdn">3</div></div>
<div class="po" id="po"><div class="pi">⏸</div></div>
<div class="bar" id="bar">
  <div class="bi"><div class="sd" id="sd"></div><span class="bl" id="sl" style="color:var(--text-bright)">READY</span></div>
  <div class="pw"><div class="pf" id="pf"></div></div>
  <div class="bi" style="border-left:1px solid #1e1e1e;border-right:1px solid #1e1e1e">
    <span class="bl">Speed</span>
    <span id="spv" style="color:var(--amber);font-size:12px;min-width:32px;text-align:right">${speed}</span>
    <span style="font-size:9px;color:#333;letter-spacing:.1em">px/s</span>
  </div>
  <div class="bi" style="border-right:none"><span id="pct" style="font-size:10px;color:#444">0%</span></div>
  <div style="flex:1"></div>
  <button class="bb" onclick="doReset()">⟳ Reset</button>
  <button class="bb" id="pb" onclick="doToggle()">⏸ Pause</button>
  <button class="bb" onclick="window.close()">✕ Close</button>
</div>
<script>
var playing=false,pos=0,spd=${speed},th=0,ch=0,raf=null,lt=null,cdActive=false,hudT=null;
var st=document.getElementById('st'),sd=document.getElementById('sd'),
    sl=document.getElementById('sl'),pf=document.getElementById('pf'),
    pct=document.getElementById('pct'),spv=document.getElementById('spv'),
    pb=document.getElementById('pb'),po=document.getElementById('po'),
    bar=document.getElementById('bar'),
    cdo=document.getElementById('cdo'),cdn=document.getElementById('cdn');

function showHud(){bar.classList.add('vis');clearTimeout(hudT);hudT=setTimeout(()=>bar.classList.remove('vis'),2500)}
document.body.addEventListener('mousemove',showHud);

function measure(){th=st.scrollHeight;ch=document.getElementById('sc').clientHeight}

function runCountdown(cb){
  cdActive=true;cdo.classList.add('active');sd.className='sd c';sl.textContent='STARTING';
  var n=3;
  function tick(){
    cdn.textContent=n;cdn.classList.remove('pop');void cdn.offsetWidth;cdn.classList.add('pop');
    if(n===0){setTimeout(()=>{cdo.classList.remove('active');cdActive=false;cb()},400);return}
    n--;setTimeout(tick,1000);
  }
  tick();
}

function loop(ts){
  var max=th-ch;
  if(!playing||cdActive){lt=null;raf=requestAnimationFrame(loop);return}
  if(lt===null){lt=ts;raf=requestAnimationFrame(loop);return}
  var dt=(ts-lt)/1000;lt=ts;
  pos+=spd*dt;
  if(pos>=max){pos=max;playing=false;updateUI()}
  st.style.transform='translateY('+(-pos)+'px)';
  var p=max>0?Math.min(100,(pos/max)*100):0;
  pf.style.width=p.toFixed(1)+'%';pct.textContent=Math.floor(p)+'%';
  raf=requestAnimationFrame(loop);
}

function updateUI(){
  po.classList.toggle('v',!playing);
  sd.className='sd'+(playing?'':' p');
  sl.textContent=playing?'ROLLING':'PAUSED';
  pb.textContent=playing?'⏸ Pause':'▶ Play';
  spv.textContent=spd;
}

function doToggle(){if(cdActive)return;playing=!playing;if(playing)lt=null;updateUI();notifyParent()}
function doReset(){pos=0;st.style.transform='translateY(0px)';playing=true;lt=null;updateUI();notifyParent()}
function setSpeed(s){spd=Math.max(5,Math.min(500,s));spv.textContent=spd;showHud();notifyParent()}
function notifyParent(){
  try{window.opener&&window.opener.postMessage({type:'prompter-status',playing:playing,speed:spd,pct:parseFloat(pf.style.width||0)},'*')}catch(e){}
}

// listen for commands from parent
window.addEventListener('message',function(e){
  var d=e.data;if(!d||d.target!=='prompter-popup')return;
  if(d.cmd==='togglePlay')doToggle();
  else if(d.cmd==='reset')doReset();
  else if(d.cmd==='speedUp')setSpeed(spd+5);
  else if(d.cmd==='speedDown')setSpeed(spd-5);
  else if(d.cmd==='speedUpLarge')setSpeed(spd+25);
  else if(d.cmd==='speedDownLarge')setSpeed(spd-25);
  else if(d.cmd==='exit'){window.close()}
});

window.addEventListener('resize',measure);

// keyboard
document.addEventListener('keydown',function(e){
  if(e.code==='Space'){e.preventDefault();doToggle()}
  else if(e.code==='ArrowUp'){e.preventDefault();setSpeed(spd+5)}
  else if(e.code==='ArrowDown'){e.preventDefault();setSpeed(spd-5)}
  else if(e.code==='ArrowRight'){e.preventDefault();setSpeed(spd+25)}
  else if(e.code==='ArrowLeft'){e.preventDefault();setSpeed(spd-25)}
  else if(e.code==='KeyR'){e.preventDefault();doReset()}
  else if(e.code==='Escape'){window.close()}
  else if(e.code==='KeyF'){
    if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});
    else document.exitFullscreen();
  }
  showHud();
});

// init
requestAnimationFrame(function(){requestAnimationFrame(function(){
  measure();
  playing=false;updateUI();
  raf=requestAnimationFrame(loop);
  showHud();
  runCountdown(function(){playing=true;lt=null;updateUI();notifyParent()});
})});
<\/script>
</body>
</html>`;
}

function startPopupTeleprompter(text, fontSize, speed) {
  // close any existing popup first
  if (popupWin && !popupWin.closed) {
    popupWin.close();
  }
  clearInterval(pcPollInterval);

  const pw = Math.min(screen.availWidth, 1200);
  const ph = Math.min(screen.availHeight, 800);
  const left = Math.round((screen.availWidth - pw) / 2);
  const top  = Math.round((screen.availHeight - ph) / 2);

  popupWin = window.open('', 'PrompterPopup',
    `width=${pw},height=${ph},left=${left},top=${top},resizable=yes,scrollbars=no,toolbar=no,menubar=no,location=no,status=no`
  );

  if (!popupWin) {
    alert('Popup was blocked. Please allow popups for this page and try again.');
    return;
  }

  popupWin.document.open();
  popupWin.document.write(buildPopupHTML(text, fontSize, speed));
  popupWin.document.close();

  // show controller panel
  popupController.classList.add('open');
  pcSpeedVal.textContent = speed;
  pcProgress.style.width = '0%';
  pcPlayBtn.textContent = '⏸ Pause';

  // poll for popup closure
  pcPollInterval = setInterval(() => {
    if (!popupWin || popupWin.closed) {
      closePopupController();
    }
  }, 500);
}

// receive status updates back from popup
window.addEventListener('message', e => {
  if (!e.data || e.data.type !== 'prompter-status') return;
  const { playing, speed, pct } = e.data;
  pcSpeedVal.textContent = speed;
  pcProgress.style.width = pct.toFixed(1) + '%';
  pcPlayBtn.textContent = playing ? '⏸ Pause' : '▶ Play';
});

function pcCmd(cmd) {
  if (!popupWin || popupWin.closed) { closePopupController(); return; }
  if (cmd === 'exit') {
    popupWin.close();
    closePopupController();
    return;
  }
  if (cmd === 'focus') {
    popupWin.focus();
    return;
  }
  popupWin.postMessage({ target: 'prompter-popup', cmd }, '*');
}

function closePopupController() {
  clearInterval(pcPollInterval);
  popupController.classList.remove('open');
  if (popupWin && !popupWin.closed) popupWin.close();
  popupWin = null;
}

// ── HOTKEY MODAL ─────────────────────────────────────────
let listeningFor = null;

function buildHkGrid() {
  const grid = document.getElementById('hk-grid');
  grid.innerHTML = '';
  Object.keys(hotkeys).forEach(action => {
    const row = document.createElement('div');
    row.className = 'hk-row';
    row.innerHTML = `
      <span class="hk-action">${ACTION_LABELS[action]}</span>
      <button class="hk-key-btn" data-action="${action}">${keyLabel(hotkeys[action])}</button>
    `;
    grid.appendChild(row);
  });
  grid.querySelectorAll('.hk-key-btn').forEach(btn => {
    btn.addEventListener('click', () => startListening(btn.dataset.action));
  });
}

function startListening(action) {
  if (listeningFor) cancelListening();
  listeningFor = action;
  const btn = document.querySelector(`.hk-key-btn[data-action="${action}"]`);
  if (btn) { btn.textContent = '…'; btn.classList.add('listening'); }
}

function cancelListening() {
  if (!listeningFor) return;
  const btn = document.querySelector(`.hk-key-btn[data-action="${listeningFor}"]`);
  if (btn) { btn.textContent = keyLabel(hotkeys[listeningFor]); btn.classList.remove('listening'); }
  listeningFor = null;
}

document.addEventListener('keydown', e => {
  if (!listeningFor) return;
  e.preventDefault(); e.stopPropagation();
  const code = e.code;
  if (code === 'Escape') { cancelListening(); return; }
  hotkeys[listeningFor] = code;
  const btn = document.querySelector(`.hk-key-btn[data-action="${listeningFor}"]`);
  if (btn) { btn.textContent = keyLabel(code); btn.classList.remove('listening'); }
  listeningFor = null;
}, true);

function openHotkeyModal() {
  buildHkGrid();
  document.getElementById('hotkey-modal').classList.add('open');
}
function closeHotkeyModal() {
  cancelListening();
  document.getElementById('hotkey-modal').classList.remove('open');
}
function resetHotkeys() {
  hotkeys = { ...DEFAULT_HOTKEYS };
  buildHkGrid();
}
document.getElementById('hotkey-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('hotkey-modal')) closeHotkeyModal();
});

// ── SAVE / LOAD ───────────────────────────────────────────
function saveSettings() {
  const data = {
    fontSize: parseInt(fontSizeInput.value) || 48,
    speed: parseInt(speedInput.value) || 60,
    hotkeys: { ...hotkeys },
    script: scriptEditor.value
  };
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' })),
    download: 'prompter-settings.json'
  });
  a.click(); URL.revokeObjectURL(a.href);
}

function loadSettings(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.fontSize) { fontSize = d.fontSize; fontSizeInput.value = fontSize; document.documentElement.style.setProperty('--font-size', fontSize + 'px'); }
      if (d.speed)    { currentSpeed = d.speed; speedInput.value = currentSpeed; }
      if (d.hotkeys && typeof d.hotkeys === 'object') { hotkeys = { ...DEFAULT_HOTKEYS, ...d.hotkeys }; }
      if (typeof d.script === 'string') { scriptEditor.value = d.script; scriptEditor.dispatchEvent(new Event('input')); }
    } catch { alert('Invalid JSON file.'); }
  };
  r.readAsText(file); e.target.value = '';
}

// ── RESIZE ────────────────────────────────────────────────
window.addEventListener('resize', () => {
  if (teleView.classList.contains('active')) {
    trackHeight = scrollTrack.scrollHeight;
    containerHeight = document.getElementById('scroll-container').clientHeight;
  }
});
</script>
</body>
