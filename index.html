<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PrompterCam</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap');

- { margin:0; padding:0; box-sizing:border-box; }

:root {
–bg: #0a0a0a;
–accent: #00ff88;
–accent-dim: #00ff8844;
–text: #f0f0f0;
–muted: #555;
–border: #222;
–danger: #ff3b5c;
}

html, body {
height:100%; width:100%;
background:var(–bg); color:var(–text);
font-family:‘DM Sans’,sans-serif;
overflow:hidden;
touch-action:none;
overscroll-behavior:none;
-webkit-user-select:none; user-select:none;
}

/* SETUP */
#setup {
display:flex; flex-direction:column;
align-items:center; justify-content:center;
height:100vh; padding:2rem 1.5rem; gap:1.8rem;
}
.logo { font-family:‘Space Mono’,monospace; font-size:1.1rem; letter-spacing:.25em; color:var(–accent); }
.logo span { color:var(–muted); }

.upload-zone {
width:100%; max-width:340px;
border:1.5px dashed var(–border); border-radius:16px;
padding:2rem 1.5rem;
display:flex; flex-direction:column; align-items:center; gap:.6rem;
cursor:pointer; position:relative;
transition:border-color .2s, background .2s;
}
.upload-zone:hover { border-color:var(–accent); background:#00ff8808; }
.upload-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.upload-icon { font-size:2rem; }
.upload-label { font-size:.85rem; color:var(–muted); text-align:center; }
.upload-label strong { color:var(–text); display:block; }
#file-name { font-family:‘Space Mono’,monospace; font-size:.7rem; color:var(–accent); background:#00ff8815; padding:.25rem .6rem; border-radius:6px; display:none; }

.controls { display:flex; flex-direction:column; gap:.9rem; width:100%; max-width:340px; }
.row { display:flex; align-items:center; gap:.75rem; }
.lbl { font-family:‘Space Mono’,monospace; font-size:.62rem; color:var(–muted); text-transform:uppercase; letter-spacing:.1em; width:55px; flex-shrink:0; }
input[type=range] { -webkit-appearance:none; flex:1; height:3px; background:var(–border); border-radius:2px; outline:none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:var(–accent); cursor:pointer; }
.val { font-family:‘Space Mono’,monospace; font-size:.7rem; color:var(–accent); width:26px; text-align:right; }

#start-btn {
width:100%; max-width:340px; padding:1rem; border:none; border-radius:14px;
background:var(–accent); color:#000;
font-family:‘Space Mono’,monospace; font-size:.85rem; font-weight:700;
letter-spacing:.12em; text-transform:uppercase;
cursor:pointer; opacity:.3; pointer-events:none; transition:opacity .2s;
}
#start-btn.ready { opacity:1; pointer-events:all; }

/* PROMPTER */
#prompter { display:none; flex-direction:column; height:100vh; height:100dvh; overflow:hidden; }

#text-band {
height:25vh; overflow:hidden; position:relative;
background:rgba(0,0,0,.88); flex-shrink:0; z-index:5;
}
#text-band::before,#text-band::after {
content:’’; position:absolute; left:0; right:0; height:30px; z-index:2; pointer-events:none;
}
#text-band::before { top:0; background:linear-gradient(to bottom,rgba(0,0,0,.88),transparent); }
#text-band::after { bottom:0; background:linear-gradient(to top,rgba(0,0,0,.88),transparent); }

#cursor-line {
position:absolute; left:0; right:0; top:50%; transform:translateY(-50%);
height:2px; background:var(–accent); box-shadow:0 0 10px var(–accent); opacity:.5; z-index:3;
}
#scroll-inner { position:absolute; width:100%; padding:1.5rem 1.2rem; will-change:transform; }
#scroll-text { font-family:‘DM Sans’,sans-serif; font-weight:600; line-height:1.7; color:#fff; text-align:center; text-shadow:0 0 18px rgba(0,255,136,.3); }

#divider { height:2px; flex-shrink:0; z-index:5; background:linear-gradient(90deg,transparent,var(–accent),transparent); box-shadow:0 0 8px var(–accent-dim); }

#cam-band { flex:1; position:relative; overflow:hidden; background:#000; }
#video-el { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); display:block; }

#back-btn {
position:absolute; top:.9rem; left:.9rem; z-index:20;
background:rgba(0,0,0,.5); border:1px solid var(–border);
color:var(–muted); border-radius:8px; padding:.4rem .7rem;
font-family:‘Space Mono’,monospace; font-size:.62rem; cursor:pointer;
}
#spd-box {
position:absolute; top:.9rem; right:.9rem; z-index:20;
background:rgba(0,0,0,.5); border:1px solid var(–border);
border-radius:8px; padding:.35rem .6rem;
font-family:‘Space Mono’,monospace; font-size:.62rem;
display:flex; align-items:center; gap:.4rem;
}
.spd { background:none; border:none; color:var(–accent); font-family:‘Space Mono’,monospace; font-size:.8rem; cursor:pointer; padding:0 2px; }

#hud {
position:absolute; bottom:0; left:0; right:0; z-index:15;
padding:1rem 1.4rem; display:flex; align-items:flex-end; justify-content:space-between;
background:linear-gradient(to top,rgba(0,0,0,.6),transparent);
}
#rec-ind { display:flex; align-items:center; gap:.5rem; font-family:‘Space Mono’,monospace; font-size:.68rem; color:#fff; opacity:0; transition:opacity .3s; }
#rec-ind.on { opacity:1; }
.dot { width:8px; height:8px; border-radius:50%; background:var(–danger); animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.15} }
#timer { font-family:‘Space Mono’,monospace; font-size:.68rem; color:#fff; }

#rec-btn {
position:absolute; bottom:1.3rem; left:50%; transform:translateX(-50%);
width:64px; height:64px; border-radius:50%; border:3px solid #fff;
background:transparent; display:flex; align-items:center; justify-content:center;
cursor:pointer; z-index:20;
}
#rec-inner { width:40px; height:40px; border-radius:50%; background:var(–danger); transition:border-radius .2s,width .2s,height .2s; }
#rec-btn.rec #rec-inner { border-radius:6px; width:26px; height:26px; }

canvas { display:none; }

/* SAVE SCREEN */
#save-screen {
display:none;
position:fixed; inset:0; z-index:9999;
background:#0a0a0a;
flex-direction:column; align-items:center; justify-content:center;
padding:2rem 1.5rem; gap:1.4rem;
overflow-y:auto; -webkit-overflow-scrolling:touch; touch-action:pan-y;
}
#save-screen.on { display:flex; }

#save-screen h2 { font-family:‘Space Mono’,monospace; font-size:1rem; color:var(–accent); letter-spacing:.15em; text-align:center; }
#save-screen p { font-size:.82rem; color:var(–muted); text-align:center; line-height:1.6; }

#preview { width:100%; max-width:400px; border-radius:12px; background:#111; max-height:35vh; object-fit:cover; display:block; }

#dl-btn {
display:block; width:100%; max-width:400px;
padding:1.2rem; background:var(–accent); color:#000;
font-family:‘Space Mono’,monospace; font-size:1.1rem; font-weight:700;
letter-spacing:.1em; text-align:center; text-decoration:none;
border-radius:16px; border:none; cursor:pointer; -webkit-appearance:none;
}

#new-btn {
width:100%; max-width:400px; padding:.85rem;
background:none; border:1px solid var(–border); color:var(–muted);
font-family:‘Space Mono’,monospace; font-size:.75rem; border-radius:12px; cursor:pointer;
}
</style>

</head>
<body>

<!-- SETUP -->

<div id="setup">
  <div class="logo">Prompter<span>Cam</span></div>
  <div class="upload-zone" id="drop-zone">
    <input type="file" id="file-input" accept=".txt,.md">
    <div class="upload-icon">📄</div>
    <div class="upload-label"><strong>Upload Script</strong>Tap to choose a .txt file</div>
    <div id="file-name"></div>
  </div>
  <div class="controls">
    <div class="row">
      <div class="lbl">Speed</div>
      <input type="range" id="speed-sl" min="1" max="10" value="3" step="0.5">
      <div class="val" id="speed-v">3</div>
    </div>
    <div class="row">
      <div class="lbl">Size</div>
      <input type="range" id="size-sl" min="14" max="36" value="20" step="1">
      <div class="val" id="size-v">20</div>
    </div>
  </div>
  <button id="start-btn">Start Session</button>
</div>

<!-- PROMPTER -->

<div id="prompter">
  <div id="text-band">
    <div id="cursor-line"></div>
    <div id="scroll-inner"><div id="scroll-text"></div></div>
  </div>
  <div id="divider"></div>
  <div id="cam-band">
    <video id="video-el" autoplay playsinline muted></video>
    <button id="back-btn">&#8592; Back</button>
    <div id="spd-box">
      <button class="spd" id="sl-btn">&#8722;</button>
      <span id="live-spd">3.0</span>&#215;
      <button class="spd" id="fa-btn">&#43;</button>
    </div>
    <div id="hud">
      <div id="rec-ind"><div class="dot"></div>REC</div>
      <div id="timer">00:00</div>
    </div>
    <button id="rec-btn"><div id="rec-inner"></div></button>
  </div>
  <canvas id="cv"></canvas>
</div>

<!-- SAVE SCREEN -->

<div id="save-screen">
  <h2>&#127916; Recording Done</h2>
  <video id="preview" controls playsinline></video>
  <p>Tap the green button to save your video.</p>
  <a id="dl-btn" download="promptercam.webm">&#11015; SAVE VIDEO</a>
  <button id="new-btn">Discard &amp; record again</button>
</div>

<script>
// Block zoom/scroll everywhere except save-screen
document.addEventListener('touchmove', e => {
  if (!e.target.closest('#save-screen')) e.preventDefault();
}, { passive:false });
document.addEventListener('gesturestart', e => e.preventDefault(), { passive:false });

let scriptText='', scrollSpeed=3, fontSize=20;
let isScrolling=false, scrollPos=0, scrollRAF=null;
let stream=null, mediaRecorder=null, recordedChunks=[];
let isRecording=false, timerInterval=null, elapsed=0;
let textTotalH=0, blobUrl=null;

// Setup
const fileInput = document.getElementById('file-input');
const fileNameEl = document.getElementById('file-name');
const startBtn = document.getElementById('start-btn');

fileInput.addEventListener('change', e => loadFile(e.target.files[0]));

const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); });
dz.addEventListener('drop', e => { e.preventDefault(); loadFile(e.dataTransfer.files[0]); });

function loadFile(f) {
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    scriptText = ev.target.result.trim();
    fileNameEl.textContent = f.name;
    fileNameEl.style.display = 'block';
    startBtn.classList.add('ready');
  };
  r.readAsText(f);
}

document.getElementById('speed-sl').addEventListener('input', function() {
  scrollSpeed = parseFloat(this.value);
  document.getElementById('speed-v').textContent = scrollSpeed;
});
document.getElementById('size-sl').addEventListener('input', function() {
  fontSize = parseInt(this.value);
  document.getElementById('size-v').textContent = fontSize;
});

startBtn.addEventListener('click', () => { if (scriptText) launchSession(); });

async function launchSession() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'user', width:{ideal:1280}, height:{ideal:720} },
      audio: true
    });
  } catch(e) { alert('Camera & mic access required.'); return; }

  document.getElementById('setup').style.display = 'none';
  document.getElementById('prompter').style.display = 'flex';
  document.getElementById('video-el').srcObject = stream;

  const st = document.getElementById('scroll-text');
  st.style.fontSize = fontSize + 'px';
  st.textContent = scriptText;

  scrollPos = 0;
  const band = document.getElementById('text-band');
  const inner = document.getElementById('scroll-inner');
  inner.style.transform = `translateY(${band.clientHeight}px)`;
  await new Promise(r => setTimeout(r, 120));
  textTotalH = inner.offsetHeight;
  startScrolling();
}

function startScrolling() {
  isScrolling = true;
  const band = document.getElementById('text-band');
  const inner = document.getElementById('scroll-inner');
  const bandH = band.clientHeight;
  let last = null;
  function loop(ts) {
    if (!isScrolling) return;
    if (!last) last = ts;
    const dt = ts - last; last = ts;
    scrollPos += (scrollSpeed * 30 / 1000) * dt;
    inner.style.transform = `translateY(${bandH - scrollPos}px)`;
    if (scrollPos < textTotalH + bandH) scrollRAF = requestAnimationFrame(loop);
    else isScrolling = false;
  }
  scrollRAF = requestAnimationFrame(loop);
}

document.getElementById('sl-btn').addEventListener('click', () => adjSpeed(-0.5));
document.getElementById('fa-btn').addEventListener('click', () => adjSpeed(0.5));
function adjSpeed(d) {
  scrollSpeed = Math.max(0.5, Math.min(15, scrollSpeed + d));
  document.getElementById('live-spd').textContent = scrollSpeed.toFixed(1);
}

document.getElementById('back-btn').addEventListener('click', () => {
  if (isRecording) stopRec(false);
  if (scrollRAF) cancelAnimationFrame(scrollRAF);
  isScrolling = false;
  if (stream) stream.getTracks().forEach(t => t.stop());
  document.getElementById('prompter').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
});

document.getElementById('rec-btn').addEventListener('click', () => {
  isRecording ? stopRec(true) : startRec();
});

function startRec() {
  recordedChunks = [];
  const canvas = document.getElementById('cv');
  const videoEl = document.getElementById('video-el');
  const band = document.getElementById('text-band');
  const vw = videoEl.videoWidth || 640;
  const vh = videoEl.videoHeight || 480;
  canvas.width = vw; canvas.height = vh;
  const ctx = canvas.getContext('2d');
  const textPx = Math.round(vh * 0.25);

  const canvasStream = canvas.captureStream(30);
  stream.getAudioTracks().forEach(t => canvasStream.addTrack(t));

  function draw() {
    if (!isRecording) return;
    ctx.save(); ctx.scale(-1,1);
    ctx.drawImage(videoEl, -vw, 0, vw, vh);
    ctx.restore();
    ctx.fillStyle = 'rgba(0,0,0,0.82)';
    ctx.fillRect(0,0,vw,textPx);
    ctx.fillStyle = '#00ff88';
    ctx.fillRect(0, textPx-2, vw, 2);

    const inner = document.getElementById('scroll-inner');
    const mat = new DOMMatrix(getComputedStyle(inner).transform);
    const yOff = mat.m42;
    const scaleY = textPx / band.clientHeight;

    ctx.save();
    ctx.beginPath(); ctx.rect(0,0,vw,textPx); ctx.clip();
    ctx.font = `600 ${Math.round(fontSize*scaleY*1.1)}px "DM Sans",sans-serif`;
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    const lh = fontSize * scaleY * 1.7;
    const lines = wrapText(ctx, scriptText, vw-40);
    const sy = yOff * scaleY + 14;
    lines.forEach((ln,i) => {
      const y = sy + i*lh;
      if (y > -lh && y < textPx+lh) ctx.fillText(ln, vw/2, y);
    });
    ctx.restore();
    requestAnimationFrame(draw);
  }
  draw();

  const mimes = ['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm','video/mp4'];
  const mime = mimes.find(m => MediaRecorder.isTypeSupported(m)) || '';
  mediaRecorder = new MediaRecorder(canvasStream, mime ? {mimeType:mime} : {});
  mediaRecorder.ondataavailable = e => { if (e.data.size>0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = showSaveScreen;
  mediaRecorder.start(100);

  isRecording = true; elapsed = 0;
  document.getElementById('rec-ind').classList.add('on');
  document.getElementById('rec-btn').classList.add('rec');
  timerInterval = setInterval(() => {
    elapsed++;
    const m = String(Math.floor(elapsed/60)).padStart(2,'0');
    const s = String(elapsed%60).padStart(2,'0');
    document.getElementById('timer').textContent = m+':'+s;
  }, 1000);
}

function stopRec(save) {
  if (!isRecording) return;
  isRecording = false;
  clearInterval(timerInterval);
  document.getElementById('rec-ind').classList.remove('on');
  document.getElementById('rec-btn').classList.remove('rec');
  document.getElementById('timer').textContent = '00:00';
  if (!save) mediaRecorder.onstop = null;
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
}

function showSaveScreen() {
  if (!recordedChunks.length) return;
  if (blobUrl) URL.revokeObjectURL(blobUrl);
  const blob = new Blob(recordedChunks, { type: recordedChunks[0].type || 'video/webm' });
  blobUrl = URL.createObjectURL(blob);
  document.getElementById('preview').src = blobUrl;
  const dlBtn = document.getElementById('dl-btn');
  dlBtn.href = blobUrl;
  dlBtn.download = 'promptercam_' + Date.now() + '.webm';
  document.getElementById('save-screen').classList.add('on');
}

document.getElementById('new-btn').addEventListener('click', () => {
  document.getElementById('save-screen').classList.remove('on');
  document.getElementById('preview').src = '';
  if (blobUrl) { URL.revokeObjectURL(blobUrl); blobUrl = null; }
  scrollPos = 0;
  const band = document.getElementById('text-band');
  const inner = document.getElementById('scroll-inner');
  inner.style.transform = `translateY(${band.clientHeight}px)`;
  startScrolling();
});

function wrapText(ctx, text, maxW) {
  const words = text.split(' ');
  const lines = []; let cur = '';
  for (const w of words) {
    const test = cur ? cur+' '+w : w;
    if (ctx.measureText(test).width <= maxW || !cur) cur = test;
    else { lines.push(cur); cur = w; }
  }
  if (cur) lines.push(cur);
  return lines;
}
</script>

</body>
</html>
